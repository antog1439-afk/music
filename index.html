<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Bot - Поиск исполнителя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f8f9fa);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 14px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        
        .search-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .result-card {
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .artist-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .link-btn {
            display: block;
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 14px;
            margin-top: 12px;
            text-align: center;
            font-weight: 500;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
        
        .concert-btn {
            background: #28a745;
        }
        
        .info-text {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-top: 12px;
            text-align: center;
        }
        
        .user-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--tg-theme-hint-color, #e9ecef);
            font-size: 13px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border: 3px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            color: #dc3545;
            text-align: center;
            padding: 20px;
        }
        
        .link-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .card {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎵 Музыкальный бот</h1>
            <p>Найди исполнителя и получи ссылки на музыку и концерты</p>
            
            <div class="search-box">
                <input type="text" id="artistInput" class="search-input" placeholder="Например: Big Baby Tape, Imagine Dragons, Кино..." autocomplete="off">
                <button onclick="searchArtist()" class="search-btn">Найти</button>
            </div>
            
            <div id="result"></div>
            
            <div class="user-info">
                <span>👤 <span id="userName">Загрузка...</span></span>
                <span>🆔 <span id="userId">—</span></span>
            </div>
        </div>
        
        <button onclick="closeApp()">❌ Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Показываем данные пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = user.first_name || 'Гость';
            document.getElementById('userId').textContent = user.id || '—';
        } else {
            document.getElementById('userName').textContent = 'Гость';
        }
        
        // Функция поиска и создания ссылок
        function searchArtist() {
            const query = document.getElementById('artistInput').value.trim();
            if (!query) {
                tg.showAlert('Введите имя исполнителя');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>🔍 Ищем ссылки...</div>';
            
            // Формируем ссылки
            const musicUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(query)}`;
            const concertsUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(query + ' концерт')}`;
            const afishaUrl = `https://www.afisha.ru/search/?q=${encodeURIComponent(query)}`;
            
            // Показываем результат через 0.3 секунды
            setTimeout(() => {
                resultDiv.innerHTML = `
                    <div class="result-card">
                        <div class="artist-name">
                            🎤 ${escapeHtml(query)}
                        </div>
                        
                        <div class="link-group">
                            <button onclick="openLink('${musicUrl}')" class="link-btn">
                                🎵 Слушать на Яндекс.Музыке
                            </button>
                            
                            <button onclick="openLink('${concertsUrl}')" class="link-btn concert-btn">
                                🎸 Концерты на Яндекс.Музыке
                            </button>
                            
                            <button onclick="openLink('${afishaUrl}')" class="link-btn" style="background: #ff6b6b;">
                                🎫 Билеты на Афише
                            </button>
                        </div>
                        
                        <div class="info-text">
                            💡 Нажми на кнопку, чтобы открыть ссылку
                        </div>
                    </div>
                `;
            }, 300);
        }
        
        function openLink(url) {
            tg.openLink(url);
        }
        
        function closeApp() {
            tg.close();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Добавляем поддержку кнопки Enter
        document.getElementById('artistInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchArtist();
            }
        });
    </script>
</body>
</html>
