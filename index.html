<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест кнопки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.96);
        }
        .status {
            margin-top: 30px;
            color: white;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <button id="testBtn">🎫 БИЛЕТЫ</button>
        <div class="status" id="status">Ожидание нажатия...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const btn = document.getElementById('testBtn');
        const statusDiv = document.getElementById('status');
        
        // Проверяем, в Telegram ли мы
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
            statusDiv.innerHTML = '✅ Работаем в Telegram! Кнопка должна работать.<br>Пользователь: ' + window.Telegram.WebApp.initDataUnsafe.user.first_name;
        } else {
            statusDiv.innerHTML = '⚠️ Вы открыли в браузере, а не в Telegram!<br>Функция showPopup работает ТОЛЬКО внутри Telegram.';
        }
        
        btn.onclick = function() {
            statusDiv.innerHTML = '🔄 Кнопка нажата, открываем попап...';
            
            try {
                tg.showPopup({
                    title: "🎫 БИЛЕТЫ НА КОНЦЕРТЫ",
                    message: "Выберите исполнителя:",
                    buttons: [
                        { type: "default", text: "🎤 Асия" },
                        { type: "default", text: "🎸 Imagine Dragons" },
                        { type: "default", text: "🎵 Кино" },
                        { type: "default", text: "📅 Вся афиша" },
                        { type: "cancel", text: "❌ Отмена" }
                    ]
                }, function(buttonId) {
                    statusDiv.innerHTML = '✅ Выбрана кнопка: ' + buttonId;
                    
                    if (buttonId === 0) {
                        tg.openLink('https://afisha.yandex.ru/search?text=Асия');
                    } else if (buttonId === 1) {
                        tg.openLink('https://afisha.yandex.ru/search?text=Imagine%20Dragons');
                    } else if (buttonId === 2) {
                        tg.openLink('https://afisha.yandex.ru/search?text=Кино');
                    } else if (buttonId === 3) {
                        tg.openLink('https://afisha.yandex.ru/concerts');
                    }
                });
            } catch(e) {
                statusDiv.innerHTML = '❌ Ошибка: ' + e.message;
            }
        };
    </script>
</body>
</html>
