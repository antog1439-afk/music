<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Bot - Поиск музыки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f8f9fa);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .search-type {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .type-btn {
            flex: 1;
            padding: 8px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-top: 0;
        }
        
        .type-btn.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 14px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        
        .search-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .result-card {
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .found-artist {
            text-align: center;
            padding: 8px;
            background: var(--tg-theme-secondary-bg-color, #e9ecef);
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        .found-artist-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .found-artist-name {
            font-size: 24px;
            font-weight: 700;
            margin-top: 4px;
        }
        
        .artist-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .favorite-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin: 0;
            width: auto;
        }
        
        .platform-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        
        .platform-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 14px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-size: 16px;
            color: white;
        }
        
        .yandex-btn { background: #ffcc00; color: #000; }
        .youtube-btn { background: #ff0000; }
        .concert-btn { background: #28a745; }
        .afisha-btn { background: #ff6b6b; }
        
        .info-text {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-top: 12px;
            text-align: center;
        }
        
        .user-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--tg-theme-hint-color, #e9ecef);
            font-size: 13px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border: 3px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-favorites {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .hidden {
            display: none;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            margin: 12px 0 8px 0;
            color: var(--tg-theme-hint-color, #6c757d);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .popular-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        
        .popular-tag {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .popular-tag:hover {
            opacity: 0.8;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .delete-history {
            background: none;
            border: none;
            color: #dc3545;
            font-size: 18px;
            cursor: pointer;
            width: auto;
            margin: 0;
            padding: 0 8px;
        }
        
        .state-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .state-idle { background: #6c757d; }
        .state-searching { background: #ffc107; animation: pulse 1s infinite; }
        .state-results { background: #28a745; }
        
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 8px 12px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 12px;
            font-size: 13px;
        }
        
        .current-state {
            display: flex;
            align-items: center;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .card {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎵 Музыкальный бот</h1>
            
            <!-- Индикатор состояния -->
            <div class="status-bar">
                <div class="current-state">
                    <span class="state-indicator state-idle" id="stateIndicator"></span>
                    <span id="stateText">Готов к работе</span>
                </div>
                <span>🎤</span>
            </div>
            
            <!-- Тип поиска -->
            <div class="search-type">
                <button class="type-btn active" onclick="setSearchType('artist')">🎤 Исполнитель</button>
                <button class="type-btn" onclick="setSearchType('track')">🎵 Трек</button>
                <button class="type-btn" onclick="setSearchType('album')">💿 Альбом</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" id="searchInput" placeholder="Например: Imagine Dragons, Believer, Night Visions..." autocomplete="off">
                <button onclick="search()" class="search-btn">Найти</button>
            </div>
            
            <div id="result"></div>
            
            <div class="user-info">
                <span>👤 <span id="userName">Загрузка...</span></span>
                <span>🆔 <span id="userId">—</span></span>
            </div>
        </div>
        
        <button onclick="closeApp()">❌ Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // ========== БАЗА ДАННЫХ ИСПОЛНИТЕЛЕЙ ДЛЯ ТРЕКОВ И АЛЬБОМОВ ==========
        const artistDatabase = {
            // Популярные треки и их исполнители
            tracks: {
                "believer": "Imagine Dragons",
                "thunder": "Imagine Dragons", 
                "radioactive": "Imagine Dragons",
                "demons": "Imagine Dragons",
                "whatever it takes": "Imagine Dragons",
                "enemy": "Imagine Dragons",
                "bones": "Imagine Dragons",
                "sharks": "Imagine Dragons",
                
                "группа крови": "Кино",
                "звезда по имени солнце": "Кино",
                "пачка сигарет": "Кино",
                "спокойная ночь": "Кино",
                "кукушка": "Кино",
                "восьмиклассница": "Кино",
                
                "traplife": "Big Baby Tape",
                "dope game": "Big Baby Tape",
                "bandana": "Big Baby Tape",
                "1000": "Big Baby Tape",
                "gimme the loot": "Big Baby Tape",
                "hussle": "Big Baby Tape",
                
                "искала": "Земфира",
                "прости меня моя любовь": "Земфира",
                "хочешь": "Земфира",
                "бесконечность": "Земфира",
                "мачо": "Земфира",
                
                "после тебя": "Rauf & Faik",
                "детство": "Rauf & Faik",
                "я люблю тебя": "Rauf & Faik",
                "колыбельная": "Rauf & Faik",
                
                "mockingbird": "Eminem",
                "lose yourself": "Eminem",
                "stan": "Eminem",
                "without me": "Eminem",
                "rap god": "Eminem",
                "the real slim shady": "Eminem",
                
                "bad guy": "Billie Eilish",
                "when the party's over": "Billie Eilish",
                "ocean eyes": "Billie Eilish",
                "lovely": "Billie Eilish",
                "bury a friend": "Billie Eilish",
                
                "blinding lights": "The Weeknd",
                "save your tears": "The Weeknd",
                "starboy": "The Weeknd",
                "the hills": "The Weeknd",
                "can't feel my face": "The Weeknd"
            },
            
            // Популярные альбомы и их исполнители
            albums: {
                "night visions": "Imagine Dragons",
                "evolve": "Imagine Dragons",
                "origins": "Imagine Dragons",
                "mercury act 1": "Imagine Dragons",
                "smoke mirrors": "Imagine Dragons",
                
                "черный альбом": "Кино",
                "звезда по имени солнце": "Кино",
                "группа крови": "Кино",
                "ночь": "Кино",
                "45": "Кино",
                
                "hussle": "Big Baby Tape",
                "bandana": "Big Baby Tape",
                "1000": "Big Baby Tape",
                "argyll": "Big Baby Tape",
                
                "земфира": "Земфира",
                "прости меня моя любовь": "Земфира",
                "вендетта": "Земфира",
                "жить в твоей голове": "Земфира",
                
                "я люблю тебя": "Rauf & Faik",
                "с детства": "Rauf & Faik",
                "как люди": "Rauf & Faik",
                
                "the eminem show": "Eminem",
                "marshall mathers lp": "Eminem",
                "kamikaze": "Eminem",
                "music to be murdered by": "Eminem",
                
                "when we all fall asleep where do we go": "Billie Eilish",
                "happier than ever": "Billie Eilish",
                "dont smile at me": "Billie Eilish",
                
                "after hours": "The Weeknd",
                "starboy": "The Weeknd",
                "beauty behind the madness": "The Weeknd",
                "dawn fm": "The Weeknd"
            }
        };
        
        let currentSearchType = 'artist';
        let currentState = 'idle';
        let searchHistory = [];
        let favorites = [];
        
        // ========== МАШИНА СОСТОЯНИЙ ==========
        function setState(newState, message) {
            currentState = newState;
            const indicator = document.getElementById('stateIndicator');
            const stateText = document.getElementById('stateText');
            
            indicator.className = 'state-indicator';
            
            switch(newState) {
                case 'idle':
                    indicator.classList.add('state-idle');
                    stateText.textContent = message || '✅ Готов к работе';
                    break;
                case 'searching':
                    indicator.classList.add('state-searching');
                    stateText.textContent = message || '🔍 Поиск...';
                    break;
                case 'results':
                    indicator.classList.add('state-results');
                    stateText.textContent = message || '📋 Результаты готовы';
                    break;
            }
        }
        
        // ========== ТИП ПОИСКА ==========
        function setSearchType(type) {
            currentSearchType = type;
            const btns = document.querySelectorAll('.type-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            
            if (type === 'artist') btns[0].classList.add('active');
            else if (type === 'track') btns[1].classList.add('active');
            else if (type === 'album') btns[2].classList.add('active');
            
            const placeholder = type === 'artist' ? 'Например: Imagine Dragons' :
                               type === 'track' ? 'Например: Believer' : 'Например: Night Visions';
            document.getElementById('searchInput').placeholder = placeholder;
        }
        
        // ========== ПОИСК ИСПОЛНИТЕЛЯ ==========
        function findArtistByTrackOrAlbum(query, type) {
            const lowerQuery = query.toLowerCase().trim();
            
            if (type === 'track' && artistDatabase.tracks[lowerQuery]) {
                return artistDatabase.tracks[lowerQuery];
            }
            
            if (type === 'album' && artistDatabase.albums[lowerQuery]) {
                return artistDatabase.albums[lowerQuery];
            }
            
            // Если точного совпадения нет, ищем частичное
            if (type === 'track') {
                for (const [track, artist] of Object.entries(artistDatabase.tracks)) {
                    if (track.includes(lowerQuery) || lowerQuery.includes(track)) {
                        return artist;
                    }
                }
            }
            
            if (type === 'album') {
                for (const [album, artist] of Object.entries(artistDatabase.albums)) {
                    if (album.includes(lowerQuery) || lowerQuery.includes(album)) {
                        return artist;
                    }
                }
            }
            
            return null;
        }
        
        function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                tg.showAlert('Введите название');
                return;
            }
            
            setState('searching', `🔍 Ищем "${query}"...`);
            
            let artistName = null;
            let searchTypeText = '';
            
            if (currentSearchType === 'artist') {
                artistName = query;
                searchTypeText = 'исполнителя';
            } else if (currentSearchType === 'track') {
                artistName = findArtistByTrackOrAlbum(query, 'track');
                searchTypeText = 'трек';
            } else if (currentSearchType === 'album') {
                artistName = findArtistByTrackOrAlbum(query, 'album');
                searchTypeText = 'альбом';
            }
            
            setTimeout(() => {
                const resultDiv = document.getElementById('result');
                
                if (!artistName) {
                    resultDiv.innerHTML = `
                        <div class="result-card">
                            <div class="found-artist" style="background: #dc354520;">
                                <div class="found-artist-label">❌ НЕ НАЙДЕН</div>
                                <div class="found-artist-name">"${escapeHtml(query)}"</div>
                            </div>
                            <div class="info-text">
                                Не удалось найти исполнителя по ${searchTypeText} "${escapeHtml(query)}"<br>
                                Попробуйте ввести название иначе или найдите через "Исполнитель"
                            </div>
                        </div>
                    `;
                    setState('results', `❌ "${query}" не найден`);
                    return;
                }
                
                addToHistory(query, artistName, currentSearchType);
                
                const yandexUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(artistName)}`;
                const youtubeUrl = `https://music.youtube.com/search?q=${encodeURIComponent(artistName)}`;
                const concertsUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(artistName + ' концерт')}`;
                const afishaUrl = `https://www.afisha.ru/search/?q=${encodeURIComponent(artistName)}`;
                const topTracksUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(artistName + ' популярные треки')}`;
                
                const isFav = favorites.includes(artistName);
                
                resultDiv.innerHTML = `
                    <div class="result-card">
                        <div class="found-artist">
                            <div class="found-artist-label">🎯 НАЙДЕН ИСПОЛНИТЕЛЬ</div>
                            <div class="found-artist-name">${escapeHtml(artistName)}</div>
                            <div class="info-text" style="margin-top: 8px;">
                                🔍 По запросу: "${escapeHtml(query)}" (${searchTypeText})
                            </div>
                        </div>
                        
                        <div class="platform-buttons">
                            <button id="favorite-btn-dynamic" class="platform-btn" style="${isFav ? 'background: #ffc107; color: #000;' : 'background: #6c757d;'}">
                                ${isFav ? '★ Удалить из избранного' : '☆ Добавить в избранное'}
                            </button>
                        </div>
                        
                        <div class="section-title">🎵 МУЗЫКА</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${yandexUrl}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                            <button onclick="openLink('${youtubeUrl}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                        </div>
                        
                        <div class="section-title">🎤 ПОПУЛЯРНЫЕ ТРЕКИ</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${topTracksUrl}')" class="platform-btn" style="background: #9b59b6;">🎵 Топ треки</button>
                        </div>
                        
                        <div class="section-title">🎫 КОНЦЕРТЫ И БИЛЕТЫ</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${concertsUrl}')" class="platform-btn concert-btn">🎸 Концерты (Яндекс)</button>
                            <button onclick="openLink('${afishaUrl}')" class="platform-btn afisha-btn">🎫 Билеты (Афиша)</button>
                        </div>
                        
                        <div class="info-text">
                            💡 Нажми на любую кнопку — откроется поиск с исполнителем "${artistName}"
                        </div>
                    </div>
                `;
                
                setState('results', `🎤 Найден: ${artistName}`);
                
                const favBtn = document.getElementById('favorite-btn-dynamic');
                if (favBtn) {
                    if (isFav) {
                        favBtn.onclick = () => removeFromFavorites(artistName);
                    } else {
                        favBtn.onclick = () => addToFavorites(artistName);
                    }
                }
            }, 500);
        }
        
        // ========== УПРАВЛЕНИЕ ИСТОРИЕЙ ==========
        function addToHistory(query, artist, type) {
            const historyItem = {
                query: query,
                artist: artist,
                type: type,
                timestamp: Date.now()
            };
            searchHistory.unshift(historyItem);
            searchHistory = searchHistory.slice(0, 20);
            localStorage.setItem('music_bot_history', JSON.stringify(searchHistory));
        }
        
        // ========== УПРАВЛЕНИЕ ИЗБРАННЫМ ==========
        function loadFavorites() {
            const saved = localStorage.getItem('music_bot_favorites');
            if (saved) {
                favorites = JSON.parse(saved);
            }
        }
        
        function saveFavorites() {
            localStorage.setItem('music_bot_favorites', JSON.stringify(favorites));
        }
        
        function addToFavorites(artistName) {
            if (!favorites.includes(artistName)) {
                favorites.push(artistName);
                saveFavorites();
                tg.showAlert(`⭐ ${artistName} добавлен в избранное`);
                updateSearchResultButtons(artistName);
            }
        }
        
        function removeFromFavorites(artistName) {
            favorites = favorites.filter(a => a !== artistName);
            saveFavorites();
            tg.showAlert(`❌ ${artistName} удалён из избранного`);
            updateSearchResultButtons(artistName);
        }
        
        function updateSearchResultButtons(artistName) {
            const favButton = document.getElementById('favorite-btn-dynamic');
            if (favButton) {
                const isFav = favorites.includes(artistName);
                if (isFav) {
                    favButton.innerHTML = '★ Удалить из избранного';
                    favButton.style.background = '#ffc107';
                    favButton.style.color = '#000';
                    favButton.onclick = () => removeFromFavorites(artistName);
                } else {
                    favButton.innerHTML = '☆ Добавить в избранное';
                    favButton.style.background = '#6c757d';
                    favButton.style.color = 'white';
                    favButton.onclick = () => addToFavorites(artistName);
                }
            }
        }
        
        function openLink(url) {
            tg.openLink(url);
        }
        
        function closeApp() {
            tg.close();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = user.first_name || 'Гость';
            document.getElementById('userId').textContent = user.id || '—';
        } else {
            document.getElementById('userName').textContent = 'Гость';
        }
        
        loadFavorites();
        setState('idle', 'Готов к работе');
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });
    </script>
</body>
</html>
