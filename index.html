<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Bot - Поиск исполнителя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f8f9fa);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 14px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        
        .search-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .result-card {
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .artist-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .artist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 14px;
            margin-bottom: 8px;
        }
        
        .favorite-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin: 0;
            width: auto;
        }
        
        .platform-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        
        .platform-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 14px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-size: 16px;
            color: white;
        }
        
        .yandex-btn { background: #ffcc00; color: #000; }
        .youtube-btn { background: #ff0000; }
        .spotify-btn { background: #1db954; }
        .apple-btn { background: #fa233b; }
        .vk-btn { background: #0077ff; }
        .instagram-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .concert-btn { background: #28a745; }
        .afisha-btn { background: #ff6b6b; }
        
        .info-text {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-top: 12px;
            text-align: center;
        }
        
        .user-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--tg-theme-hint-color, #e9ecef);
            font-size: 13px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border: 3px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-favorites {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .hidden {
            display: none;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            margin: 12px 0 8px 0;
            color: var(--tg-theme-hint-color, #6c757d);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .card {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎵 Музыкальный бот</h1>
            
            <div class="tabs">
                <div class="tab active" onclick="switchTab('search')">🔍 Поиск</div>
                <div class="tab" onclick="switchTab('favorites')">⭐ Избранное</div>
            </div>
            
            <div id="searchTab">
                <div class="search-box">
                    <input type="text" id="artistInput" class="search-input" placeholder="Big Baby Tape, Imagine Dragons, Кино..." autocomplete="off">
                    <button onclick="searchArtist()" class="search-btn">Найти</button>
                </div>
                <div id="result"></div>
            </div>
            
            <div id="favoritesTab" class="hidden">
                <div id="favoritesList"></div>
            </div>
            
            <div class="user-info">
                <span>👤 <span id="userName">Загрузка...</span></span>
                <span>🆔 <span id="userId">—</span></span>
            </div>
        </div>
        
        <button onclick="closeApp()">❌ Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let favorites = [];
        
        function loadFavorites() {
            const saved = localStorage.getItem('music_bot_favorites');
            if (saved) {
                favorites = JSON.parse(saved);
            }
            updateFavoritesList();
        }
        
        function saveFavorites() {
            localStorage.setItem('music_bot_favorites', JSON.stringify(favorites));
            updateFavoritesList();
        }
        
        function addToFavorites(artistName) {
            if (!favorites.includes(artistName)) {
                favorites.push(artistName);
                saveFavorites();
                tg.showAlert(`⭐ ${artistName} добавлен в избранное`);
                updateSearchResultButtons(artistName);
            }
        }
        
        function removeFromFavorites(artistName) {
            favorites = favorites.filter(a => a !== artistName);
            saveFavorites();
            tg.showAlert(`❌ ${artistName} удалён из избранного`);
            updateSearchResultButtons(artistName);
        }
        
        function isFavorite(artistName) {
            return favorites.includes(artistName);
        }
        
        function updateFavoritesList() {
            const favoritesDiv = document.getElementById('favoritesList');
            
            if (favorites.length === 0) {
                favoritesDiv.innerHTML = `
                    <div class="empty-favorites">
                        ⭐ Нет избранных исполнителей<br>
                        Добавьте исполнителя через поиск
                    </div>
                `;
                return;
            }
            
            favoritesDiv.innerHTML = favorites.map(artist => `
                <div class="artist-item">
                    <div class="artist-name">🎤 ${escapeHtml(artist)}</div>
                    <button class="favorite-btn" onclick="removeFromFavorites('${escapeHtml(artist).replace(/'/g, "\\'")}')" style="color: #ffc107;">★</button>
                </div>
            `).join('');
        }
        
        function updateSearchResultButtons(artistName) {
            const favButton = document.getElementById('favorite-btn-dynamic');
            if (favButton) {
                const isFav = isFavorite(artistName);
                if (isFav) {
                    favButton.innerHTML = '★ Удалить из избранного';
                    favButton.style.background = '#ffc107';
                    favButton.style.color = '#000';
                    favButton.onclick = () => removeFromFavorites(artistName);
                } else {
                    favButton.innerHTML = '☆ Добавить в избранное';
                    favButton.style.background = '#6c757d';
                    favButton.style.color = 'white';
                    favButton.onclick = () => addToFavorites(artistName);
                }
            }
        }
        
        function searchArtist() {
            const query = document.getElementById('artistInput').value.trim();
            if (!query) {
                tg.showAlert('Введите имя исполнителя');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>🔍 Ищем ссылки...</div>';
            
            // === МУЗЫКАЛЬНЫЕ ПЛАТФОРМЫ ===
            const yandexUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(query)}`;
            const youtubeUrl = `https://music.youtube.com/search?q=${encodeURIComponent(query)}`;
            const spotifyUrl = `https://open.spotify.com/search/${encodeURIComponent(query)}`;
            const appleUrl = `https://music.apple.com/ru/search?term=${encodeURIComponent(query)}`;
            
            // === СОЦИАЛЬНЫЕ СЕТИ (ПРЯМОЙ ПОИСК С ВВЕДЁННЫМ ИМЕНЕМ) ===
            // ВКонтакте — открывает поиск с уже введённым именем
            const vkUrl = `https://vk.com/search?q=${encodeURIComponent(query)}`;
            // Instagram — открывает поиск по хештегу
            const instagramUrl = `https://www.instagram.com/explore/tags/${encodeURIComponent(query.replace(/\s/g, ''))}/`;
            
            // === КОНЦЕРТЫ ===
            const concertsUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(query + ' концерт')}`;
            const afishaUrl = `https://www.afisha.ru/search/?q=${encodeURIComponent(query)}`;
            
            const isFav = isFavorite(query);
            
            setTimeout(() => {
                resultDiv.innerHTML = `
                    <div class="result-card">
                        <div class="artist-name">
                            🎤 ${escapeHtml(query)}
                        </div>
                        
                        <div class="platform-buttons">
                            <button id="favorite-btn-dynamic" class="platform-btn" style="${isFav ? 'background: #ffc107; color: #000;' : 'background: #6c757d;'}">
                                ${isFav ? '★ Удалить из избранного' : '☆ Добавить в избранное'}
                            </button>
                        </div>
                        
                        <div class="section-title">🎵 МУЗЫКА</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${yandexUrl}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                            <button onclick="openLink('${youtubeUrl}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                            <button onclick="openLink('${spotifyUrl}')" class="platform-btn spotify-btn">🟢 Spotify</button>
                            <button onclick="openLink('${appleUrl}')" class="platform-btn apple-btn">🍎 Apple Music</button>
                        </div>
                        
                        <div class="section-title">🌐 СОЦИАЛЬНЫЕ СЕТИ</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${vkUrl}')" class="platform-btn vk-btn">📱 ВКонтакте</button>
                            <button onclick="openLink('${instagramUrl}')" class="platform-btn instagram-btn">📷 Instagram</button>
                        </div>
                        
                        <div class="section-title">🎫 КОНЦЕРТЫ И БИЛЕТЫ</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${concertsUrl}')" class="platform-btn concert-btn">🎸 Концерты (Яндекс)</button>
                            <button onclick="openLink('${afishaUrl}')" class="platform-btn afisha-btn">🎫 Билеты (Афиша)</button>
                        </div>
                        
                        <div class="info-text">
                            💡 Нажми на ВКонтакте — откроется поиск с уже введённым именем
                        </div>
                    </div>
                `;
                
                const favBtn = document.getElementById('favorite-btn-dynamic');
                if (favBtn) {
                    if (isFav) {
                        favBtn.onclick = () => removeFromFavorites(query);
                    } else {
                        favBtn.onclick = () => addToFavorites(query);
                    }
                }
            }, 300);
        }
        
        function switchTab(tab) {
            const searchTab = document.getElementById('searchTab');
            const favoritesTab = document.getElementById('favoritesTab');
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'search') {
                searchTab.classList.remove('hidden');
                favoritesTab.classList.add('hidden');
                tabs[0].classList.add('active');
            } else {
                searchTab.classList.add('hidden');
                favoritesTab.classList.remove('hidden');
                tabs[1].classList.add('active');
                updateFavoritesList();
            }
        }
        
        function openLink(url) {
            tg.openLink(url);
        }
        
        function closeApp() {
            tg.close();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = user.first_name || 'Гость';
            document.getElementById('userId').textContent = user.id || '—';
        } else {
            document.getElementById('userName').textContent = 'Гость';
        }
        
        loadFavorites();
        
        document.getElementById('artistInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchArtist();
            }
        });
    </script>
</body>
</html>
