<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Bot - Поиск исполнителя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- PWA / Иконка на экран домой -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2481cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f8f9fa);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 14px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        
        .search-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .result-card {
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .artist-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .platform-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        
        .platform-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 14px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-size: 16px;
            color: white;
        }
        
        .yandex-btn { background: #ffcc00; color: #000; }
        .youtube-btn { background: #ff0000; }
        .concert-btn { background: #28a745; }
        .afisha-btn { background: #ff6b6b; }
        
        .info-text {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-top: 12px;
            text-align: center;
        }
        
        .user-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--tg-theme-hint-color, #e9ecef);
            font-size: 13px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border: 3px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-favorites {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .hidden {
            display: none;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            margin: 12px 0 8px 0;
            color: var(--tg-theme-hint-color, #6c757d);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .popular-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        
        .popular-tag {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .delete-history {
            background: none;
            border: none;
            color: #dc3545;
            font-size: 18px;
            cursor: pointer;
            width: auto;
            margin: 0;
            padding: 0 8px;
        }
        
        .state-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .state-idle { background: #6c757d; }
        .state-searching { background: #ffc107; animation: pulse 1s infinite; }
        .state-results { background: #28a745; }
        
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 8px 12px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 12px;
            font-size: 13px;
        }
        
        .current-state {
            display: flex;
            align-items: center;
        }
        
        .admin-panel {
            margin-top: 20px;
            padding: 16px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 16px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
        }
        
        .admin-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .admin-stat {
            background: var(--tg-theme-secondary-bg-color, #fff);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }
        
        .admin-stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .admin-stat-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .admin-btn.danger {
            background: #dc3545;
        }
        
        .user-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        
        .release-card {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border: 1px solid var(--tg-theme-button-color, #667eea);
            margin: 16px 0;
            border-radius: 16px;
            padding: 16px;
        }
        
        /* ========== СТИЛИ ДЛЯ ИГРЫ ========== */
        .game-container {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #e9ecef);
        }
        
        .game-title {
            font-size: 18px;
            font-weight: 700;
        }
        
        .start-game-btn {
            background: #9b59b6;
            width: auto;
            padding: 8px 20px;
            margin: 0;
            font-size: 14px;
        }
        
        .game-question {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .track-name {
            font-size: 24px;
            font-weight: 700;
            margin: 16px 0;
            line-height: 1.3;
            word-break: break-word;
        }
        
        .game-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }
        
        .game-option {
            padding: 12px;
            border-radius: 12px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
            text-align: center;
        }
        
        .game-option:active {
            transform: scale(0.98);
        }
        
        .game-option.correct {
            background: #28a745;
            color: white;
        }
        
        .game-option.wrong {
            background: #dc3545;
            color: white;
        }
        
        .game-option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .game-score {
            text-align: center;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-top: 12px;
        }
        
        .game-result {
            text-align: center;
            padding: 20px;
        }
        
        .result-stats {
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .result-stats div {
            margin: 8px 0;
        }
        
        @media (max-width: 480px) {
            body { padding: 12px; }
            .card { padding: 18px; }
            .track-name { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎵 Музыкальный бот</h1>
            
            <div class="status-bar">
                <div class="current-state">
                    <span class="state-indicator state-idle" id="stateIndicator"></span>
                    <span id="stateText">Готов к работе</span>
                </div>
                <span>🎤</span>
            </div>
            
            <div class="tabs" id="tabsContainer">
                <div class="tab active" onclick="switchTab('search')">🔍 Поиск</div>
                <div class="tab" onclick="switchTab('favorites')">⭐ Избранное</div>
                <div class="tab" onclick="switchTab('history')">📜 История</div>
                <div class="tab" id="adminTabBtn" style="display: none;" onclick="switchTab('admin')">👑 Админ</div>
            </div>
            
            <div id="searchTab">
                <div class="search-box">
                    <input type="text" id="artistInput" class="search-input" placeholder="Big Baby Tape, Imagine Dragons, Асия, Кино..." autocomplete="off">
                    <button onclick="searchArtist()" class="search-btn">Найти</button>
                </div>
                
                <div class="section-title" style="margin-top: 20px;">🔥 ПОПУЛЯРНЫЕ</div>
                <div class="popular-grid" id="popularArtists"></div>
                
                <div id="result"></div>
                
                <!-- ========== ИГРА "УГАДАЙ ТРЕК" ========== -->
                <div class="game-container" id="gameContainer">
                    <div class="game-header">
                        <span class="game-title">🎮 Угадай трек</span>
                        <button class="start-game-btn" id="startGameBtn" onclick="startGame()">▶ Начать игру</button>
                    </div>
                    <div id="gameContent">
                        <div style="text-align: center; padding: 20px; color: var(--tg-theme-hint-color);">
                            🎵 Нажми «Начать игру», чтобы проверить свои знания!
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="favoritesTab" class="hidden">
                <div id="favoritesList"></div>
            </div>
            
            <div id="historyTab" class="hidden">
                <div id="historyList"></div>
                <button onclick="clearHistory()" style="background: #dc3545;">🗑️ Очистить историю</button>
            </div>
            
            <div id="adminTab" class="hidden">
                <div id="adminContent"></div>
            </div>
            
            <div class="user-info">
                <span>👤 <span id="userName">Загрузка...</span></span>
                <span>🆔 <span id="userId">—</span></span>
            </div>
        </div>
        
        <button onclick="closeApp()">❌ Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const ADMIN_ID = 1044143048;
        
        let currentUserId = null;
        let isAdmin = false;
        
        if (tg.initDataUnsafe?.user) {
            currentUserId = tg.initDataUnsafe.user.id;
            isAdmin = (currentUserId === ADMIN_ID);
            localStorage.setItem('music_bot_user_id', currentUserId);
        } else {
            const savedId = localStorage.getItem('music_bot_user_id');
            if (savedId) {
                currentUserId = parseInt(savedId);
                isAdmin = (currentUserId === ADMIN_ID);
            }
        }
        
        if (isAdmin) {
            document.getElementById('adminTabBtn').style.display = 'block';
        }
        
        const popularArtistsList = [
            "Big Baby Tape", "Imagine Dragons", "Кино", "Земфира", 
            "Miyagi & Эндшпиль", "Моргенштерн", "Rauf & Faik", 
            "Асия", "Eminem", "Billie Eilish", "The Weeknd"
        ];
        
        let globalStats = {
            totalSearches: 0,
            totalFavorites: 0,
            activeUsers: {},
            popularSearches: {},
            userActivities: []
        };
        
        function loadGlobalStats() {
            const saved = localStorage.getItem('music_bot_global_stats');
            if (saved) {
                const data = JSON.parse(saved);
                globalStats.totalSearches = data.totalSearches || 0;
                globalStats.totalFavorites = data.totalFavorites || 0;
                globalStats.popularSearches = data.popularSearches || {};
                globalStats.activeUsers = data.activeUsers || {};
                globalStats.userActivities = data.userActivities || [];
            }
        }
        
        function saveGlobalStats() {
            const toSave = {
                totalSearches: globalStats.totalSearches,
                totalFavorites: globalStats.totalFavorites,
                popularSearches: globalStats.popularSearches,
                activeUsers: globalStats.activeUsers,
                userActivities: globalStats.userActivities.slice(0, 50)
            };
            localStorage.setItem('music_bot_global_stats', JSON.stringify(toSave));
        }
        
        function addActivity(userId, userName, action, details) {
            const activity = {
                userId: userId,
                userName: userName,
                action: action,
                details: details,
                timestamp: Date.now(),
                date: new Date().toLocaleString()
            };
            globalStats.userActivities.unshift(activity);
            if (globalStats.userActivities.length > 50) globalStats.userActivities.pop();
            saveGlobalStats();
        }
        
        function registerActivity() {
            if (!currentUserId) return;
            const userName = user?.first_name || user?.username || 'Аноним';
            if (!globalStats.activeUsers[currentUserId]) {
                globalStats.activeUsers[currentUserId] = {
                    name: userName,
                    firstSeen: Date.now(),
                    lastSeen: Date.now(),
                    searches: 0,
                    favorites: 0
                };
                addActivity(currentUserId, userName, '👋 Первое посещение', 'Пользователь зашел в приложение');
            } else {
                globalStats.activeUsers[currentUserId].lastSeen = Date.now();
                globalStats.activeUsers[currentUserId].name = userName;
            }
            saveGlobalStats();
        }
        
        function registerSearch(query) {
            if (!currentUserId) return;
            globalStats.totalSearches++;
            globalStats.popularSearches[query] = (globalStats.popularSearches[query] || 0) + 1;
            if (globalStats.activeUsers[currentUserId]) {
                globalStats.activeUsers[currentUserId].searches++;
            }
            const userName = user?.first_name || user?.username || 'Аноним';
            addActivity(currentUserId, userName, '🔍 Поиск', `Искал: "${query}"`);
            saveGlobalStats();
            registerActivity();
        }
        
        function registerFavorite(artistName) {
            if (!currentUserId) return;
            globalStats.totalFavorites++;
            if (globalStats.activeUsers[currentUserId]) {
                globalStats.activeUsers[currentUserId].favorites++;
            }
            const userName = user?.first_name || user?.username || 'Аноним';
            addActivity(currentUserId, userName, '⭐ Избранное', `Добавил: ${artistName}`);
            saveGlobalStats();
        }
        
        function setState(newState, message) {
            const indicator = document.getElementById('stateIndicator');
            const stateText = document.getElementById('stateText');
            indicator.className = 'state-indicator';
            if (newState === 'idle') indicator.classList.add('state-idle');
            else if (newState === 'searching') indicator.classList.add('state-searching');
            else if (newState === 'results') indicator.classList.add('state-results');
            stateText.textContent = message;
        }
        
        let favorites = [];
        
        function loadFavorites() {
            const saved = localStorage.getItem('music_bot_favorites');
            if (saved) favorites = JSON.parse(saved);
            updateFavoritesList();
        }
        
        function saveFavorites() {
            localStorage.setItem('music_bot_favorites', JSON.stringify(favorites));
            updateFavoritesList();
        }
        
        function addToFavorites(artistName) {
            if (!favorites.includes(artistName)) {
                favorites.push(artistName);
                saveFavorites();
                registerFavorite(artistName);
                tg.showAlert(`⭐ ${artistName} добавлен в избранное`);
                updateSearchResultButtons(artistName);
            }
        }
        
        function removeFromFavorites(artistName) {
            favorites = favorites.filter(a => a !== artistName);
            saveFavorites();
            tg.showAlert(`❌ ${artistName} удалён из избранного`);
            updateSearchResultButtons(artistName);
        }
        
        function isFavorite(artistName) {
            return favorites.includes(artistName);
        }
        
        function updateFavoritesList() {
            const favoritesDiv = document.getElementById('favoritesList');
            if (favorites.length === 0) {
                favoritesDiv.innerHTML = `<div class="empty-favorites">⭐ Нет избранных исполнителей<br>Добавьте исполнителя через поиск</div>`;
                return;
            }
            favoritesDiv.innerHTML = favorites.map(artist => `
                <div class="history-item" onclick="searchArtistByName('${escapeHtml(artist).replace(/'/g, "\\'")}')">
                    <span>🎤 ${escapeHtml(artist)}</span>
                    <button class="delete-history" onclick="event.stopPropagation(); removeFromFavorites('${escapeHtml(artist).replace(/'/g, "\\'")}')">🗑️</button>
                </div>
            `).join('');
        }
        
        function updateSearchResultButtons(artistName) {
            const favButton = document.getElementById('favorite-btn-dynamic');
            if (favButton) {
                const isFav = isFavorite(artistName);
                if (isFav) {
                    favButton.innerHTML = '★ Удалить из избранного';
                    favButton.style.background = '#ffc107';
                    favButton.style.color = '#000';
                    favButton.onclick = () => removeFromFavorites(artistName);
                } else {
                    favButton.innerHTML = '☆ Добавить в избранное';
                    favButton.style.background = '#6c757d';
                    favButton.style.color = 'white';
                    favButton.onclick = () => addToFavorites(artistName);
                }
            }
        }
        
        let searchHistory = [];
        
        function loadHistory() {
            const saved = localStorage.getItem('music_bot_history');
            if (saved) searchHistory = JSON.parse(saved);
            updateHistoryList();
        }
        
        function saveHistory() {
            localStorage.setItem('music_bot_history', JSON.stringify(searchHistory));
            updateHistoryList();
        }
        
        function addToHistory(artistName) {
            searchHistory = searchHistory.filter(a => a !== artistName);
            searchHistory.unshift(artistName);
            searchHistory = searchHistory.slice(0, 15);
            saveHistory();
        }
        
        function clearHistory() {
            searchHistory = [];
            saveHistory();
            tg.showAlert('История очищена');
        }
        
        function updateHistoryList() {
            const historyDiv = document.getElementById('historyList');
            if (searchHistory.length === 0) {
                historyDiv.innerHTML = `<div class="empty-favorites">📜 История пуста<br>Поищите исполнителей, они появятся здесь</div>`;
                return;
            }
            historyDiv.innerHTML = searchHistory.map(artist => `
                <div class="history-item" onclick="searchArtistByName('${escapeHtml(artist).replace(/'/g, "\\'")}')">
                    <span>🎤 ${escapeHtml(artist)}</span>
                    <button class="delete-history" onclick="event.stopPropagation(); removeFromHistory('${escapeHtml(artist).replace(/'/g, "\\'")}')">🗑️</button>
                </div>
            `).join('');
        }
        
        function removeFromHistory(artistName) {
            searchHistory = searchHistory.filter(a => a !== artistName);
            saveHistory();
        }
        
        function searchArtistByName(artistName) {
            document.getElementById('artistInput').value = artistName;
            searchArtist();
        }
        
        const upcomingReleases = {
            "The Weeknd": { album: "Hurry Up Tomorrow", date: "2025-01-24", type: "Студийный альбом" },
            "Imagine Dragons": { album: "Reflections", date: "2025-03-21", type: "Сборник" },
            "Billie Eilish": { album: null, single: "Новый сингл в 2025" }
        };
        
        function getUpcomingRelease(artistName) {
            for (const [key, release] of Object.entries(upcomingReleases)) {
                if (artistName.toLowerCase().includes(key.toLowerCase())) {
                    return { ...release, found: true, artist: key };
                }
            }
            return { found: false };
        }
        
        function formatReleaseDate(dateStr) {
            if (!dateStr) return null;
            const date = new Date(dateStr);
            const today = new Date();
            const diffDays = Math.ceil((date - today) / (1000 * 60 * 60 * 24));
            const formattedDate = date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            if (diffDays < 0) return { text: `✅ Вышел ${formattedDate}`, isPast: true };
            if (diffDays === 0) return { text: `🚀 СЕГОДНЯ! ${formattedDate}`, isPast: false };
            return { text: `📅 ${formattedDate} (через ${diffDays} дней)`, isPast: false };
        }
        
        function searchArtist() {
            const query = document.getElementById('artistInput').value.trim();
            if (!query) {
                tg.showAlert('Введите имя исполнителя');
                return;
            }
            
            registerSearch(query);
            addToHistory(query);
            setState('searching', `🔍 Ищем "${query}"...`);
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>🔍 Ищем...</div>';
            
            setTimeout(() => {
                const release = getUpcomingRelease(query);
                const yandexUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(query)}`;
                const youtubeUrl = `https://music.youtube.com/search?q=${encodeURIComponent(query)}`;
                const concertsUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(query + ' концерт')}`;
                const afishaUrl = `https://www.afisha.ru/search/?q=${encodeURIComponent(query)}`;
                const topTracksUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(query + ' популярные треки')}`;
                const isFav = isFavorite(query);
                
                let releaseHTML = '';
                if (release.found && (release.album || release.single)) {
                    const dateInfo = release.date ? formatReleaseDate(release.date) : null;
                    releaseHTML = `
                        <div class="release-card">
                            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                                <span style="font-size: 28px;">🚀</span>
                                <div>
                                    <div style="font-size: 12px; color: var(--tg-theme-hint-color);">ПРЕДСТОЯЩИЙ РЕЛИЗ</div>
                                    <div style="font-weight: 700; font-size: 18px;">${release.album || 'Новый релиз'}</div>
                                </div>
                            </div>
                            ${release.type ? `<div style="margin-bottom: 8px;">📀 Тип: ${release.type}</div>` : ''}
                            ${dateInfo ? `<div style="margin-bottom: 8px;">⏰ ${dateInfo.text}</div>` : ''}
                            ${release.single ? `<div style="margin-bottom: 8px;">🎤 ${release.single}</div>` : ''}
                            <button onclick="setReleaseReminder('${escapeHtml(query)}', '${escapeHtml(release.album || 'релиз')}')" style="margin-top: 12px; padding: 8px;">🔔 Напомнить</button>
                        </div>
                    `;
                }
                
                resultDiv.innerHTML = `
                    <div class="result-card">
                        <div class="artist-name">🎤 ${escapeHtml(query)}</div>
                        ${releaseHTML}
                        <div class="platform-buttons">
                            <button id="favorite-btn-dynamic" class="platform-btn" style="${isFav ? 'background: #ffc107; color: #000;' : 'background: #6c757d;'}">
                                ${isFav ? '★ Удалить из избранного' : '☆ Добавить в избранное'}
                            </button>
                        </div>
                        <div class="section-title">🎵 МУЗЫКА</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${yandexUrl}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                            <button onclick="openLink('${youtubeUrl}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                        </div>
                        <div class="section-title">🎤 ПОПУЛЯРНЫЕ ТРЕКИ</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${topTracksUrl}')" class="platform-btn" style="background: #9b59b6;">🎵 Топ треки</button>
                        </div>
                        <div class="section-title">🎫 КОНЦЕРТЫ И БИЛЕТЫ</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${concertsUrl}')" class="platform-btn concert-btn">🎸 Концерты (Яндекс)</button>
                            <button onclick="openLink('${afishaUrl}')" class="platform-btn afisha-btn">🎫 Билеты (Афиша)</button>
                        </div>
                    </div>
                `;
                setState('results', `🎤 Найден: ${query}`);
                updateSearchResultButtons(query);
            }, 300);
        }
        
        function setReleaseReminder(artistName, releaseName) {
            tg.showAlert(`🔔 Напомню о выходе "${releaseName}" ${artistName} в день релиза!`);
            let reminders = JSON.parse(localStorage.getItem('release_reminders') || '[]');
            reminders.push({ artist: artistName, release: releaseName, setAt: Date.now() });
            localStorage.setItem('release_reminders', JSON.stringify(reminders));
        }
        
        function showAdminPanel() {
            if (!isAdmin) return;
            const adminContent = document.getElementById('adminContent');
            const sortedSearches = Object.entries(globalStats.popularSearches).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const sortedUsers = Object.entries(globalStats.activeUsers).sort((a, b) => b[1].lastSeen - a[1].lastSeen);
            
            adminContent.innerHTML = `
                <div class="admin-panel">
                    <div class="admin-title">📊 ОБЩАЯ СТАТИСТИКА</div>
                    <div class="admin-stats">
                        <div class="admin-stat"><div class="admin-stat-value">${globalStats.totalSearches}</div><div class="admin-stat-label">Всего поисков</div></div>
                        <div class="admin-stat"><div class="admin-stat-value">${globalStats.totalFavorites}</div><div class="admin-stat-label">В избранное</div></div>
                        <div class="admin-stat"><div class="admin-stat-value">${Object.keys(globalStats.activeUsers).length}</div><div class="admin-stat-label">Пользователей</div></div>
                        <div class="admin-stat"><div class="admin-stat-value">${favorites.length}</div><div class="admin-stat-label">Ваших избранных</div></div>
                    </div>
                    <div class="admin-title">🔥 ПОПУЛЯРНЫЕ ЗАПРОСЫ</div>
                    ${sortedSearches.map(([q, c]) => `<div class="history-item"><span>🎤 ${escapeHtml(q)}</span><span>${c} раз</span></div>`).join('') || '<div class="info-text">Нет данных</div>'}

                    ${sortedUsers.map(([id, data]) => `<div class="user-item"><div><strong>${escapeHtml(data.name)}</strong><div style="font-size:11px;">ID: ${id}</div></div><div>🔍 ${data.searches || 0} ⭐ ${data.favorites || 0}</div></div>`).join('')}
                    <button onclick="clearAllStats()" class="admin-btn danger">🗑️ Сбросить статистику</button>
                </div>
            `;
        }
        
        function clearAllStats() {
            if (confirm('Сбросить всю статистику?')) {
                globalStats = { totalSearches: 0, totalFavorites: 0, activeUsers: {}, popularSearches: {}, userActivities: [] };
                saveGlobalStats();
                showAdminPanel();
                tg.showAlert('✅ Статистика сброшена');
            }
        }
        
        function loadPopularArtists() {
            const popularDiv = document.getElementById('popularArtists');
            popularDiv.innerHTML = popularArtistsList.map(artist => `
                <span class="popular-tag" onclick="searchArtistByName('${escapeHtml(artist).replace(/'/g, "\\'")}')">
                    🎤 ${artist}
                </span>
            `).join('');
        }
        
        function switchTab(tab) {
            document.getElementById('searchTab').classList.add('hidden');
            document.getElementById('favoritesTab').classList.add('hidden');
            document.getElementById('historyTab').classList.add('hidden');
            document.getElementById('adminTab').classList.add('hidden');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            if (tab === 'search') {
                document.getElementById('searchTab').classList.remove('hidden');
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                loadPopularArtists();
                setState('idle', 'Готов к поиску');
            } else if (tab === 'favorites') {
                document.getElementById('favoritesTab').classList.remove('hidden');
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                updateFavoritesList();
            } else if (tab === 'history') {
                document.getElementById('historyTab').classList.remove('hidden');
                document.querySelector('.tab:nth-child(3)').classList.add('active');
                updateHistoryList();
            } else if (tab === 'admin' && isAdmin) {
                document.getElementById('adminTab').classList.remove('hidden');
                document.getElementById('adminTabBtn').classList.add('active');
                showAdminPanel();
            }
        }
        
        function openLink(url) { tg.openLink(url); }
        function closeApp() { tg.close(); }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== ИГРА "УГАДАЙ ТРЕК" (ТВОИ ИСПОЛНИТЕЛИ) ==========

            "Платина", "Yanix", "ЛСП", "T-Fest", "FEDUK"
        ];
        
        // Твои треки из второго HTML
        const tracksDatabase = [
            // Асия
            { track: "Останься", artist: "Асия" },
            { track: "Твой поцелуй", artist: "Асия" },
            // Мари Краймбрери

            { track: "Мне так хорошо", artist: "Мари Краймбрери" },

            // INSTASAMKA
            { track: "За деньги да", artist: "INSTASAMKA" },
            { track: "Волосы назад", artist: "INSTASAMKA" },
            { track: "Отключаю телефон", artist: "INSTASAMKA" },

            { track: "Силиконовый гном", artist: "Мэйби Бэйби" },

            { track: "Втюрилась", artist: "Дора" },

            { track: "Там, за облаками", artist: "NЮ" },
            { track: "Никто", artist: "NЮ" },
            { track: "Некуда бежать", artist: "NЮ" },
            { track: "Я тебя обидел", artist: "NЮ" },
            { track: "Если сгорим", artist: "NЮ" },
            { track: "Вороны", artist: "NЮ" },
            // M.Hustler
            { track: "Успей вернуться", artist: "M.Hustler" },
            { track: "На каблучках", artist: "M.Hustler" },
            { track: "Он тоже любит дым", artist: "M.Hustler" },
            { track: "Fly Away", artist: "M.Hustler" },
            // Другие
            { track: "Кукла колдуна", artist: "Король и Шут" },
            { track: "Шелк", artist: "Ваня Дмитриенко" },

            { track: "Ножевой", artist: "A.V.G" },
            { track: "Где прошла ты", artist: "Кравц" }
        ];
        
        let gameQuestions = [];
        let currentQuestionIndex = 0;
        let gameScore = 0;
        let gameActive = false;
        let gameStats = {
            gamesPlayed: 0,
            totalScore: 0,
            bestScore: 0
        };
        
        function loadGameStats() {
            const saved = localStorage.getItem('music_bot_game_stats');
            if (saved) {
                gameStats = JSON.parse(saved);
            }
        }
        
        function saveGameStats() {
            localStorage.setItem('music_bot_game_stats', JSON.stringify(gameStats));
        }
        
        function generateRandomQuestion() {
            const randomIndex = Math.floor(Math.random() * tracksDatabase.length);
            const correctTrack = tracksDatabase[randomIndex];
            const correctArtist = correctTrack.artist;
            
            let otherArtists = allArtists.filter(a => a !== correctArtist);
            for (let i = otherArtists.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [otherArtists[i], otherArtists[j]] = [otherArtists[j], otherArtists[i]];
            }
            const wrongOptions = otherArtists.slice(0, 3);
            const allOptions = [correctArtist, ...wrongOptions];
            
            for (let i = allOptions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allOptions[i], allOptions[j]] = [allOptions[j], allOptions[i]];
            }
            
            return {
                track: correctTrack.track,
                correct: correctArtist,
                options: allOptions
            };
        }
        
        function startGame() {
            gameQuestions = [];
            for (let i = 0; i < 10; i++) {
                gameQuestions.push(generateRandomQuestion());
            }
            
            currentQuestionIndex = 0;
            gameScore = 0;
            gameActive = true;
            
            const startBtn = document.getElementById('startGameBtn');
            startBtn.textContent = '🎮 Игра идёт...';
            startBtn.style.background = '#28a745';
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            showGameQuestion();
        }
        
        function showGameQuestion() {
            const gameContent = document.getElementById('gameContent');
            
            if (currentQuestionIndex >= gameQuestions.length) {
                endGame();
                return;
            }
            
            const question = gameQuestions[currentQuestionIndex];
            const percent = Math.round((gameScore / gameQuestions.length) * 100);
            
            let optionsHtml = '';
            for (let i = 0; i < question.options.length; i++) {
                optionsHtml += `<div class="game-option" onclick="checkGameAnswer('${escapeHtml(question.options[i])}', '${escapeHtml(question.correct)}')">${escapeHtml(question.options[i])}</div>`;
            }
            
            gameContent.innerHTML = `
                <div class="game-question">
                    <div style="font-size: 13px; color: var(--tg-theme-hint-color);">🎵 Вопрос ${currentQuestionIndex + 1}/${gameQuestions.length}</div>
                    <div class="track-name">"${escapeHtml(question.track)}"</div>
                    <div style="font-size: 13px; color: var(--tg-theme-hint-color);">Кто исполнитель?</div>
                </div>
                <div class="game-options" id="gameOptions">
                    ${optionsHtml}
                </div>
                <div class="game-score">🎯 Счёт: ${gameScore} / ${gameQuestions.length} (${percent}%)</div>
            `;
        }
        
        function checkGameAnswer(selected, correct) {
            if (!gameActive) return;
            
            const optionsDiv = document.getElementById('gameOptions');
            if (!optionsDiv) return;
            
            const options = optionsDiv.querySelectorAll('.game-option');
            gameActive = false;
            
            for (let option of options) {
                if (option.textContent === correct) {
                    option.classList.add('correct');
                }
                if (option.textContent === selected && selected !== correct) {
                    option.classList.add('wrong');
                }
                option.style.pointerEvents = 'none';
            }
            
            if (selected === correct) {
                gameScore++;
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }
            
            setTimeout(() => {
                currentQuestionIndex++;
                gameActive = true;
                showGameQuestion();
            }, 1000);
        }
        
        function endGame() {
            gameActive = false;
            
            const total = gameQuestions.length;
            const percent = Math.round((gameScore / total) * 100);
            
            gameStats.gamesPlayed++;
            gameStats.totalScore += gameScore;
            if (gameScore > gameStats.bestScore) {
                gameStats.bestScore = gameScore;
            }
            saveGameStats();
            
            let message = '';
            if (percent === 100) message = '🏆 ИДЕАЛЬНО! Ты настоящий меломан! 🏆';
            else if (percent >= 80) message = '🎵 Отлично! Ты хорошо знаешь музыку! 🎵';
            else if (percent >= 60) message = '👍 Неплохо! Но есть куда расти! 👍';
            else message = '🎧 Слушай больше музыки и возвращайся! 🎧';
            
            const gameContent = document.getElementById('gameContent');
            gameContent.innerHTML = `
                <div class="game-result">
                    <h3>🎉 ИГРА ЗАКОНЧЕНА! 🎉</h3>
                    <div class="result-stats">
                        <div>${message}</div>
                        <div style="font-size: 24px; font-weight: 700; margin: 16px 0;">${gameScore} / ${total} (${percent}%)</div>
                        <div>⭐ Лучший результат: ${gameStats.bestScore} / ${total}</div>
                        <div>🎮 Сыграно игр: ${gameStats.gamesPlayed}</div>
                    </div>
                </div>
            `;
            
            const startBtn = document.getElementById('startGameBtn');
            startBtn.textContent = '🔄 Сыграть снова';
            startBtn.style.background = '#9b59b6';
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
        }
        
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = user.first_name || 'Гость';
            document.getElementById('userId').textContent = user.id || '—';
            registerActivity();
        } else {
            document.getElementById('userName').textContent = 'Гость';
            document.getElementById('userId').textContent = '—';
        }
        
        loadGlobalStats();
        loadFavorites();
        loadHistory();
        loadPopularArtists();
        loadGameStats();
        setState('idle', 'Готов к работе');
        
        document.getElementById('artistInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchArtist();
        });
    </script>
