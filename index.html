<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container { max-width: 500px; width: 100%; margin: 0 auto; }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        /* Меню */
        .menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            min-height: 60vh;
        }
        
        .menu-btn {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 60px;
            padding: 14px 28px;
            width: 260px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .menu-btn:active { transform: scale(0.96); }
        .menu-icon { font-size: 38px; display: block; }
        .menu-title { font-size: 22px; font-weight: 700; color: white; }
        .menu-desc { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 4px; }
        
        /* Общие */
        .back-btn {
            background: rgba(0,0,0,0.5);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            margin-bottom: 16px;
            cursor: pointer;
            display: inline-block;
        }
        
        .search-box { display: flex; gap: 10px; margin: 12px 0; }
        
        .search-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #ddd;
            font-size: 15px;
            background: white;
        }
        
        .search-btn {
            background: #2481cc;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        .section-title {
            font-size: 12px;
            font-weight: 600;
            margin: 12px 0 6px;
            color: #6c757d;
            text-transform: uppercase;
        }
        
        .popular-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        
        .popular-tag {
            background: #2481cc;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }
        
        .result-card {
            background: rgba(240, 242, 245, 0.9);
            border-radius: 20px;
            padding: 14px;
            margin-top: 16px;
        }
        
        .artist-name { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        
        .platform-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        
        .platform-btn {
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            border: none;
            color: white;
        }
        
        .yandex-btn { background: #ffcc00; color: #000; }
        .youtube-btn { background: #ff0000; }
        .vk-btn { background: #0077ff; }
        .spotify-btn { background: #1db954; }
        
        /* Кнопка подписки */
        .subscribe-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-top: 12px;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            border: none;
            color: white;
        }
        
        .subscribe-btn.subscribed { background: linear-gradient(135deg, #28a745, #20c997); }
        
        /* Подписки */
        .subscription-item {
            background: rgba(0,0,0,0.05);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .unsub-btn {
            background: #dc3545;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        
        /* История */
        .history-item {
            background: rgba(0,0,0,0.05);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .history-query { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .history-date { font-size: 11px; color: gray; }
        
        /* Игра */
        .game-option {
            background: #e9ecef;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
            margin: 8px 0;
        }
        
        .game-option.correct { background: #28a745; color: white; }
        .game-option.wrong { background: #dc3545; color: white; }
        
        .track-name { font-size: 20px; font-weight: bold; margin: 16px 0; text-align: center; }
        
        /* Анимации */
        .loading-spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 10px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #2481cc;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .notification-toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            color: white;
            z-index: 150;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- ГЛАВНОЕ МЕНЮ -->
        <div id="menuScreen" class="menu-screen">
            <div class="menu-btn" id="goToMusicBtn">
                <span class="menu-icon">🎵</span>
                <div class="menu-title">Музыка</div>
                <div class="menu-desc">Поиск треков и исполнителей</div>
            </div>
            <div class="menu-btn" id="goToGameBtn">
                <span class="menu-icon">🎮</span>
                <div class="menu-title">Игра</div>
                <div class="menu-desc">Угадай исполнителя</div>
            </div>
            <div class="menu-btn" id="goToHistoryBtn">
                <span class="menu-icon">📜</span>
                <div class="menu-title">История</div>
                <div class="menu-desc">Ваши поиски</div>
            </div>
            <div class="menu-btn" id="goToSubscriptionsBtn">
                <span class="menu-icon">🔔</span>
                <div class="menu-title">Подписки</div>
                <div class="menu-desc">Мои исполнители</div>
            </div>
        </div>

        <!-- МУЗЫКА -->
        <div id="musicScreen" class="hidden">
            <button class="back-btn" id="backToMenuFromMusic">← Назад</button>
            <div class="card">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Асия, Imagine Dragons...">
                    <button id="doSearchBtn" class="search-btn">Найти</button>
                </div>
                <div class="section-title">🔥 ПОПУЛЯРНЫЕ</div>
                <div class="popular-grid" id="popularGrid"></div>
                <div id="musicResult"></div>
            </div>
        </div>

        <!-- ИГРА -->
        <div id="gameScreen" class="hidden">
            <button class="back-btn" id="backToMenuFromGame">← Назад</button>
            <div class="card">
                <div style="text-align: center;">
                    <button id="startGameBtn" style="background:#9b59b6; border:none; padding:10px 24px; border-radius:40px; color:white; font-weight:bold;">▶ Начать игру</button>
                </div>
                <div id="gameContent"></div>
            </div>
        </div>

        <!-- ИСТОРИЯ -->
        <div id="historyScreen" class="hidden">
            <button class="back-btn" id="backToMenuFromHistory">← Назад</button>
            <div class="card">
                <div class="section-title">📜 ИСТОРИЯ ПОИСКА</div>
                <div id="historyList"></div>
                <button id="clearHistoryBtn" class="subscribe-btn" style="background: #dc3545; margin-top: 16px;">🗑 Очистить историю</button>
            </div>
        </div>

        <!-- ПОДПИСКИ -->
        <div id="subscriptionsScreen" class="hidden">
            <button class="back-btn" id="backToMenuFromSubs">← Назад</button>
            <div class="card">
                <div class="section-title">🔔 МОИ ПОДПИСКИ</div>
                <div id="subscriptionsList"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ========== ПЕРЕМЕННЫЕ ==========
        let subscriptions = [];
        let searchHistory = [];

        // ========== УПРАВЛЕНИЕ ЭКРАНАМИ ==========
        function showScreen(screenId) {
            document.querySelectorAll('#menuScreen, #musicScreen, #gameScreen, #historyScreen, #subscriptionsScreen').forEach(s => {
                s.classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        document.getElementById('goToMusicBtn').onclick = () => { showScreen('musicScreen'); loadPopularArtists(); };
        document.getElementById('goToGameBtn').onclick = () => { showScreen('gameScreen'); };
        document.getElementById('goToHistoryBtn').onclick = () => { showScreen('historyScreen'); loadSearchHistory(); };
        document.getElementById('goToSubscriptionsBtn').onclick = () => { showScreen('subscriptionsScreen'); loadSubscriptionsList(); };
        
        document.getElementById('backToMenuFromMusic').onclick = () => { showScreen('menuScreen'); };
        document.getElementById('backToMenuFromGame').onclick = () => { showScreen('menuScreen'); };
        document.getElementById('backToMenuFromHistory').onclick = () => { showScreen('menuScreen'); };
        document.getElementById('backToMenuFromSubs').onclick = () => { showScreen('menuScreen'); };

        // ========== ИСТОРИЯ ==========
        function loadSearchHistory() {
            const saved = localStorage.getItem('search_history');
            searchHistory = saved ? JSON.parse(saved) : [];
            displaySearchHistory();
        }

        function saveSearchHistory() {
            localStorage.setItem('search_history', JSON.stringify(searchHistory.slice(0, 50)));
        }

        function addToHistory(query, type) {
            searchHistory.unshift({ query: query, type: type, date: new Date().toLocaleString() });
            if (searchHistory.length > 50) searchHistory.pop();
            saveSearchHistory();
            
            // Отправляем в бот
            tg.sendData(JSON.stringify({ action: 'add_to_history', value: JSON.stringify({ query: query, type: type }) }));
        }

        function displaySearchHistory() {
            const container = document.getElementById('historyList');
            if (searchHistory.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:gray;">📜 История поиска пуста</div>';
                return;
            }
            container.innerHTML = searchHistory.map(item => `
                <div class="history-item" onclick="repeatSearch('${escapeHtml(item.query)}')">
                    <div class="history-query">${item.type === 'artist' ? '🎤' : '🎵'} ${escapeHtml(item.query)}</div>
                    <div class="history-date">${item.date}</div>
                </div>
            `).join('');
        }

        window.repeatSearch = function(query) {
            document.getElementById('searchInput').value = query;
            performSearch();
            showScreen('musicScreen');
        };

        document.getElementById('clearHistoryBtn').onclick = () => {
            if (confirm('Очистить историю?')) {
                searchHistory = [];
                saveSearchHistory();
                displaySearchHistory();
                showNotification('🗑 История очищена');
            }
        };

        // ========== ПОДПИСКИ ==========
        function loadSubscriptionsList() {
            const container = document.getElementById('subscriptionsList');
            container.innerHTML = '<div style="text-align:center; padding:20px;"><div class="loading-spinner"></div><div>Загрузка подписок...</div></div>';
            
            // Отправляем запрос в бот
            tg.sendData(JSON.stringify({ action: 'get_subscriptions' }));
            
            // Таймаут через 5 секунд
            setTimeout(() => {
                if (container.innerHTML.includes('Загрузка')) {
                    container.innerHTML = `
                        <div style="text-align:center; padding:20px; color:gray;">
                            ⚠️ Не удалось загрузить подписки<br>
                            <button onclick="loadSubscriptionsList()" style="margin-top:10px; padding:8px 16px; border-radius:20px; border:none; background:#2481cc; color:white;">🔄 Повторить</button>
                        </div>
                    `;
                }
            }, 5000);
        }

        function updateSubscriptionsList(subsData) {
            const container = document.getElementById('subscriptionsList');
            subscriptions = subsData.subscriptions || [];
            
            if (subscriptions.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:gray;">🔔 У вас пока нет подписок<br><br>Найдите исполнителя и нажмите «Подписаться на новинки»</div>';
                return;
            }
            
            container.innerHTML = subscriptions.map(artist => `
                <div class="subscription-item">
                    <div>
                        <div style="font-weight: 700;">🎤 ${escapeHtml(artist.name)}</div>
                        <div style="font-size: 11px; color: gray;">Подписан: ${new Date(artist.subscribed_at * 1000).toLocaleDateString()}</div>
                    </div>
                    <button class="unsub-btn" onclick="unsubscribeArtist('${escapeHtml(artist.name)}')">Отписаться</button>
                </div>
            `).join('');
        }

        window.unsubscribeArtist = function(artistName) {
            tg.sendData(JSON.stringify({ action: 'unsubscribe', artist: artistName }));
            showNotification(`🔕 Отписка от ${artistName}...`);
            subscriptions = subscriptions.filter(s => s.name !== artistName);
            updateSubscriptionsList({ subscriptions: subscriptions });
        };

        window.subscribeToArtist = function(artistName, artistId) {
            tg.sendData(JSON.stringify({ action: 'subscribe', artist: artistName, artist_id: artistId || '' }));
            showNotification(`✅ Подписка на ${artistName} оформлена!`);
        };

        // ========== ОБРАБОТКА ОТВЕТОВ ОТ БОТА ==========
        tg.onEvent('web_app_data_send', function(data) {
            console.log("📨 Получены данные от бота:", data);
            try {
                const response = JSON.parse(data);
                if (response.subscriptions) {
                    console.log("✅ Обновляем подписки, найдено:", response.subscriptions.length);
                    updateSubscriptionsList(response);
                }
                if (response.type === 'subscription_success') {
                    showNotification(response.message);
                    loadSubscriptionsList();
                }
                if (response.type === 'unsubscribe_success') {
                    showNotification(response.message);
                }
                if (response.type === 'subscription_error') {
                    showNotification(response.message || '❌ Ошибка подписки');
                }
            } catch(e) {
                console.log("Не JSON данные:", data);
            }
        });

        // ========== ПОИСК ==========
        const tracksDatabase = [
            { track: "Останься", artist: "Асия" },
            { track: "Твой поцелуй", artist: "Асия" },
            { track: "Believer", artist: "Imagine Dragons" },
            { track: "Bad Guy", artist: "Billie Eilish" },
            { track: "Группа крови", artist: "Кино" },
            { track: "Искала", artist: "Земфира" },
            { track: "Cadillac", artist: "Моргенштерн" }
        ];
        
        const popularArtistsList = ["Асия", "Imagine Dragons", "Кино", "Земфира", "Моргенштерн"];

        function loadPopularArtists() {
            document.getElementById('popularGrid').innerHTML = popularArtistsList.map(artist => 
                `<span class="popular-tag" onclick="searchArtist('${escapeHtml(artist)}')">🎤 ${escapeHtml(artist)}</span>`
            ).join('');
        }

        window.searchArtist = function(artistName) {
            document.getElementById('searchInput').value = artistName;
            performSearch();
        };

        function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            addToHistory(query, 'artist');
            
            const links = {
                yandex: `https://music.yandex.ru/search?text=${encodeURIComponent(query)}`,
                youtube: `https://music.youtube.com/search?q=${encodeURIComponent(query)}`,
                vk: `https://vk.com/search?c%5Bq%5D=${encodeURIComponent(query)}&c%5Bsection%5D=audio`,
                spotify: `https://open.spotify.com/search/${encodeURIComponent(query)}`
            };
            
            const isSubscribed = subscriptions.some(s => s.name === query);
            const subscribeBtn = isSubscribed 
                ? `<div class="subscribe-btn subscribed" onclick="unsubscribeArtist('${escapeHtml(query)}')">🔔 Отписаться от новинок</div>`
                : `<div class="subscribe-btn" onclick="subscribeToArtist('${escapeHtml(query)}', '')">🔔 Подписаться на новинки</div>`;
            
            document.getElementById('musicResult').innerHTML = `
                <div class="result-card">
                    <div class="artist-name">🎤 ${escapeHtml(query)}</div>
                    <div class="section-title">Слушать</div>
                    <div class="platform-buttons">
                        <button onclick="tg.openLink('${links.yandex}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                        <button onclick="tg.openLink('${links.youtube}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                        <button onclick="tg.openLink('${links.vk}')" class="platform-btn vk-btn">📱 VK Музыка</button>
                        <button onclick="tg.openLink('${links.spotify}')" class="platform-btn spotify-btn">🎧 Spotify</button>
                    </div>
                    ${subscribeBtn}
                </div>
            `;
        }

        document.getElementById('doSearchBtn').onclick = performSearch;
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });

        // ========== ИГРА ==========
        let gameQuestions = [], currentQ = 0, gameScore = 0, gameActive = false;

        function startGame() {
            gameQuestions = [];
            for(let i = 0; i < 5; i++) {
                const track = tracksDatabase[Math.floor(Math.random() * tracksDatabase.length)];
                gameQuestions.push({ track: track.track, correct: track.artist });
            }
            currentQ = 0;
            gameScore = 0;
            gameActive = true;
            showQuestion();
        }

        function showQuestion() {
            if (currentQ >= gameQuestions.length) { endGame(); return; }
            const q = gameQuestions[currentQ];
            const allArtists = [...new Set(tracksDatabase.map(t => t.artist))];
            const otherArtists = allArtists.filter(a => a !== q.correct);
            const options = [q.correct, ...otherArtists.slice(0, 3)];
            options.sort(() => Math.random() - 0.5);
            
            document.getElementById('gameContent').innerHTML = `
                <div style="text-align:center">
                    <div class="track-name">"${escapeHtml(q.track)}"</div>
                    <div>Кто исполнитель?</div>
                    ${options.map(opt => `<div class="game-option" onclick="checkAnswer('${escapeHtml(opt)}', '${escapeHtml(q.correct)}')">🎤 ${escapeHtml(opt)}</div>`).join('')}
                    <div style="margin-top:12px;">🎯 Счёт: ${gameScore}/${gameQuestions.length}</div>
                </div>
            `;
        }

        window.checkAnswer = function(selected, correct) {
            if (!gameActive) return;
            gameActive = false;
            if (selected === correct) gameScore++;
            currentQ++;
            gameActive = true;
            showQuestion();
        };

        function endGame() {
            document.getElementById('gameContent').innerHTML = `
                <div style="text-align:center; padding:20px">
                    <div style="font-size:28px;">🎉</div>
                    <div style="font-size:20px; font-weight:bold; margin:12px 0;">${gameScore}/${gameQuestions.length}</div>
                    <button onclick="startGame()" style="margin-top:16px; padding:10px 24px; border-radius:40px; border:none; background:#9b59b6; color:white;">🔄 Играть снова</button>
                </div>
            `;
        }

        document.getElementById('startGameBtn').onclick = startGame;

        function showNotification(msg) {
            const toast = document.createElement('div');
            toast.className = 'notification-toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Загрузка
        loadPopularArtists();
        loadSearchHistory();
        
        // Приветствие
        tg.showPopup({ title: "🎵 Music Hub", message: "Добро пожаловать!", buttons: [{ type: "ok" }] });
        
        console.log("✅ Mini App загружен!");
    </script>
</body>
</html>
