<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Hub | Музыкальный центр</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0f0c29, #1a1a3e, #24243e);
            background-attachment: fixed;
            transition: all 0.3s ease;
            padding-bottom: 75px; /* Отступ для нижней навигации */
        }

        /* Нижняя навигационная панель */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 16px 20px;
            z-index: 50;
            transition: transform 0.3s ease;
        }
        
        .bottom-nav.hidden {
            transform: translateY(100%);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            transition: all 0.2s ease;
            min-width: 64px;
        }
        
        .nav-item:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .nav-icon {
            width: 24px;
            height: 24px;
            stroke: rgba(255, 255, 255, 0.6);
            stroke-width: 1.8;
            fill: none;
            transition: all 0.2s ease;
        }
        
        .nav-item.active .nav-icon {
            stroke: #9b59b6;
            stroke-width: 2.2;
        }
        
        .nav-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .nav-item.active .nav-label {
            color: #9b59b6;
        }

        body.music-mode .nav-item.active .nav-icon { stroke: #667eea; }
        body.music-mode .nav-item.active .nav-label { color: #667eea; }
        body.game-mode .nav-item.active .nav-icon { stroke: #e74c3c; }
        body.game-mode .nav-item.active .nav-label { color: #e74c3c; }
        body.ai-mode .nav-item.active .nav-icon { stroke: #9b59b6; }
        body.ai-mode .nav-item.active .nav-label { color: #9b59b6; }
        body.assistant-mode .nav-item.active .nav-icon { stroke: #1abc9c; }
        body.assistant-mode .nav-item.active .nav-label { color: #1abc9c; }

        body.music-mode { background: radial-gradient(circle at 20% 30%, #0f0c29, #1a1a3e, #24243e); }
        body.game-mode { background: radial-gradient(circle at 70% 20%, #1e3c72, #2a5298, #0f2027); }
        body.ai-mode { background: radial-gradient(circle at 30% 70%, #4a00e0, #8e2de2, #1a0033); }
        body.assistant-mode { background: radial-gradient(circle at 50% 50%, #0b8793, #360033, #1a0033); }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(155,89,182,0.4); }
            70% { box-shadow: 0 0 0 15px rgba(155,89,182,0); }
            100% { box-shadow: 0 0 0 0 rgba(155,89,182,0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes slideUp {
            from { transform: translateY(80px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .fullscreen-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 10;
        }
        .fullscreen-page.active { transform: translateX(0); }

        /* Скрываем старое меню */
        .menu-container {
            display: none;
        }

        .currency-chart {
            position: fixed;
            bottom: 75px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 8px 12px;
            z-index: 6;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .currency-title {
            font-size: 8px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .currency-update-time {
            font-size: 7px;
            color: #4facfe;
            font-weight: normal;
        }
        .currency-item { margin-bottom: 6px; }
        .currency-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
        }
        .currency-icon { font-size: 16px; min-width: 30px; }
        .currency-value {
            font-size: 12px;
            font-weight: 700;
            color: white;
            min-width: 55px;
        }
        .currency-change {
            font-size: 9px;
            font-weight: 600;
            padding: 1px 5px;
            border-radius: 12px;
        }
        .change-up { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .change-down { background: rgba(231,76,60,0.2); color: #e74c3c; }
        .bar-container {
            flex: 1;
            height: 16px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 4px;
            font-size: 8px;
            font-weight: 600;
            color: white;
        }
        .usd-fill { background: linear-gradient(90deg, #3498db, #2980b9); }
        .eur-fill { background: linear-gradient(90deg, #2ecc71, #27ae60); }
        .currency-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 7px;
            color: rgba(255,255,255,0.35);
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-top: 8px;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border: none;
            padding: 10px 16px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .back-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.2); }
        .page-title { font-size: 28px; font-weight: 700; color: white; letter-spacing: -0.5px; flex: 1; }

        .glass-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 60px;
            border: none;
            font-size: 15px;
            background: rgba(255,255,255,0.92);
            font-weight: 500;
        }
        .search-input:focus { outline: none; background: white; }
        .search-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 0 24px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .voice-btn {
            background: rgba(155,89,182,0.7);
            border: none;
            width: 48px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .voice-btn.listening { background: #e74c3c; animation: pulseGlow 1.5s infinite; }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            margin: 16px 0 10px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .popular-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .popular-tag {
            background: rgba(255,255,255,0.1);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .popular-tag:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }

        .artist-profile {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .artist-avatar {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .artist-info { flex: 1; }
        .artist-name-large {
            font-size: 22px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        .artist-role { font-size: 12px; color: rgba(255,255,255,0.6); }

        .result-card {
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            animation: scaleIn 0.3s ease;
        }

        .ai-fact-card {
            background: linear-gradient(135deg, rgba(155,89,182,0.2), rgba(142,68,173,0.15));
            border-left: 3px solid #9b59b6;
            border-radius: 16px;
            padding: 14px;
            margin: 16px 0;
        }
        .ai-fact-header { display: flex; gap: 12px; }
        .ai-fact-icon svg { width: 28px; height: 28px; stroke: #b983ff; stroke-width: 1.5; fill: none; }
        .ai-fact-label { font-size: 10px; color: #b983ff; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .ai-fact-text { font-size: 13px; line-height: 1.4; color: rgba(255,255,255,0.9); }
        .ai-fact-refresh {
            background: rgba(155,89,182,0.3);
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: white;
            font-size: 11px;
            margin-top: 8px;
            cursor: pointer;
        }

        .platform-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
        .platform-btn {
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        .platform-btn:active { transform: scale(0.97); }
        .yandex-btn { background: #ffcc00; color: #1a1a2e; }
        .youtube-btn { background: #ff0000; color: white; }

        .bio-section {
            background: rgba(0,0,0,0.25);
            border-radius: 16px;
            padding: 14px;
            margin-top: 16px;
            max-height: 220px;
            overflow-y: auto;
        }
        .bio-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #7b68ee; }
        .bio-text { font-size: 12px; line-height: 1.4; color: rgba(255,255,255,0.85); }
        .bio-wiki-link { color: #b983ff; text-decoration: none; font-size: 11px; display: inline-block; margin-top: 8px; }

        .qr-btn {
            margin-top: 12px;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 14px;
            background: #607d8b;
            color: white;
        }

        .track-name { font-size: 22px; font-weight: 800; margin: 20px 0; color: white; text-align: center; }
        .game-options { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .game-option {
            background: rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .game-option:active { transform: scale(0.97); background: rgba(255,255,255,0.2); }

        .ai-cover-img {
            width: 100%;
            max-width: 200px;
            border-radius: 24px;
            margin: 12px auto;
            display: block;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #9b59b6;
            animation: spin 1s ease infinite;
        }

        .chat-container {
            background: rgba(0,0,0,0.25);
            border-radius: 24px;
            padding: 14px;
            height: 360px;
            overflow-y: auto;
            margin-bottom: 14px;
        }
        .message { margin-bottom: 12px; display: flex; gap: 10px; }
        .message-user { justify-content: flex-end; }
        .message-ai { justify-content: flex-start; }
        .message-bubble {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            line-height: 1.4;
        }
        .message-user .message-bubble { background: #667eea; color: white; border-bottom-right-radius: 6px; }
        .message-ai .message-bubble { background: rgba(255,255,255,0.12); color: white; border-bottom-left-radius: 6px; }
        .message-icon svg { width: 20px; height: 20px; stroke: white; stroke-width: 1.5; fill: none; }

        .random-artist-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .random-artist-name { font-size: 16px; font-weight: 600; color: white; }
        .random-artist-link {
            background: #ffcc00;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }

        .ai-gen-btn {
            margin-top: 12px;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 14px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }

        .settings-fab {
            position: fixed;
            bottom: 85px;
            right: 22px;
            width: 52px;
            height: 52px;
            border-radius: 52px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
        }
        .settings-fab:active { transform: scale(0.92); }
        .settings-fab svg { width: 26px; height: 26px; stroke: white; stroke-width: 1.5; fill: none; }

        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-card {
            background: rgba(20,20,30,0.96);
            backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 320px;
        }
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center; color: white; }
        .settings-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .settings-label { font-size: 14px; font-weight: 500; color: white; }
        .gradient-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
        .gradient-circle {
            width: 48px;
            height: 48px;
            border-radius: 48px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .close-modal, .appearance-btn {
            background: rgba(255,255,255,0.12);
            border: none;
            padding: 12px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .appearance-btn { padding: 8px 14px; font-size: 13px; }

        .notification-toast {
            position: fixed;
            bottom: 150px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 20px;
            text-align: center;
            color: white;
            z-index: 150;
            animation: slideUp 0.3s ease;
            font-size: 13px;
        }

        .user-info { font-size: 11px; text-align: center; margin-top: 12px; color: rgba(255,255,255,0.4); }
        .hidden { display: none; }

        @media (max-width: 480px) {
            .fullscreen-page { padding: 16px; padding-bottom: 80px; }
            .page-title { font-size: 24px; }
            .artist-avatar { width: 55px; height: 55px; }
            .artist-name-large { font-size: 18px; }
            .currency-chart { bottom: 70px; left: 10px; right: 10px; padding: 6px 10px; }
            .settings-fab { bottom: 80px; }
            .nav-item { padding: 6px 8px; min-width: 50px; }
            .nav-label { font-size: 9px; }
        }
    </style>
</head>
<body>
    <!-- Нижняя навигационная панель -->
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item" data-page="music">
            <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M9 18V5L21 3V16"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><path d="M9 12L21 10"/></svg></div>
            <span class="nav-label">Музыка</span>
        </div>
        <div class="nav-item" data-page="game">
            <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M6 11h4M8 9v4"/><path d="M15 12h.01M18 10h.01"/><path d="M4 4h16a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2l-2 4-2-4H6l-2 4-2-4H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg></div>
            <span class="nav-label">Игра</span>
        </div>
        <div class="nav-item" data-page="ai">
            <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2a5 5 0 0 0-5 5c0 2 1 3 2 4l-2 2 4 2 2 4 2-4 4-2-2-2c1-1 2-2 2-4a5 5 0 0 0-5-5z"/><circle cx="12" cy="7" r="1.5" fill="currentColor"/></svg></div>
            <span class="nav-label">AI</span>
        </div>
        <div class="nav-item" data-page="assistant">
            <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.5 8.5 0 0 1-8.5 8.5H7L3 15l4-4"/><path d="M17 3.5L3 13"/><path d="M17 3.5a4.5 4.5 0 0 1 4 4"/></svg></div>
            <span class="nav-label">Ассистент</span>
        </div>
        <div class="nav-item" data-page="randomizer">
            <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M18 4L21 7L18 10"/><path d="M18 14L21 17L18 20"/><path d="M5 7h5a3 3 0 0 1 3 3v4a3 3 0 0 0 3 3h5"/><path d="M3 17h5"/></svg></div>
            <span class="nav-label">Рандом</span>
        </div>
        <div class="nav-item" data-page="mood">
            <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9"/><path d="M8 14c1 2 2.5 3 4 3s3-1 4-3"/><circle cx="9" cy="9" r="1" fill="currentColor"/><circle cx="15" cy="9" r="1" fill="currentColor"/></svg></div>
            <span class="nav-label">Настроение</span>
        </div>
    </div>

    <!-- Курс валют -->
    <div class="currency-chart" id="currencyChart">
        <div class="currency-title">
            <span>💵 КУРС</span>
            <span class="currency-update-time" id="updateTime">🔄 загрузка...</span>
        </div>
        <div id="currencyContent">
            <div style="text-align:center; padding:10px; font-size:11px;">🔄 Загрузка...</div>
        </div>
    </div>

    <!-- Страницы -->
    <div class="fullscreen-page" id="musicPage">
        <div class="page-header">
            <div class="page-title">Музыка</div>
        </div>
        <div class="glass-card">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Асия, Imagine Dragons, Rammstein...">
                <button id="voiceSearchBtn" class="voice-btn"><svg width="20" height="20" viewBox="0 0 24 24" stroke="white" fill="none"><path d="M12 3a4 4 0 0 0-4 4v4a4 4 0 0 0 8 0V7a4 4 0 0 0-4-4z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v3"/></svg></button>
                <button id="doSearchBtn" class="search-btn">Найти</button>
            </div>
            <div class="section-title">Популярные</div>
            <div class="popular-grid" id="popularGrid"></div>
            <div id="musicResult"></div>
        </div>
    </div>

    <div class="fullscreen-page" id="gamePage">
        <div class="page-header"><div class="page-title">Игра</div></div>
        <div class="glass-card"><button id="startGameBtn" style="background:linear-gradient(135deg,#9b59b6,#8e44ad); border:none; padding:14px; border-radius:60px; color:white; font-weight:700; width:100%; margin-bottom:16px;">▶ Начать игру</button><div id="gameContent"><div style="text-align:center; padding:30px; color:rgba(255,255,255,0.5);">Нажми «Начать игру»</div></div></div>
    </div>

    <div class="fullscreen-page" id="aiPage">
        <div class="page-header"><div class="page-title">AI Обложки</div></div>
        <div class="glass-card"><div class="search-box"><input type="text" id="aiPrompt" class="search-input" placeholder="рок группа, гитара..."><button id="generateAIBtn" class="search-btn">Создать</button></div><div id="aiResult" style="text-align:center; margin-top:12px;"><div style="padding:20px; color:rgba(255,255,255,0.5);">✨ Введите описание</div></div></div>
    </div>

    <div class="fullscreen-page" id="assistantPage">
        <div class="page-header"><div class="page-title">Ассистент</div></div>
        <div class="glass-card"><div class="chat-container" id="chatContainer"><div class="message message-ai"><div class="message-icon"><svg width="20" height="20" viewBox="0 0 24 24" stroke="white" fill="none"><path d="M21 11.5a8.5 8.5 0 0 1-8.5 8.5H7L3 15l4-4"/></svg></div><div class="message-bubble">Привет! Напиши имя исполнителя или "грустная песня"</div></div></div><div style="display:flex; gap:10px;"><input type="text" id="chatInput" class="search-input" placeholder="Спроси меня..."><button id="sendChatBtn" class="search-btn">📤</button></div></div>
    </div>

    <div class="fullscreen-page" id="randomizerPage">
        <div class="page-header"><div class="page-title">Рандомайзер</div></div>
        <div class="glass-card"><textarea id="artistListInput" class="search-input" rows="4" placeholder="Асия&#10;Imagine Dragons&#10;Кино, Земфира" style="margin-bottom:12px;"></textarea><div class="popular-grid" id="quickArtistsGrid" style="margin-bottom:16px;"></div><div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;"><input type="number" id="randomCountInput" value="1" min="1" max="20" style="width:70px; padding:10px; border-radius:40px; border:none; text-align:center;"><span style="color:white;">из <span id="totalArtistsCount">0</span> исполнителей</span></div><button id="doRandomizeBtn" class="search-btn" style="background:linear-gradient(135deg,#9b59b6,#8e44ad); width:100%; padding:14px;">🎲 Выбрать</button><div id="randomizerResult" style="margin-top:16px;"></div></div>
    </div>

    <div class="fullscreen-page" id="moodPage">
        <div class="page-header"><div class="page-title">Настроение</div></div>
        <div class="glass-card"><div style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:20px;"><button class="mood-btn" data-mood="happy" style="background:#f1c40f; border:none; padding:14px; border-radius:60px; font-weight:700;">😊 Счастлив</button><button class="mood-btn" data-mood="sad" style="background:#3498db; border:none; padding:14px; border-radius:60px; font-weight:700; color:white;">😢 Грустный</button><button class="mood-btn" data-mood="energetic" style="background:#e74c3c; border:none; padding:14px; border-radius:60px; font-weight:700; color:white;">⚡ Энергичный</button><button class="mood-btn" data-mood="relax" style="background:#2ecc71; border:none; padding:14px; border-radius:60px; font-weight:700; color:white;">😌 Расслабленный</button><button class="mood-btn" data-mood="romantic" style="background:#e84393; border:none; padding:14px; border-radius:60px; font-weight:700; color:white;">💖 Романтичный</button><button class="mood-btn" data-mood="focus" style="background:#1abc9c; border:none; padding:14px; border-radius:60px; font-weight:700; color:white;">📚 Фокус</button></div><div id="moodResult"></div></div>
    </div>

    <!-- Настройки -->
    <div class="settings-fab" id="settingsFab"><svg viewBox="0 0 24 24" stroke="white" fill="none"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04a10 10 0 0 0 14.72 0z"/><path d="M18.2 8.96a1.65 1.65 0 0 0-1.51-1H7.31a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04a10 10 0 0 0 14.72 0z"/></svg></div>
    <div id="settingsModal" class="settings-modal hidden"><div class="modal-card"><div class="modal-title">Оформление</div><div class="settings-row"><span class="settings-label">🎨 Цвет кнопок:</span><input type="color" id="buttonColorPicker" value="#667eea"></div><div class="settings-row"><button class="appearance-btn" id="resetBgBtn">Сбросить</button><button class="appearance-btn" id="uploadBgBtn">📸 Фото</button><button class="appearance-btn" id="colorPickerBtn">🎨 Цвет</button><button class="appearance-btn" id="toggleThemeBtn">🌙 Тёмная</button><input type="file" id="bgImageInput" accept="image/*" style="display:none;"></div><div class="gradient-row"><div class="gradient-circle" style="background:linear-gradient(135deg,#667eea,#764ba2);"></div><div class="gradient-circle" style="background:linear-gradient(135deg,#f093fb,#f5576c);"></div><div class="gradient-circle" style="background:linear-gradient(135deg,#4facfe,#00f2fe);"></div><div class="gradient-circle" style="background:linear-gradient(135deg,#43e97b,#38f9d7);"></div></div><button class="close-modal" id="closeSettingsBtn" style="margin-top:20px; width:100%;">Закрыть</button></div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // === ДАННЫЕ ===
        const tracks = [
            { track: "Останься", artist: "Асия" }, 
            { track: "Твой поцелуй", artist: "Асия" },
            { track: "Believer", artist: "Imagine Dragons" }, 
            { track: "Группа крови", artist: "Кино" },
            { track: "Cadillac", artist: "Моргенштерн" }, 
            { track: "Искала", artist: "Земфира" }
        ];
        
        const facts = {
            "асия": ["Настоящее имя — Анастасия Алентьева", "Родилась 1 сентября 1997 в Белово", "«Останься» — 100+ млн прослушиваний"],
            "кино": ["Группа основана в 1981 в Ленинграде", "Виктор Цой — легендарный лидер", "«Группа крови» — гимн поколения 90-х"],
            "imagine dragons": ["3 премии Grammy", "«Believer» в рекламе FIFA", "Группа из Лас-Вегаса"],
            "моргенштерн": ["Родился в Уфе 17 февраля 1998", "Самый молодой миллионер", "«Cadillac» — 100 млн просмотров"],
            "земфира": ["Родилась в Уфе 26 августа 1976", "Первая женщина, собравшая «Олимпийский»", "Дебютный альбом — 700 000 копий"]
        };
        
        const popular = ["Асия", "Imagine Dragons", "Кино", "Моргенштерн", "Земфира"];

        // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
        function escapeHtml(s) { 
            if (!s) return ''; 
            return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); 
        }
        
        function showNote(msg) { 
            const t = document.createElement('div'); 
            t.className = 'notification-toast'; 
            t.textContent = msg; 
            document.body.appendChild(t); 
            setTimeout(() => t.remove(), 2000); 
        }

        function getFact(artist) {
            const key = artist.toLowerCase();
            for (const [k, f] of Object.entries(facts)) {
                if (key.includes(k) || k.includes(key)) return f[Math.floor(Math.random() * f.length)];
            }
            const dynamicFacts = [
                `🎤 ${artist} — один из самых ярких исполнителей года!`,
                `🔥 Треки ${artist} набирают миллионы прослушиваний`,
                `⭐ Подпишись на ${artist}, чтобы не пропустить новые релизы!`
            ];
            return dynamicFacts[Math.floor(Math.random() * dynamicFacts.length)];
        }

        // === КУРС ВАЛЮТ ===
        let currencyInterval = null;

        async function getExchangeRates() {
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await response.json();
                const usdToRub = data.rates.RUB;
                const eurToRub = data.rates.RUB / data.rates.EUR;
                return { usd: usdToRub, eur: eurToRub };
            } catch(e) {
                console.log('Ошибка получения курса:', e);
                return null;
            }
        }

        async function updateCurrencyChart() {
            const container = document.getElementById('currencyContent');
            const timeElement = document.getElementById('updateTime');
            if (!container) return;
            
            const rates = await getExchangeRates();
            if (!rates) {
                container.innerHTML = '<div style="text-align:center; padding:15px; font-size:11px;">❌ Не удалось загрузить курс</div>';
                return;
            }
            
            const now = new Date();
            const timeString = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            if (timeElement) timeElement.textContent = `🔄 ${timeString}`;
            
            container.innerHTML = `
                <div class="currency-item">
                    <div class="currency-row">
                        <span class="currency-icon">🇺🇸 USD</span>
                        <span class="currency-value">${rates.usd.toFixed(2)} ₽</span>
                    </div>
                </div>
                <div class="currency-item">
                    <div class="currency-row">
                        <span class="currency-icon">🇪🇺 EUR</span>
                        <span class="currency-value">${rates.eur.toFixed(2)} ₽</span>
                    </div>
                </div>
            `;
        }

        function startCurrencyUpdates() {
            updateCurrencyChart();
            if (currencyInterval) clearInterval(currencyInterval);
            currencyInterval = setInterval(updateCurrencyChart, 30000);
        }

        // === НАВИГАЦИЯ ===
        const pages = {
            music: document.getElementById('musicPage'),
            game: document.getElementById('gamePage'),
            ai: document.getElementById('aiPage'),
            assistant: document.getElementById('assistantPage'),
            randomizer: document.getElementById('randomizerPage'),
            mood: document.getElementById('moodPage')
        };
        
        let currentPage = 'music';
        
        function showPage(pageId, mode) {
            // Скрываем все страницы
            Object.keys(pages).forEach(key => {
                if (pages[key]) pages[key].classList.remove('active');
            });
            
            // Показываем выбранную
            if (pages[pageId]) pages[pageId].classList.add('active');
            
            // Обновляем активный пункт в навигации
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.dataset.page === pageId) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            // Меняем фон
            document.body.className = '';
            if (mode) document.body.classList.add(mode + '-mode');
            else if (pageId === 'music') document.body.classList.add('music-mode');
            else if (pageId === 'game') document.body.classList.add('game-mode');
            else if (pageId === 'ai') document.body.classList.add('ai-mode');
            else if (pageId === 'assistant') document.body.classList.add('assistant-mode');
            
            currentPage = pageId;
        }
        
        // Обработчики навигации
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                const pageId = item.dataset.page;
                let mode = '';
                if (pageId === 'music') mode = 'music';
                else if (pageId === 'game') mode = 'game';
                else if (pageId === 'ai') mode = 'ai';
                else if (pageId === 'assistant') mode = 'assistant';
                showPage(pageId, mode);
                
                // Дополнительные действия при открытии страниц
                if (pageId === 'music') loadPopular();
                if (pageId === 'randomizer') { updateTotal(); loadQuick(); }
                
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            };
        });

        // === МУЗЫКА ===
        function loadPopular() { 
            const grid = document.getElementById('popularGrid');
            if (grid) grid.innerHTML = popular.map(a => `<span class="popular-tag" onclick="searchArtist('${a.replace(/'/g, "\\'")}')">🎤 ${a}</span>`).join(''); 
        }
        
        window.searchArtist = function(a) { 
            const input = document.getElementById('searchInput');
            if (input) input.value = a; 
            search(); 
        };
        
        async function getWiki(artist) {
            try {
                const match = { "асия":"Асия (певица)", "кино":"Кино (группа)", "imagine dragons":"Imagine Dragons", "моргенштерн":"Моргенштерн", "земфира":"Земфира" };
                let title = match[artist.toLowerCase()];
                if (!title) {
                    const s = await fetch(`https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(artist)}&format=json&origin=*`);
                    const d = await s.json();
                    if (!d.query?.search?.length) return null;
                    title = d.query.search[0].title;
                }
                const c = await fetch(`https://ru.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=extracts&exintro=0&explaintext=1&format=json&origin=*`);
                const d = await c.json();
                const text = d.query.pages[Object.keys(d.query.pages)[0]]?.extract || "";
                if (!text) return null;
                return { title, text: text.slice(0, 800) + (text.length > 800 ? '...' : ''), url: `https://ru.wikipedia.org/wiki/${encodeURIComponent(title)}` };
            } catch { return null; }
        }
        
        async function search() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            
            const resDiv = document.getElementById('musicResult');
            if (!resDiv) return;
            resDiv.innerHTML = '<div class="loading-spinner"></div><div style="text-align:center;">🔍 Поиск...</div>';
            
            const links = { yandex: `https://music.yandex.ru/search?text=${encodeURIComponent(q)}`, youtube: `https://music.youtube.com/search?q=${encodeURIComponent(q)}` };
            const bio = await getWiki(q);
            const artistTracks = tracks.filter(t => t.artist.toLowerCase().includes(q.toLowerCase()));
            const aiFact = getFact(q);
            
            resDiv.innerHTML = `
                <div class="result-card">
                    <div class="artist-profile">
                        <div class="artist-info">
                            <div class="artist-name-large">${escapeHtml(q)}</div>
                            <div class="artist-role">🎤 Исполнитель</div>
                        </div>
                    </div>
                    <div class="ai-fact-card">
                        <div class="ai-fact-header">
                            <div class="ai-fact-icon"><svg width="24" height="24" viewBox="0 0 24 24" stroke="#b983ff" fill="none"><path d="M12 2a5 5 0 0 0-5 5c0 2 1 3 2 4l-2 2 4 2 2 4 2-4 4-2-2-2c1-1 2-2 2-4a5 5 0 0 0-5-5z"/></svg></div>
                            <div><div class="ai-fact-label">ИИ ФАКТ</div><div class="ai-fact-text">${escapeHtml(aiFact)}</div></div>
                        </div>
                    </div>
                    <div class="section-title">🎧 Слушать</div>
                    <div class="platform-buttons">
                        <button onclick="tg.openLink('${links.yandex}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                        <button onclick="tg.openLink('${links.youtube}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                    </div>
                    ${artistTracks.length ? `<div style="font-size:12px; margin:12px 0; color:rgba(255,255,255,0.6);">🎵 Популярные треки: ${artistTracks.map(t => t.track).join(', ')}</div>` : ''}
                    ${bio ? `<div class="bio-section"><div class="bio-title">📖 ${escapeHtml(bio.title)}</div><div class="bio-text">${escapeHtml(bio.text)}</div><a href="${bio.url}" target="_blank" class="bio-wiki-link">🔗 Читать полностью →</a></div>` : '<div class="bio-section"><div class="bio-title">📖 Биография</div><div class="bio-text">❌ Не найдено</div></div>'}
                </div>
            `;
        }
        
        const doSearchBtn = document.getElementById('doSearchBtn');
        if (doSearchBtn) doSearchBtn.onclick = search;
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') search(); });

        // === ИГРА ===
        let gameQ = [], gameIdx = 0, gameScore = 0, gameActive = false;
        function genQ() { 
            const t = tracks[Math.floor(Math.random() * tracks.length)]; 
            const others = [...new Set(tracks.map(t => t.artist))].filter(a => a !== t.artist).slice(0, 3); 
            let opts = [t.artist, ...others]; 
            for (let i = opts.length - 1; i > 0; i--) { 
                const j = Math.floor(Math.random() * (i + 1)); 
                [opts[i], opts[j]] = [opts[j], opts[i]]; 
            } 
            return { track: t.track, correct: t.artist, options: opts }; 
        }
        function startGame() { 
            gameQ = []; 
            for (let i = 0; i < 6; i++) gameQ.push(genQ()); 
            gameIdx = 0; gameScore = 0; gameActive = true; 
            showGame(); 
        }
        function showGame() { 
            if (gameIdx >= gameQ.length) { endGame(); return; } 
            const q = gameQ[gameIdx]; 
            const content = document.getElementById('gameContent');
            if (!content) return;
            content.innerHTML = `<div style="text-align:center;"><div style="font-size:12px; opacity:0.6;">Вопрос ${gameIdx+1}/${gameQ.length}</div><div class="track-name">"${escapeHtml(q.track)}"</div><div>Кто исполнитель?</div><div class="game-options">${q.options.map(opt => `<div class="game-option" onclick="checkAnswer('${escapeHtml(opt)}', '${escapeHtml(q.correct)}')">${escapeHtml(opt)}</div>`).join('')}</div><div style="margin-top:12px;">🎯 Счёт: ${gameScore}/${gameQ.length}</div></div>`; 
        }
        window.checkAnswer = function(sel, cor) { 
            if (!gameActive) return; 
            if (sel === cor) gameScore++; 
            gameIdx++; 
            showGame(); 
        };
        function endGame() { 
            gameActive = false; 
            const content = document.getElementById('gameContent');
            if (content) {
                content.innerHTML = `<div style="text-align:center; padding:20px;"><div style="font-size:48px;">🎉</div><div style="font-size:28px; font-weight:bold;">${gameScore}/${gameQ.length}</div><button onclick="startGame()" style="background:#9b59b6; border:none; padding:12px 24px; border-radius:60px; color:white; margin-top:16px;">🔄 Сыграть снова</button></div>`;
            }
        }
        const startGameBtn = document.getElementById('startGameBtn');
        if (startGameBtn) startGameBtn.onclick = startGame;

        // === AI ОБЛОЖКИ ===
        async function genCover(p) {
            const div = document.getElementById('aiResult');
            if (!div) return;
            div.innerHTML = `<div class="loading-spinner"></div><div>✨ Создаём...</div>`;
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=512&height=512&nologo=true`;
            const img = new Image();
            img.onload = () => { div.innerHTML = `<div><img src="${url}" class="ai-cover-img"><div style="margin:10px;">🎨 ${escapeHtml(p)}</div></div>`; };
            img.onerror = () => div.innerHTML = `<div style="padding:20px;">❌ Ошибка</div>`;
            img.src = url;
        }
        const generateBtn = document.getElementById('generateAIBtn');
        if (generateBtn) {
            generateBtn.onclick = () => { 
                const p = document.getElementById('aiPrompt').value.trim(); 
                if (p) genCover(p); 
            };
        }

        // === АССИСТЕНТ ===
        async function askBot(q) {
            const low = q.toLowerCase();
            if (!low.includes("песн") && !low.includes("трек") && low.length > 2) {
                const bio = await getWiki(q);
                if (bio) return `📖 **${bio.title}**\n\n${bio.text}\n\n🔗 Читать: ${bio.url}`;
                return `❌ Не нашёл "${q}"`;
            }
            if (low.includes("грустн")) return `😢 **Грустные:**\n"Останься" - Асия\n"Группа крови" - Кино`;
            if (low.includes("весел")) return `😊 **Весёлые:**\n"Believer" - Imagine Dragons`;
            return `🎶 Напиши имя исполнителя или "грустная песня"`;
        }
        function addMsg(text, isUser = false) {
            const cont = document.getElementById('chatContainer');
            if (!cont) return;
            const d = document.createElement('div');
            d.className = `message message-${isUser ? 'user' : 'ai'}`;
            d.innerHTML = isUser ? `<div class="message-bubble">${escapeHtml(text)}</div><div class="message-icon">👤</div>` : `<div class="message-icon">🤖</div><div class="message-bubble">${text.replace(/\n/g, '<br>')}</div>`;
            cont.appendChild(d); 
            cont.scrollTop = cont.scrollHeight;
        }
        async function sendMsg() {
            const inp = document.getElementById('chatInput');
            if (!inp) return;
            const msg = inp.value.trim();
            if (!msg) return;
            addMsg(msg, true); 
            inp.value = '';
            addMsg('🤔 ...');
            const resp = await askBot(msg);
            const lastMsg = document.querySelector('#chatContainer .message:last-child');
            if (lastMsg) lastMsg.remove();
            addMsg(resp);
        }
        const sendBtn = document.getElementById('sendChatBtn');
        if (sendBtn) sendBtn.onclick = sendMsg;
        const chatInputField = document.getElementById('chatInput');
        if (chatInputField) chatInputField.addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });

        // === РАНДОМАЙЗЕР ===
        function parseArtists(t) { 
            if (!t.trim()) return []; 
            const lines = t.split(/\r?\n/); 
            let a = []; 
            for (let l of lines) { 
                l = l.trim(); 
                if (!l) continue; 
                a.push(...l.split(',').map(p => p.trim())); 
            } 
            return [...new Map(a.map(v => [v.toLowerCase(), v])).values()]; 
        }
        function updateTotal() { 
            const input = document.getElementById('artistListInput');
            if (!input) return;
            const a = parseArtists(input.value); 
            const totalSpan = document.getElementById('totalArtistsCount');
            if (totalSpan) totalSpan.textContent = a.length; 
        }
        const artistListInput = document.getElementById('artistListInput');
        if (artistListInput) artistListInput.addEventListener('input', updateTotal);
        function doRandom() {
            const input = document.getElementById('artistListInput');
            if (!input) return;
            const artists = parseArtists(input.value);
            if (!artists.length) { 
                const resultDiv = document.getElementById('randomizerResult');
                if (resultDiv) resultDiv.innerHTML = '<div style="padding:20px; text-align:center;">❌ Введите исполнителей</div>'; 
                return; 
            }
            let cnt = parseInt(document.getElementById('randomCountInput').value) || 1;
            cnt = Math.min(cnt, artists.length);
            const shuffled = [...artists]; 
            for (let i = shuffled.length - 1; i > 0; i--) { 
                const j = Math.floor(Math.random() * (i + 1)); 
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; 
            }
            const selected = shuffled.slice(0, cnt);
            let html = '<div class="section-title">🎲 Вам повезло:</div>';
            selected.forEach((a, i) => { html += `<div class="random-artist-card"><span class="random-artist-name">${i+1}. ${escapeHtml(a)}</span><button onclick="tg.openLink('https://music.yandex.ru/search?text=${encodeURIComponent(a)}')" class="random-artist-link">🎵 Слушать</button></div>`; });
            const resultDiv = document.getElementById('randomizerResult');
            if (resultDiv) resultDiv.innerHTML = html;
        }
        function loadQuick() { 
            const q = ["Асия", "Imagine Dragons", "Кино", "Земфира"]; 
            const grid = document.getElementById('quickArtistsGrid');
            if (grid) grid.innerHTML = q.map(a => `<span class="popular-tag" onclick="addArtist('${a}')">+ ${a}</span>`).join(''); 
        }
        window.addArtist = function(a) { 
            const inp = document.getElementById('artistListInput');
            if (inp) {
                inp.value = inp.value + (inp.value ? "\n" : "") + a; 
                updateTotal(); 
                showNote(`➕ Добавлен: ${a}`);
            }
        };
        const randomizeBtn = document.getElementById('doRandomizeBtn');
        if (randomizeBtn) randomizeBtn.onclick = doRandom;

        // === НАСТРОЕНИЕ ===
        const moodTracks = { happy: ["Останься - Асия"], sad: ["Группа крови - Кино"], energetic: ["Believer - Imagine Dragons"], relax: ["Твой поцелуй - Асия"], romantic: ["Твой поцелуй - Асия"], focus: ["Инструментальная музыка"] };
        document.querySelectorAll('.mood-btn').forEach(btn => { 
            btn.onclick = () => { 
                const mood = btn.dataset.mood; 
                const track = moodTracks[mood][0]; 
                const yandex = `https://music.yandex.ru/search?text=${encodeURIComponent(track)}`; 
                const youtube = `https://music.youtube.com/search?q=${encodeURIComponent(track)}`; 
                const moodResult = document.getElementById('moodResult');
                if (moodResult) {
                    moodResult.innerHTML = `<div class="result-card"><div class="artist-name">🎵 ${escapeHtml(track)}</div><div class="platform-buttons"><button onclick="tg.openLink('${yandex}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button><button onclick="tg.openLink('${youtube}')" class="platform-btn youtube-btn">▶️ YouTube Music</button></div></div>`;
                }
            }; 
        });

        // === НАСТРОЙКИ ===
        function loadAppearance() {
            const bg = localStorage.getItem('music_bot_bg');
            if (bg && bg !== 'default') { 
                if (bg.startsWith('linear')) document.body.style.background = bg; 
                else { 
                    document.body.style.backgroundImage = `url(${bg})`; 
                    document.body.style.backgroundSize = 'cover'; 
                } 
            }
        }
        
        const fab = document.getElementById('settingsFab');
        const modal = document.getElementById('settingsModal');
        const closeModalBtn = document.getElementById('closeSettingsBtn');
        if (fab) fab.onclick = () => { if (modal) modal.classList.remove('hidden'); };
        if (closeModalBtn) closeModalBtn.onclick = () => { if (modal) modal.classList.add('hidden'); };
        if (modal) modal.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };
        
        const resetBgBtn = document.getElementById('resetBgBtn');
        if (resetBgBtn) resetBgBtn.onclick = () => { 
            document.body.style.background = ''; 
            document.body.style.backgroundImage = ''; 
            localStorage.setItem('music_bot_bg', 'default'); 
        };
        
        const uploadBgBtn = document.getElementById('uploadBgBtn');
        const bgImageInput = document.getElementById('bgImageInput');
        if (uploadBgBtn && bgImageInput) {
            uploadBgBtn.onclick = () => bgImageInput.click();
            bgImageInput.onchange = (e) => { 
                if (e.target.files[0]) { 
                    const r = new FileReader(); 
                    r.onload = (ev) => { 
                        document.body.style.backgroundImage = `url(${ev.target.result})`; 
                        document.body.style.backgroundSize = 'cover'; 
                        localStorage.setItem('music_bot_bg', ev.target.result); 
                    }; 
                    r.readAsDataURL(e.target.files[0]); 
                } 
            };
        }

        // === ГОЛОСОВОЙ ПОИСК ===
        let recognition = null;
        const vBtn = document.getElementById('voiceSearchBtn');
        if (vBtn) {
            if ('webkitSpeechRecognition' in window) {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SR(); 
                recognition.lang = 'ru-RU';
                recognition.onstart = () => { vBtn.classList.add('listening'); showNote('🎤 Говорите...'); };
                recognition.onresult = (e) => { 
                    const searchInputField = document.getElementById('searchInput');
                    if (searchInputField) searchInputField.value = e.results[0][0].transcript; 
                    search(); 
                };
                recognition.onerror = () => showNote('❌ Не распознано');
                recognition.onend = () => vBtn.classList.remove('listening');
                vBtn.onclick = function() { if (recognition) recognition.start(); };
            } else {
                vBtn.style.opacity = '0.5';
            }
        }

        // === ЗАПУСК ===
        loadAppearance();
        loadPopular();
        updateTotal();
        loadQuick();
        startCurrencyUpdates();
        
        // Показываем первую страницу (музыка)
        showPage('music', 'music');
        
        console.log('🎵 Music Hub с нижней навигацией загружен!');
    </script>
</body>
</html>
