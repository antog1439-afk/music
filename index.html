<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Bot - Поиск треков и исполнителей</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2481cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f8f9fa);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            min-height: 100vh;
            transition: background-image 0.3s ease;
        }
        
        /* Градиентный фон по умолчанию */
        body.default-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* Затемнение для лучшей читаемости текста при фоновом изображении */
        body.has-bg::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        
        body.has-bg {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, rgba(255, 255, 255, 0.95));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        /* Тёмная тема для карточки */
        @media (prefers-color-scheme: dark) {
            .card {
                background: rgba(30, 30, 35, 0.95);
            }
        }
        
        /* Кнопка выбора фона */
        .bg-settings {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .bg-btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            color: white;
            width: auto;
            margin: 0;
        }
        
        .bg-btn:hover {
            background: rgba(0,0,0,0.8);
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input {
            position: absolute;
            font-size: 100px;
            opacity: 0;
            right: 0;
            top: 0;
            cursor: pointer;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Остальные стили остаются без изменений */
        .search-type {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .search-type-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, rgba(240, 240, 240, 0.9));
            cursor: pointer;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .search-type-btn.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
        }
        
        .random-track-btn {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            margin: 16px 0;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        
        .random-track-btn:active { opacity: 0.8; }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, rgba(240, 240, 240, 0.9));
            border-radius: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 14px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, rgba(255, 255, 255, 0.9));
            color: var(--tg-theme-text-color, #000);
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        
        .search-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .result-card {
            background: var(--tg-theme-bg-color, rgba(240, 242, 245, 0.9));
            backdrop-filter: blur(5px);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .track-item {
            padding: 12px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ddd);
            cursor: pointer;
        }
        
        .track-item:last-child {
            border-bottom: none;
        }
        
        .track-title {
            font-weight: 600;
            font-size: 16px;
        }
        
        .track-artist {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .artist-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .platform-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        
        .platform-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 14px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-size: 16px;
            color: white;
        }
        
        .yandex-btn { background: #ffcc00; color: #000; }
        .youtube-btn { background: #ff0000; }
        .vk-btn { background: #0077ff; }
        .spotify-btn { background: #1db954; }
        .concert-btn { background: #28a745; }
        .afisha-btn { background: #ff6b6b; }
        
        .info-text {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-top: 12px;
            text-align: center;
        }
        
        .user-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--tg-theme-hint-color, #e9ecef);
            font-size: 13px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border: 3px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-favorites {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .hidden {
            display: none;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            margin: 12px 0 8px 0;
            color: var(--tg-theme-hint-color, #6c757d);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .popular-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        
        .popular-tag {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--tg-theme-bg-color, rgba(240, 242, 245, 0.9));
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .delete-history {
            background: none;
            border: none;
            color: #dc3545;
            font-size: 18px;
            cursor: pointer;
            width: auto;
            margin: 0;
            padding: 0 8px;
        }
        
        .state-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .state-idle { background: #6c757d; }
        .state-searching { background: #ffc107; animation: pulse 1s infinite; }
        .state-results { background: #28a745; }
        
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 8px 12px;
            background: var(--tg-theme-bg-color, rgba(240, 242, 245, 0.9));
            border-radius: 12px;
            font-size: 13px;
        }
        
        .current-state {
            display: flex;
            align-items: center;
        }
        
        .admin-panel {
            margin-top: 20px;
            padding: 16px;
            background: var(--tg-theme-bg-color, rgba(240, 242, 245, 0.9));
            border-radius: 16px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
        }
        
        .admin-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .admin-stat {
            background: var(--tg-theme-secondary-bg-color, #fff);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }
        
        .admin-stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .admin-stat-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .admin-btn.danger {
            background: #dc3545;
        }
        
        .user-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        
        .release-card {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border: 1px solid var(--tg-theme-button-color, #667eea);
            margin: 16px 0;
            border-radius: 16px;
            padding: 16px;
        }
        
        .game-container {
            background: var(--tg-theme-secondary-bg-color, rgba(255, 255, 255, 0.95));
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #e9ecef);
        }
        
        .game-title {
            font-size: 18px;
            font-weight: 700;
        }
        
        .start-game-btn {
            background: #9b59b6;
            width: auto;
            padding: 8px 20px;
            margin: 0;
            font-size: 14px;
        }
        
        .game-question {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .track-name {
            font-size: 24px;
            font-weight: 700;
            margin: 16px 0;
            line-height: 1.3;
            word-break: break-word;
        }
        
        .game-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }
        
        .game-option {
            padding: 12px;
            border-radius: 12px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
            text-align: center;
        }
        
        .game-option.correct {
            background: #28a745;
            color: white;
        }
        
        .game-option.wrong {
            background: #dc3545;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #2481cc);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-top: 4px;
        }
        
        .activity-item {
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        
        .activity-time {
            font-size: 10px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-bottom: 4px;
        }
        
        /* Превью фона */
        .bg-preview {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            border: 2px solid white;
        }
        
        @media (max-width: 480px) {
            body { padding: 12px; }
            .card { padding: 18px; }
            .track-name { font-size: 20px; }
        }
    </style>
</head>
<body class="default-bg">
    <div class="container">
        <div class="card">
            <h1>🎵 Музыкальный бот</h1>
            
            <!-- КНОПКИ НАСТРОЙКИ ФОНА -->
            <div class="bg-settings">
                <button class="bg-btn" onclick="resetBackground()">🎨 Сбросить фон</button>
                <div class="file-input-wrapper bg-btn">
                    📸 Своё фото
                    <input type="file" id="bgImageInput" accept="image/*" onchange="loadCustomBackground(this)">
                </div>
            </div>
            
            <div class="status-bar">
                <div class="current-state">
                    <span class="state-indicator state-idle" id="stateIndicator"></span>
                    <span id="stateText">Готов к работе</span>
                </div>
                <span>🎤</span>
            </div>
            
            <div class="search-type" id="searchTypeContainer">
                <div class="search-type-btn active" onclick="setSearchType('artist')">🎤 Поиск исполнителя</div>
                <div class="search-type-btn" onclick="setSearchType('track')">🎵 Поиск трека</div>
            </div>
            
            <button class="random-track-btn" onclick="getRandomTrack()">🎲 СЛУЧАЙНЫЙ ТРЕК</button>
            
            <div class="tabs" id="tabsContainer">
                <div class="tab active" onclick="switchTab('search')">🔍 Поиск</div>
                <div class="tab" onclick="switchTab('favorites')">⭐ Избранное</div>
                <div class="tab" onclick="switchTab('history')">📜 История</div>
                <div class="tab" onclick="switchTab('game')">🎮 Игра</div>
                <div class="tab" id="adminTabBtn" style="display: none;" onclick="switchTab('admin')">👑 Админ</div>
            </div>
            
            <div id="searchTab">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Big Baby Tape, Imagine Dragons, Асия, или название трека..." autocomplete="off">
                    <button onclick="performSearch()" class="search-btn">Найти</button>
                </div>
                
                <div class="section-title" style="margin-top: 20px;">🔥 ПОПУЛЯРНЫЕ ИСПОЛНИТЕЛИ</div>
                <div class="popular-grid" id="popularArtists"></div>
                
                <div id="result"></div>
            </div>
            
            <div id="favoritesTab" class="hidden">
                <div id="favoritesList"></div>
            </div>
            
            <div id="historyTab" class="hidden">
                <div id="historyList"></div>
                <button onclick="clearHistory()" style="background: #dc3545;">🗑️ Очистить историю</button>
            </div>
            
            <div id="gameTab" class="hidden">
                <div class="game-container" style="margin-top: 0;">
                    <div class="game-header">
                        <span class="game-title">🎮 Угадай трек</span>
                        <button class="start-game-btn" id="startGameBtn" onclick="startGame()">▶ Начать игру</button>
                    </div>
                    <div id="gameContent">
                        <div style="text-align: center; padding: 20px; color: var(--tg-theme-hint-color);">
                            🎵 Нажми «Начать игру», чтобы проверить свои знания!
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="adminTab" class="hidden">
                <div id="adminContent"></div>
            </div>
            
            <div class="user-info">
                <span>👤 <span id="userName">Загрузка...</span></span>
                <span>🆔 <span id="userId">—</span></span>
            </div>
        </div>
        
        <button onclick="closeApp()">❌ Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // ========== УПРАВЛЕНИЕ ФОНОМ ==========
        function loadSavedBackground() {
            const savedBg = localStorage.getItem('music_bot_background');
            if (savedBg) {
                if (savedBg === 'default') {
                    resetBackground();
                } else {
                    document.body.style.backgroundImage = `url(${savedBg})`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundAttachment = 'fixed';
                    document.body.classList.remove('default-bg');
                    document.body.classList.add('has-bg');
                }
            } else {
                // Фон по умолчанию
                resetBackground();
            }
        }
        
        function resetBackground() {
            document.body.style.backgroundImage = '';
            document.body.classList.remove('has-bg');
            document.body.classList.add('default-bg');
            localStorage.setItem('music_bot_background', 'default');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            tg.showAlert('🎨 Фон сброшен на градиентный');
        }
        
        function loadCustomBackground(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgUrl = e.target.result;
                    document.body.style.backgroundImage = `url(${imgUrl})`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundAttachment = 'fixed';
                    document.body.classList.remove('default-bg');
                    document.body.classList.add('has-bg');
                    localStorage.setItem('music_bot_background', imgUrl);
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    tg.showAlert('✅ Фон обновлён!');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        const ADMIN_ID = 1044143048;
        
        let currentUserId = null;
        let isAdmin = false;
        let currentSearchType = 'artist';
        
        if (tg.initDataUnsafe?.user) {
            currentUserId = tg.initDataUnsafe.user.id;
            isAdmin = (currentUserId === ADMIN_ID);
            localStorage.setItem('music_bot_user_id', currentUserId);
        } else {
            const savedId = localStorage.getItem('music_bot_user_id');
            if (savedId) {
                currentUserId = parseInt(savedId);
                isAdmin = (currentUserId === ADMIN_ID);
            }
        }
        
        if (isAdmin) {
            document.getElementById('adminTabBtn').style.display = 'block';
        }
        
        // === БАЗА ДАННЫХ ТРЕКОВ ===
        const tracksDatabase = [
            { track: "Останься", artist: "Асия" },
            { track: "Твой поцелуй", artist: "Асия" },
            { track: "Обочины", artist: "Асия" },
            { track: "Сильно так", artist: "Асия" },
            { track: "Детство", artist: "Асия" },
            { track: "Амур", artist: "Асия" },
            { track: "Случилась осень", artist: "Мари Краймбрери" },
            { track: "Она опять разденется", artist: "Мари Краймбрери" },
            { track: "Иначе всё это зря", artist: "Мари Краймбрери" },
            { track: "Океан", artist: "Мари Краймбрери" },
            { track: "За деньги да", artist: "INSTASAMKA" },
            { track: "Волосы назад", artist: "INSTASAMKA" },

        function loadGlobalStats() {
            const saved = localStorage.getItem('music_bot_global_stats');
            if (saved) {
                const data = JSON.parse(saved);
                globalStats.totalSearches = data.totalSearches || 0;
                globalStats.totalFavorites = data.totalFavorites || 0;
                globalStats.popularSearches = data.popularSearches || {};
                globalStats.activeUsers = data.activeUsers || {};
                globalStats.userActivities = data.userActivities || [];
            }

        function saveGlobalStats() {
            const toSave = {
                totalSearches: globalStats.totalSearches,
                totalFavorites: globalStats.totalFavorites,
                popularSearches: globalStats.popularSearches,
                activeUsers: globalStats.activeUsers,
                userActivities: globalStats.userActivities.slice(0, 50)
            };
            localStorage.setItem('music_bot_global_stats', JSON.stringify(toSave));
        }
        
        function addActivity(userId, userName, action, details) {
            const activity = {
                userId: userId,
                userName: userName,
                action: action,
                details: details,
                timestamp: Date.now(),
                date: new Date().toLocaleString()
            };
            globalStats.userActivities.unshift(activity);
            if (globalStats.userActivities.length > 50) globalStats.userActivities.pop();
            saveGlobalStats();
        }
        
        function registerActivity() {
            if (!currentUserId) return;
            const userName = user?.first_name || user?.username || 'Аноним';
            if (!globalStats.activeUsers[currentUserId]) {
                globalStats.activeUsers[currentUserId] = {
                    name: userName,
                    firstSeen: Date.now(),
                    lastSeen: Date.now(),
                    searches: 0,
                    favorites: 0
                };
                addActivity(currentUserId, userName, '👋 Первое посещение', 'Пользователь зашел в приложение');
            } else {
                globalStats.activeUsers[currentUserId].lastSeen = Date.now();
                globalStats.activeUsers[currentUserId].name = userName;
            }
            saveGlobalStats();
        }
        
        function registerSearch(query, type) {
            if (!currentUserId) return;
            globalStats.totalSearches++;
            globalStats.popularSearches[query] = (globalStats.popularSearches[query] || 0) + 1;
            if (globalStats.activeUsers[currentUserId]) {
                globalStats.activeUsers[currentUserId].searches++;
            }
            const userName = user?.first_name || user?.username || 'Аноним';
            addActivity(currentUserId, userName, `🔍 Поиск ${type === 'artist' ? 'исполнителя' : 'трека'}`, `"${query}"`);
            saveGlobalStats();
            registerActivity();
        }
        
        function registerFavorite(artistName) {
            if (!currentUserId) return;
            globalStats.totalFavorites++;
            if (globalStats.activeUsers[currentUserId]) {
                globalStats.activeUsers[currentUserId].favorites++;
            }
            const userName = user?.first_name || user?.username || 'Аноним';
            addActivity(currentUserId, userName, '⭐ Избранное', `Добавил: ${artistName}`);
            saveGlobalStats();
        }

        const allArtists = [...new Set(tracksDatabase.map(t => t.artist))];

        let gameActive = false;
        let gameStats = { gamesPlayed: 0, totalScore: 0, bestScore: 0 };
        
        function loadGameStats() {
            const saved = localStorage.getItem('music_bot_game_stats');
            if (saved) gameStats = JSON.parse(saved);
        }
        
        function saveGameStats() {
            localStorage.setItem('music_bot_game_stats', JSON.stringify(gameStats));
        }
        
        function generateRandomQuestion() {
            const randomIndex = Math.floor(Math.random() * tracksDatabase.length);
            const correctTrack = tracksDatabase[randomIndex];
            const correctArtist = correctTrack.artist;
            
            let otherArtists = allArtists.filter(a => a !== correctArtist);
            for (let i = otherArtists.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [otherArtists[i], otherArtists[j]] = [otherArtists[j], otherArtists[i]];
            }
            const wrongOptions = otherArtists.slice(0, 3);
            const allOptions = [correctArtist, ...wrongOptions];
            for (let i = allOptions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allOptions[i], allOptions[j]] = [allOptions[j], allOptions[i]];
            }
            return { track: correctTrack.track, correct: correctArtist, options: allOptions };
        }
        
        function startGame() {
            gameQuestions = [];
            for (let i = 0; i < 10; i++) gameQuestions.push(generateRandomQuestion());
            currentQuestionIndex = 0;
            gameScore = 0;
            gameActive = true;
            const startBtn = document.getElementById('startGameBtn');
            startBtn.textContent = '🎮 Игра идёт...';
            startBtn.style.background = '#28a745';
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            showGameQuestion();
        }
        
        function showGameQuestion() {
            const gameContent = document.getElementById('gameContent');
            if (currentQuestionIndex >= gameQuestions.length) { endGame(); return; }
            const question = gameQuestions[currentQuestionIndex];
            const percent = Math.round((gameScore / gameQuestions.length) * 100);
            let optionsHtml = '';
            for (let i = 0; i < question.options.length; i++) {
                optionsHtml += `<div class="game-option" onclick="checkGameAnswer('${escapeHtml(question.options[i])}', '${escapeHtml(question.correct)}')">${escapeHtml(question.options[i])}</div>`;
            }
            gameContent.innerHTML = `
                <div class="game-question">
                    <div style="font-size: 13px;">🎵 Вопрос ${currentQuestionIndex + 1}/${gameQuestions.length}</div>
                    <div class="track-name">"${escapeHtml(question.track)}"</div>
                    <div style="font-size: 13px;">Кто исполнитель?</div>
                </div>
                <div class="game-options" id="gameOptions">${optionsHtml}</div>
                <div class="game-score">🎯 Счёт: ${gameScore} / ${gameQuestions.length} (${percent}%)</div>
            `;
        }
        
        function checkGameAnswer(selected, correct) {
            if (!gameActive) return;
            const optionsDiv = document.getElementById('gameOptions');
            if (!optionsDiv) return;
            const options = optionsDiv.querySelectorAll('.game-option');
            gameActive = false;
            for (let option of options) {
                if (option.textContent === correct) option.classList.add('correct');
                if (option.textContent === selected && selected !== correct) option.classList.add('wrong');
                option.style.pointerEvents = 'none';
            }
            if (selected === correct) {
                gameScore++;
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }
            setTimeout(() => { currentQuestionIndex++; gameActive = true; showGameQuestion(); }, 1000);
        }
        
        function endGame() {
            gameActive = false;
            const total = gameQuestions.length;
            const percent = Math.round((gameScore / total) * 100);
            gameStats.gamesPlayed++;
            gameStats.totalScore += gameScore;
            if (gameScore > gameStats.bestScore) gameStats.bestScore = gameScore;
            saveGameStats();
            let message = percent === 100 ? '🏆 ИДЕАЛЬНО!' : percent >= 80 ? '🎵 Отлично!' : percent >= 60 ? '👍 Неплохо!' : '🎧 Слушай больше музыки!';
            const gameContent = document.getElementById('gameContent');
            gameContent.innerHTML = `
                <div class="game-result">
                    <h3>🎉 ИГРА ЗАКОНЧЕНА! 🎉</h3>
                    <div class="result-stats">
                        <div>${message}</div>
                        <div style="font-size: 24px; font-weight: 700; margin: 16px 0;">${gameScore} / ${total} (${percent}%)</div>
                        <div>⭐ Лучший результат: ${gameStats.bestScore} / ${total}</div>
                        <div>🎮 Сыграно игр: ${gameStats.gamesPlayed}</div>
                    </div>
                </div>
            `;
            const startBtn = document.getElementById('startGameBtn');
            startBtn.textContent = '🔄 Сыграть снова';
            startBtn.style.background = '#9b59b6';
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
        }
        
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = user.first_name || 'Гость';
            document.getElementById('userId').textContent = user.id || '—';
            registerActivity();
        } else {
            document.getElementById('userName').textContent = 'Гость';
            document.getElementById('userId').textContent = '—';
        }
        
        loadSavedBackground();
        loadGlobalStats();
        loadFavorites();
        loadHistory();
        loadPopularArtists();
        loadGameStats();
        setState('idle', 'Готов к работе');
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
