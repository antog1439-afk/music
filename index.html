<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Bot - Поиск музыки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f8f9fa);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .search-type {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .type-btn {
            flex: 1;
            padding: 8px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-top: 0;
        }
        
        .type-btn.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 14px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        
        .search-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .result-card {
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .found-artist {
            text-align: center;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #e9ecef);
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        .found-artist-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .found-artist-name {
            font-size: 22px;
            font-weight: 700;
            margin-top: 4px;
        }
        
        .platform-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        
        .platform-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 14px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-size: 16px;
            color: white;
        }
        
        .yandex-btn { background: #ffcc00; color: #000; }
        .youtube-btn { background: #ff0000; }
        .concert-btn { background: #28a745; }
        .afisha-btn { background: #ff6b6b; }
        
        .info-text {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-top: 12px;
            text-align: center;
        }
        
        .user-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--tg-theme-hint-color, #e9ecef);
            font-size: 13px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border: 3px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .favorite-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .favorite-btn.active {
            background: #ffc107;
            color: #000;
        }
        
        .state-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .state-idle { background: #6c757d; }
        .state-searching { background: #ffc107; animation: pulse 1s infinite; }
        .state-results { background: #28a745; }
        .state-error { background: #dc3545; }
        
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 8px 12px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 12px;
            font-size: 13px;
        }
        
        .current-state {
            display: flex;
            align-items: center;
        }
        
        @media (max-width: 480px) {
            body { padding: 12px; }
            .card { padding: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎵 Музыкальный бот</h1>
            
            <div class="status-bar">
                <div class="current-state">
                    <span class="state-indicator state-idle" id="stateIndicator"></span>
                    <span id="stateText">Готов к работе</span>
                </div>
                <span>🎤</span>
            </div>
            
            <div class="search-type">
                <button class="type-btn active" onclick="setSearchType('artist')">🎤 Исполнитель</button>
                <button class="type-btn" onclick="setSearchType('track')">🎵 Трек</button>
                <button class="type-btn" onclick="setSearchType('album')">💿 Альбом</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Например: Imagine Dragons, Believer, Night Visions..." autocomplete="off">
                <button onclick="search()" class="search-btn">Найти</button>
            </div>
            
            <div id="result"></div>
            
            <div class="user-info">
                <span>👤 <span id="userName">Загрузка...</span></span>
                <span>🆔 <span id="userId">—</span></span>
            </div>
        </div>
        
        <button onclick="closeApp()">❌ Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Прокси для обхода CORS
        const PROXY = 'https://cors-anywhere.herokuapp.com/';
        const YANDEX_API = 'https://music.yandex.ru/api/v2.1/';
        
        let currentSearchType = 'artist';
        let favorites = [];
        let searchHistory = [];
        
        // ========== СОСТОЯНИЯ ==========
        function setState(newState, message) {
            const indicator = document.getElementById('stateIndicator');
            const stateText = document.getElementById('stateText');
            indicator.className = 'state-indicator';
            
            if (newState === 'idle') indicator.classList.add('state-idle');
            else if (newState === 'searching') indicator.classList.add('state-searching');
            else if (newState === 'results') indicator.classList.add('state-results');
            else if (newState === 'error') indicator.classList.add('state-error');
            
            stateText.textContent = message;
        }
        
        function setSearchType(type) {
            currentSearchType = type;
            const btns = document.querySelectorAll('.type-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            if (type === 'artist') btns[0].classList.add('active');
            else if (type === 'track') btns[1].classList.add('active');
            else if (type === 'album') btns[2].classList.add('active');
            
            const placeholder = type === 'artist' ? 'Например: Imagine Dragons, Асия...' :
                               type === 'track' ? 'Например: Believer, Искала...' : 'Например: Night Visions, После тебя...';
            document.getElementById('searchInput').placeholder = placeholder;
        }
        
        // ========== ПОИСК В ЯНДЕКС.МУЗЫКЕ ==========
        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                tg.showAlert('Введите название');
                return;
            }
            
            setState('searching', `🔍 Ищем "${query}"...`);
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>🔍 Поиск...</div>';
            
            try {
                let artistName = null;
                
                if (currentSearchType === 'artist') {
                    // Прямой поиск исполнителя
                    artistName = query;
                    showResults(query, `🔍 По запросу: "${query}" (исполнитель)`);
                    
                } else if (currentSearchType === 'track') {
                    // Поиск трека, чтобы узнать исполнителя
                    const searchUrl = `${YANDEX_API}handlers/music/search?text=${encodeURIComponent(query)}&type=track&page=0`;
                    const response = await fetch(PROXY + searchUrl);
                    const data = await response.json();
                    
                    if (data && data.tracks && data.tracks.items && data.tracks.items.length > 0) {
                        const track = data.tracks.items[0];
                        if (track.artists && track.artists.length > 0) {
                            artistName = track.artists[0].name;
                            showResults(artistName, `🎵 Трек: "${query}" → Исполнитель: ${artistName}`);
                        } else {
                            throw new Error('Исполнитель не найден');
                        }
                    } else {
                        throw new Error('Трек не найден');
                    }
                    
                } else if (currentSearchType === 'album') {
                    // Поиск альбома, чтобы узнать исполнителя
                    const searchUrl = `${YANDEX_API}handlers/music/search?text=${encodeURIComponent(query)}&type=album&page=0`;
                    const response = await fetch(PROXY + searchUrl);
                    const data = await response.json();
                    
                    if (data && data.albums && data.albums.items && data.albums.items.length > 0) {
                        const album = data.albums.items[0];
                        if (album.artists && album.artists.length > 0) {
                            artistName = album.artists[0].name;
                            showResults(artistName, `💿 Альбом: "${query}" → Исполнитель: ${artistName}`);
                        } else {
                            throw new Error('Исполнитель не найден');
                        }
                    } else {
                        throw new Error('Альбом не найден');
                    }
                }
                
                setState('results', `🎤 Найден: ${artistName}`);
                
            } catch (error) {
                console.error('Ошибка:', error);
                setState('error', '❌ Ошибка поиска');
                resultDiv.innerHTML = `
                    <div class="result-card">
                        <div class="found-artist" style="background: #dc354520;">
                            <div class="found-artist-label">❌ НЕ НАЙДЕН</div>
                            <div class="found-artist-name">"${escapeHtml(query)}"</div>
                        </div>
                        <div class="info-text">
                            Не удалось найти. Проверьте правильность написания.<br>
                            Для поиска треков и альбомов нужно активировать прокси:<br>
                            <a href="#" onclick="activateProxy()" style="color: var(--tg-theme-button-color);">Нажмите для активации</a>
                        </div>
                    </div>
                `;
            }
        }
        
        function showResults(artistName, searchInfo) {
            const resultDiv = document.getElementById('result');
            
            const yandexUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(artistName)}`;
            const youtubeUrl = `https://music.youtube.com/search?q=${encodeURIComponent(artistName)}`;
            const concertsUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(artistName + ' концерт')}`;
            const afishaUrl = `https://www.afisha.ru/search/?q=${encodeURIComponent(artistName)}`;
            const topTracksUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(artistName + ' популярные треки')}`;
            
            const isFav = favorites.includes(artistName);
            
            resultDiv.innerHTML = `
                <div class="result-card">
                    <div class="found-artist">
                        <div class="found-artist-label">🎯 НАЙДЕН ИСПОЛНИТЕЛЬ</div>
                        <div class="found-artist-name">${escapeHtml(artistName)}</div>
                        <div class="info-text" style="margin-top: 8px;">${escapeHtml(searchInfo)}</div>
                    </div>
                    
                    <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${escapeHtml(artistName).replace(/'/g, "\\'")}')">
                        ${isFav ? '★ Удалить из избранного' : '☆ Добавить в избранное'}
                    </button>
                    
                    <div class="section-title" style="margin-top: 16px;">🎵 МУЗЫКА</div>
                    <div class="platform-buttons">
                        <button onclick="openLink('${yandexUrl}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                        <button onclick="openLink('${youtubeUrl}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                    </div>
                    
                    <div class="section-title">🎤 ПОПУЛЯРНЫЕ ТРЕКИ</div>
                    <div class="platform-buttons">
                        <button onclick="openLink('${topTracksUrl}')" class="platform-btn" style="background: #9b59b6;">🎵 Топ треки</button>
                    </div>
                    
                    <div class="section-title">🎫 КОНЦЕРТЫ И БИЛЕТЫ</div>
                    <div class="platform-buttons">
                        <button onclick="openLink('${concertsUrl}')" class="platform-btn concert-btn">🎸 Концерты (Яндекс)</button>
                        <button onclick="openLink('${afishaUrl}')" class="platform-btn afisha-btn">🎫 Билеты (Афиша)</button>
                    </div>
                    
                    <div class="info-text">💡 Нажми на любую кнопку — откроется поиск</div>
                </div>
            `;
            
            addToHistory(artistName);
        }
        
        function activateProxy() {
            tg.openLink('https://cors-anywhere.herokuapp.com/');
            tg.showAlert('Откройте ссылку и нажмите "Request temporary access"');
        }
        
        // ========== ИЗБРАННОЕ ==========
        function loadFavorites() {
            const saved = localStorage.getItem('music_bot_favorites');
            if (saved) favorites = JSON.parse(saved);
        }
        
        function saveFavorites() {
            localStorage.setItem('music_bot_favorites', JSON.stringify(favorites));
        }
        
        function toggleFavorite(artistName) {
            if (favorites.includes(artistName)) {
                favorites = favorites.filter(a => a !== artistName);
                tg.showAlert(`❌ ${artistName} удалён из избранного`);
            } else {
                favorites.push(artistName);
                tg.showAlert(`⭐ ${artistName} добавлен в избранное`);
            }
            saveFavorites();
            search();
        }
        
        function addToHistory(artistName) {
            if (!searchHistory.includes(artistName)) {
                searchHistory.unshift(artistName);
                searchHistory = searchHistory.slice(0, 10);
                localStorage.setItem('music_bot_history', JSON.stringify(searchHistory));
            }
        }
        
        function openLink(url) {
            tg.openLink(url);
        }
        
        function closeApp() {
            tg.close();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Данные пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = user.first_name || 'Гость';
            document.getElementById('userId').textContent = user.id || '—';
        }
        
        loadFavorites();
        setState('idle', 'Готов к работе');
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
