<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Hub - Поиск музыки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
        }
        
        body.music-mode { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%) !important; animation: none !important; }
        body.game-mode { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #6b48ff 100%) !important; animation: none !important; }
        
        @keyframes gradientShift { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }
        
        .fullscreen-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 10;
        }
        
        .fullscreen-page.active { transform: translateX(0); }
        
        .menu-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s ease;
            z-index: 5;
        }
        
        .menu-container.hidden-menu { transform: translateX(-100%); }
        
        .menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            max-width: 260px;
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .menu-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 12px 24px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        .menu-btn:active { transform: scale(0.96); }
        .menu-icon { font-size: 28px; display: block; margin-bottom: 4px; }
        .menu-title { font-size: 16px; font-weight: 600; color: white; }
        .menu-desc { font-size: 10px; color: rgba(255,255,255,0.8); }
        
        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .back-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }
        
        .page-title { font-size: 24px; font-weight: 700; color: white; flex: 1; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .search-type-switch { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-type-btn {
            flex: 1;
            padding: 8px;
            border-radius: 40px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            color: white;
        }
        .search-type-btn.active { background: #2481cc; }
        
        .search-box { display: flex; gap: 8px; margin: 16px 0; }
        .search-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 40px;
            border: none;
            font-size: 14px;
            background: rgba(255,255,255,0.9);
        }
        .search-input:focus { outline: none; }
        
        .search-btn {
            background: #2481cc;
            border: none;
            padding: 0 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        .voice-btn {
            background: #9b59b6;
            border: none;
            width: 44px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }
        .voice-btn.listening { background: #e74c3c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .random-track-btn {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            margin: 12px 0;
            padding: 10px;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        
        .section-title {
            font-size: 11px;
            font-weight: 600;
            margin: 12px 0 10px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
        }
        
        .popular-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .popular-tag {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .result-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 14px;
            margin-top: 16px;
        }
        
        .artist-name { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: white; }
        
        .ai-fact-card {
            background: linear-gradient(135deg, rgba(155,89,182,0.25), rgba(142,68,173,0.2));
            border-left: 4px solid #9b59b6;
            border-radius: 16px;
            padding: 14px;
            margin: 12px 0;
        }
        .ai-fact-header { display: flex; gap: 10px; align-items: flex-start; }
        .ai-fact-icon {
            font-size: 24px;
            background: rgba(155,89,182,0.3);
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ai-fact-content { flex: 1; }
        .ai-fact-label {
            font-size: 10px;
            color: #9b59b6;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .ai-fact-text { font-size: 13px; line-height: 1.45; color: rgba(255,255,255,0.95); }
        .ai-fact-refresh {
            background: rgba(155,89,182,0.3);
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: white;
            font-size: 11px;
            cursor: pointer;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .platform-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .platform-btn {
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            border: none;
            color: white;
            font-size: 13px;
        }
        .yandex-btn { background: #ffcc00; color: #000; }
        .youtube-btn { background: #ff0000; }
        .vk-btn { background: #0077ff; }
        
        .notification-toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border-radius: 14px;
            padding: 10px;
            text-align: center;
            color: white;
            z-index: 150;
            animation: slideUp 0.3s ease;
            font-size: 13px;
        }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .user-info { font-size: 10px; text-align: center; margin-top: 12px; color: rgba(255,255,255,0.6); }
        .hidden { display: none; }
        
        .settings-fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 20px;
        }
        
        @media (max-width: 480px) {
            .fullscreen-page { padding: 14px; }
            .menu-screen { max-width: 220px; gap: 12px; }
            .menu-btn { padding: 10px 20px; }
            .menu-icon { font-size: 24px; }
            .page-title { font-size: 20px; }
            .glass-card { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="menu-container" id="menuContainer">
        <div class="menu-screen">
            <div class="menu-btn" id="goToMusicBtn">
                <span class="menu-icon">🎵</span>
                <div class="menu-title">Музыка</div>
                <div class="menu-desc">Поиск треков и исполнителей с ИИ-фактами</div>
            </div>
            <div class="menu-btn" id="goToGameBtn">
                <span class="menu-icon">🎮</span>
                <div class="menu-title">Игра</div>
                <div class="menu-desc">Угадай исполнителя</div>
            </div>
        </div>
    </div>

    <!-- Страница Музыка -->
    <div class="fullscreen-page" id="musicPage">
        <div class="page-header">
            <button class="back-btn" id="backFromMusic">← Назад</button>
            <div class="page-title">🎵 Музыка</div>
        </div>
        <div class="glass-card">
            <div class="search-type-switch">
                <div class="search-type-btn active" id="searchArtistBtn">🎤 Исполнитель</div>
                <div class="search-type-btn" id="searchTrackBtn">🎵 Трек</div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Асия, Imagine Dragons...">
                <button id="voiceSearchBtn" class="voice-btn">🎤</button>
                <button id="doSearchBtn" class="search-btn">Найти</button>
            </div>
            <button class="random-track-btn" id="randomTrackBtn">🎲 Случайный трек</button>
            <div class="section-title">🔥 Популярные</div>
            <div class="popular-grid" id="popularGrid"></div>
            <div id="musicResult"></div>
        </div>
        <div class="user-info">👤 Музыкальный бот | 🤖 ИИ-факты как в Яндекс.Музыке</div>
    </div>

    <!-- Страница Игра -->
    <div class="fullscreen-page" id="gamePage">
        <div class="page-header">
            <button class="back-btn" id="backFromGame">← Назад</button>
            <div class="page-title">🎮 Угадай трек</div>
        </div>
        <div class="glass-card">
            <button id="startGameBtn" style="background: linear-gradient(135deg, #9b59b6, #8e44ad); border:none; padding:12px; border-radius:50px; color:white; font-weight:bold; width:100%; cursor:pointer;">▶ Начать игру</button>
            <div id="gameContent"><div style="text-align:center; padding:30px; color:rgba(255,255,255,0.6);">Нажми «Начать игру»</div></div>
        </div>
    </div>

    <!-- Настройки -->
    <div class="settings-fab" id="settingsFab"><span>⚙️</span></div>

    <div id="settingsModal" class="settings-modal hidden" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; z-index:200;">
        <div style="background: rgba(30,30,40,0.98); border-radius:28px; padding:20px; width:90%; max-width:320px;">
            <div class="modal-title" style="font-size:18px; font-weight:700; margin-bottom:16px; text-align:center; color:white;">⚙️ Настройки</div>
            <button class="close-modal" id="closeSettingsBtn" style="background:rgba(255,255,255,0.2); border:none; padding:10px; border-radius:40px; color:white; width:100%; cursor:pointer;">Закрыть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let currentSearchMode = 'artist';

        // === БАЗА ТРЕКОВ ===
        const tracksDatabase = [
            { track: "Останься", artist: "Асия" },
            { track: "Твой поцелуй", artist: "Асия" },
            { track: "Believer", artist: "Imagine Dragons" },
            { track: "Группа крови", artist: "Кино" },
            { track: "Cadillac", artist: "Моргенштерн" },
            { track: "Gimme The Loot", artist: "Big Baby Tape" },
            { track: "Втюрилась", artist: "Дора" },
            { track: "За деньги да", artist: "INSTASAMKA" }
        ];

        // === БАЗА ИИ-ФАКТОВ ===
        const aiFactsDatabase = {
            "асия": [
                "🎤 Настоящее имя Асии — Анастасия Вячеславовна Алентьева",
                "📍 Родилась 1 сентября 1997 года в городе Белово Кемеровской области",
                "🎵 Первый успех пришёл после того, как Максим Фадеев заметил её кавер",
                "📺 Широкую известность принесло участие во 2-м сезоне шоу «Песни» на ТНТ",
                "🎤 В 2022 году Асия стала артисткой лейбла Effective Records",
                "💔 Самый популярный трек — «Останься» с 100+ млн прослушиваний"
            ],
            "imagine dragons": [
                "🏆 3 премии Grammy и 10 Billboard Music Awards",
                "📀 «Radioactive» — самый долгоиграющий сингл в истории Billboard",
                "🎮 Трек «Believer» использован в рекламе FIFA и Need for Speed",
                "🌍 Группа основана в Лас-Вегасе в 2008 году"
            ],
            "кино": [
                "🎸 Группа «Кино» основана в 1981 году в Ленинграде",
                "👤 Виктор Цой — легендарный лидер группы",
                "🎵 «Группа крови» — гимн поколения 90-х"
            ],
            "моргенштерн": [
                "🎤 Алишер Моргенштерн родился в Уфе 17 февраля 1998 года",
                "💰 Самый молодой миллионер в российском шоу-бизнесе",
                "📀 «Cadillac» — первый трек с 100 млн просмотров"
            ]
        };

        function getAIFact(artistName, trackName = null) {
            const artistLower = artistName.toLowerCase();
            for (const [key, facts] of Object.entries(aiFactsDatabase)) {
                if (artistLower.includes(key) || key.includes(artistLower)) {
                    return facts[Math.floor(Math.random() * facts.length)];
                }
            }
            const defaultFacts = [
                `🎤 ${artistName} — один из самых ярких исполнителей года!`,
                `🔥 Треки ${artistName} набирают миллионы прослушиваний`,
                `⭐ Подпишись на ${artistName}, чтобы не пропустить новые релизы!`
            ];
            if (trackName) defaultFacts.push(`🎧 «${trackName}» — в топе этой недели!`);
            return defaultFacts[Math.floor(Math.random() * defaultFacts.length)];
        }

        function renderAIFact(fact, artistName, trackName = null) {
            return `
                <div class="ai-fact-card" id="aiFactCard">
                    <div class="ai-fact-header">
                        <div class="ai-fact-icon">🤖</div>
                        <div class="ai-fact-content">
                            <div class="ai-fact-label">ИИ ФАКТ • КАК В ЯНДЕКС МУЗЫКЕ</div>
                            <div class="ai-fact-text">${escapeHtml(fact)}</div>
                            <button class="ai-fact-refresh" onclick="refreshFact('${escapeHtml(artistName)}', '${escapeHtml(trackName || '')}')">
                                🔄 Новый факт
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.refreshFact = function(artistName, trackName) {
            const newFact = getAIFact(artistName, trackName);
            const factCard = document.getElementById('aiFactCard');
            if (factCard) {
                const factTextDiv = factCard.querySelector('.ai-fact-text');
                if (factTextDiv) factTextDiv.innerHTML = escapeHtml(newFact);
            }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };

        const menuContainer = document.getElementById('menuContainer');
        const musicPage = document.getElementById('musicPage');
        const gamePage = document.getElementById('gamePage');

        function showMenu() {
            menuContainer.classList.remove('hidden-menu');
            musicPage.classList.remove('active');
            gamePage.classList.remove('active');
        }

        function showPage(page) {
            menuContainer.classList.add('hidden-menu');
            musicPage.classList.remove('active');
            gamePage.classList.remove('active');
            page.classList.add('active');
        }

        document.getElementById('goToMusicBtn').onclick = () => { showPage(musicPage); loadPopularArtists(); };
        document.getElementById('goToGameBtn').onclick = () => showPage(gamePage);
        document.getElementById('backFromMusic').onclick = showMenu;
        document.getElementById('backFromGame').onclick = showMenu;

        const popularArtistsList = ["Асия", "Imagine Dragons", "Кино", "Моргенштерн"];
        
        function loadPopularArtists() {
            const container = document.getElementById('popularGrid');
            if (!container) return;
            container.innerHTML = popularArtistsList.map(artist => 
                `<span class="popular-tag" onclick="searchArtist('${artist.replace(/'/g, "\\'")}')">🎤 ${artist}</span>`
            ).join('');
        }

        window.searchArtist = function(artistName) {
            document.getElementById('searchInput').value = artistName;
            currentSearchMode = 'artist';
            performSearch();
        };

        // ========== ОСНОВНАЯ ФУНКЦИЯ ПОИСКА ==========
        function performSearch() {
            const searchInput = document.getElementById('searchInput');
            const query = searchInput.value.trim();
            if (!query) return;

            const resultDiv = document.getElementById('musicResult');
            resultDiv.innerHTML = '<div style="text-align:center; padding:20px;">🔍 Поиск...</div>';

            if (currentSearchMode === 'track') {
                // Поиск ТРЕКА через бота
                tg.sendData(JSON.stringify({
                    action: 'search',
                    query: query
                }));
            } else {
                // Поиск ИСПОЛНИТЕЛЯ (локально)
                setTimeout(async () => {
                    const bioData = await getWikipediaFullBio(query);
                    const bioHtml = displayBio(bioData, query);
                    const artistTracks = tracksDatabase.filter(t => t.artist.toLowerCase().includes(query.toLowerCase()));
                    const tracksList = artistTracks.map(t => t.track).join(', ');
                    const aiFact = getAIFact(query);
                    
                    const yandexLink = `https://music.yandex.ru/search?text=${encodeURIComponent(query)}`;
                    const youtubeLink = `https://music.youtube.com/search?q=${encodeURIComponent(query)}`;
                    const vkLink = `https://vk.com/search?c%5Bq%5D=${encodeURIComponent(query)}&c%5Bsection%5D=audio`;
                    
                    resultDiv.innerHTML = `
                        <div class="result-card">
                            <div class="artist-name">🎤 ${escapeHtml(query)}</div>
                            ${artistTracks.length > 0 ? `<div style="font-size: 12px; margin-bottom: 10px;">🎵 Треки: ${tracksList}</div>` : ''}
                            ${renderAIFact(aiFact, query)}
                            <div class="section-title">🎧 Слушать на платформах</div>
                            <div class="platform-buttons">
                                <button onclick="tg.openLink('${yandexLink}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                                <button onclick="tg.openLink('${youtubeLink}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                                <button onclick="tg.openLink('${vkLink}')" class="platform-btn vk-btn">📱 VK Музыка</button>
                            </div>
                            ${bioHtml}
                        </div>
                    `;
                }, 100);
            }
        }

        // ========== ОБРАБОТКА ОТВЕТОВ ОТ БОТА ==========
        tg.onEvent('message', (data) => {
            try {
                const response = JSON.parse(data);
                console.log('Ответ от бота:', response);
                
                // === ОБРАБОТКА РЕЗУЛЬТАТА ПОИСКА ТРЕКА ===
                if (response.type === 'search_result') {
                    const resultDiv = document.getElementById('musicResult');
                    if (!resultDiv) return;
                    
                    if (response.track) {
                        const aiFact = response.track.ai_fact || getAIFact(response.track.artists, response.track.title);
                        resultDiv.innerHTML = `
                            <div class="result-card">
                                <div class="artist-name">🎵 "${escapeHtml(response.track.title)}"</div>
                                <div style="margin-bottom: 12px;">🎤 Исполнитель: <strong>${escapeHtml(response.track.artists)}</strong></div>
                                ${renderAIFact(aiFact, response.track.artists, response.track.title)}
                                <div class="section-title">🎧 Слушать на платформах</div>
                                <div class="platform-buttons">
                                    <button onclick="tg.openLink('${response.track.links.yandex}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                                    <button onclick="tg.openLink('${response.track.links.youtube_music}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                                    <button onclick="tg.openLink('${response.track.links.vk}')" class="platform-btn vk-btn">📱 VK Музыка</button>
                                </div>
                                ${response.track.preview_url ? `
                                <div style="margin-top: 12px;">
                                    <div style="font-size: 11px; margin-bottom: 6px;">🎧 Превью 30 секунд</div>
                                    <audio controls style="width:100%; border-radius:40px;" src="${response.track.preview_url}"></audio>
                                </div>` : ''}
                            </div>
                        `;
                    } else {
                        resultDiv.innerHTML = `
                            <div style="background: rgba(255,100,100,0.3); padding: 20px; border-radius: 20px; text-align: center;">
                                ❌ Трек не найден в Яндекс.Музыке<br>
                                Попробуйте написать по-другому
                            </div>
                        `;
                    }
                }
                
                if (response.type === 'mood_result') {
                    const resultDiv = document.getElementById('musicResult');
                    if (response.track) {
                        const aiFact = response.track.ai_fact || getAIFact(response.track.artists, response.track.title);
                        resultDiv.innerHTML = `
                            <div class="result-card">
                                <div class="artist-name">🎵 ${escapeHtml(response.track.title)}</div>
                                <div>🎤 ${escapeHtml(response.track.artists)}</div>
                                ${renderAIFact(aiFact, response.track.artists, response.track.title)}
                                <div class="platform-buttons">
                                    <button onclick="tg.openLink('${response.track.yandex_link}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                                    <button onclick="tg.openLink('${response.track.youtube_link}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                                </div>
                            </div>
                        `;
                    }
                }
                
            } catch(e) {
                console.error('Ошибка:', e);
            }
        });

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        async function getWikipediaFullBio(artistName) {
            try {
                const searchUrl = `https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(artistName)}&format=json&origin=*`;
                const searchResponse = await fetch(searchUrl);
                const searchData = await searchResponse.json();
                if (!searchData.query?.search?.length) return null;
                const pageTitle = searchData.query.search[0].title;
                const contentUrl = `https://ru.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(pageTitle)}&prop=extracts&exintro=0&explaintext=1&format=json&origin=*`;
                const contentResponse = await fetch(contentUrl);
                const contentData = await contentResponse.json();
                const pages = contentData.query.pages;
                const pageId = Object.keys(pages)[0];
                let cleanText = pages[pageId].extract || "";
                if (!cleanText) return null;
                cleanText = cleanText.replace(/\[править\]/g, '').replace(/\[\d+\]/g, '').replace(/\s+/g, ' ').trim();
                if (cleanText.length > 1500) cleanText = cleanText.substring(0, 1500) + '...';
                return { title: pageTitle, fullText: cleanText, pageUrl: `https://ru.wikipedia.org/wiki/${encodeURIComponent(pageTitle)}` };
            } catch (error) { return null; }
        }
        
        function displayBio(bioData, artistName) {
            if (!bioData) return `<div class="bio-section" style="margin-top:12px;"><div class="bio-title">📖 Биография</div><div class="bio-text">❌ Не удалось найти биографию для "${escapeHtml(artistName)}"</div></div>`;
            return `<div class="bio-section" style="margin-top:12px;"><div class="bio-title">📖 ${escapeHtml(bioData.title)}</div><div class="bio-text">${escapeHtml(bioData.fullText)}</div><a href="${bioData.pageUrl}" target="_blank" style="display:inline-block; margin-top:8px; color:#4facfe; text-decoration:none; font-size:11px;">🔗 Читать полную статью →</a></div>`;
        }

        function getRandomTrack() {
            const randomTrack = tracksDatabase[Math.floor(Math.random() * tracksDatabase.length)];
            document.getElementById('searchInput').value = randomTrack.track;
            currentSearchMode = 'track';
            performSearch();
        }

        function setSearchMode(mode) {
            currentSearchMode = mode;
            const artistBtn = document.getElementById('searchArtistBtn');
            const trackBtn = document.getElementById('searchTrackBtn');
            const searchInput = document.getElementById('searchInput');
            if (mode === 'artist') {
                artistBtn.classList.add('active');
                trackBtn.classList.remove('active');
                searchInput.placeholder = "Асия, Imagine Dragons, Кино...";
            } else {
                artistBtn.classList.remove('active');
                trackBtn.classList.add('active');
                searchInput.placeholder = "Останься, Believer, Cadillac...";
            }
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

        function showNotification(msg) {
            const toast = document.createElement('div');
            toast.className = 'notification-toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // === ИГРА ===
        const allArtistsForGame = [...new Set(tracksDatabase.map(t => t.artist))];
        let gameQuestions = [], currentQ = 0, gameScore = 0, gameActive = false;
        
        function generateQuestion() {
            const randomTrack = tracksDatabase[Math.floor(Math.random() * tracksDatabase.length)];
            const correctArtist = randomTrack.artist;
            let otherArtists = allArtistsForGame.filter(a => a !== correctArtist);
            let wrongOptions = otherArtists.slice(0, 3);
            let options = [correctArtist, ...wrongOptions];
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            return { track: randomTrack.track, correct: correctArtist, options: options };
        }
        
        function startGame() {
            gameQuestions = [];
            for (let i = 0; i < 5; i++) gameQuestions.push(generateQuestion());
            currentQ = 0; gameScore = 0; gameActive = true;
            document.getElementById('startGameBtn').textContent = '🎮 Игра идёт...';
            showGameQuestion();
        }
        
        function showGameQuestion() {
            const container = document.getElementById('gameContent');
            if (currentQ >= gameQuestions.length) { endGame(); return; }
            const q = gameQuestions[currentQ];
            let optsHtml = '';
            q.options.forEach(opt => { optsHtml += `<div class="game-option" style="background:rgba(255,255,255,0.15); padding:12px; border-radius:60px; text-align:center; margin:8px 0; cursor:pointer;" onclick="checkAnswer('${escapeHtml(opt)}', '${escapeHtml(q.correct)}')">${escapeHtml(opt)}</div>`; });
            container.innerHTML = `<div style="text-align:center;"><div>🎵 Вопрос ${currentQ + 1}/${gameQuestions.length}</div><div style="font-size:20px; font-weight:bold; margin:16px 0;">"${escapeHtml(q.track)}"</div><div>Кто исполнитель?</div><div>${optsHtml}</div><div style="margin-top:10px;">🎯 Счёт: ${gameScore}/${gameQuestions.length}</div></div>`;
        }
        
        window.checkAnswer = function(selected, correct) {
            if (!gameActive) return;
            if (selected === correct) gameScore++;
            currentQ++;
            showGameQuestion();
        };
        
        function endGame() {
            gameActive = false;
            document.getElementById('gameContent').innerHTML = `<div style="text-align:center; padding:20px;"><div style="font-size:40px;">🎉</div><div style="font-size:24px; font-weight:bold;">${gameScore}/${gameQuestions.length}</div><button onclick="startGame()" style="margin-top:16px; background:#9b59b6; border:none; padding:10px 20px; border-radius:40px; color:white;">🔄 Сыграть снова</button></div>`;
            document.getElementById('startGameBtn').textContent = '▶ Начать игру';
        }

        document.getElementById('doSearchBtn').onclick = performSearch;
        document.getElementById('randomTrackBtn').onclick = getRandomTrack;
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });
        document.getElementById('startGameBtn').onclick = startGame;
        
        document.getElementById('searchArtistBtn').onclick = () => setSearchMode('artist');
        document.getElementById('searchTrackBtn').onclick = () => setSearchMode('track');
        
        // Настройки
        const settingsFab = document.getElementById('settingsFab');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        if (settingsFab) settingsFab.onclick = () => settingsModal.classList.remove('hidden');
        if (closeSettingsBtn) closeSettingsBtn.onclick = () => settingsModal.classList.add('hidden');
        if (settingsModal) settingsModal.onclick = (e) => { if (e.target === settingsModal) settingsModal.classList.add('hidden'); };
        
        const user = tg.initDataUnsafe?.user;
        if(user && user.first_name) {
            const userNameSpan = document.getElementById('userName');
            if (userNameSpan) userNameSpan.innerText = user.first_name;
        }
        
        loadPopularArtists();
        console.log('Mini App загружен!');
    </script>
</body>
</html>
