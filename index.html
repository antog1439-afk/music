<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Hub | Музыкальный центр</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .menu-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.35s ease;
            z-index: 5;
        }
        .menu-container.hidden-menu { transform: translateX(-100%); }
        .menu-screen {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 320px;
            padding: 20px;
        }
        .menu-btn {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .menu-btn:active { transform: scale(0.96); }
        .menu-icon { font-size: 36px; display: block; margin-bottom: 10px; }
        .menu-title { font-size: 16px; font-weight: 600; color: white; }
        .menu-desc { font-size: 10px; color: rgba(255,255,255,0.7); }

        .fullscreen-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            transform: translateX(100%);
            transition: transform 0.35s ease;
            z-index: 10;
        }
        .fullscreen-page.active { transform: translateX(0); }

        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .back-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }
        .page-title { font-size: 28px; font-weight: 700; color: white; flex: 1; }

        .glass-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 60px;
            border: none;
            font-size: 15px;
            background: rgba(255,255,255,0.92);
        }
        .search-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 0 24px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            margin: 16px 0 10px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }
        .popular-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .popular-tag {
            background: rgba(255,255,255,0.12);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            color: white;
            cursor: pointer;
        }

        .result-card {
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }
        .artist-name { font-size: 22px; font-weight: 700; margin-bottom: 12px; color: white; }

        .ai-fact-card {
            background: linear-gradient(135deg, rgba(155,89,182,0.25), rgba(142,68,173,0.15));
            border-left: 3px solid #9b59b6;
            border-radius: 16px;
            padding: 14px;
            margin: 16px 0;
        }
        .ai-fact-header { display: flex; gap: 12px; }
        .ai-fact-icon { font-size: 28px; }
        .ai-fact-label { font-size: 10px; color: #b983ff; font-weight: 700; margin-bottom: 4px; }
        .ai-fact-text { font-size: 13px; line-height: 1.4; color: rgba(255,255,255,0.9); }
        .ai-fact-refresh {
            background: rgba(155,89,182,0.3);
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            color: white;
            font-size: 11px;
            margin-top: 8px;
            cursor: pointer;
        }

        .platform-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
        .platform-btn {
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }
        .yandex-btn { background: #ffcc00; color: #1a1a2e; }
        .youtube-btn { background: #ff0000; color: white; }
        .vk-btn { background: #0077ff; color: white; }
        .spotify-btn { background: #1db954; color: white; }

        .bio-section {
            background: rgba(0,0,0,0.25);
            border-radius: 16px;
            padding: 14px;
            margin-top: 16px;
            max-height: 220px;
            overflow-y: auto;
        }
        .bio-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #7b68ee; }
        .bio-text { font-size: 12px; line-height: 1.4; color: rgba(255,255,255,0.85); }
        .bio-wiki-link { color: #b983ff; text-decoration: none; font-size: 11px; display: inline-block; margin-top: 8px; }

        .qr-btn, .ai-gen-btn {
            margin-top: 12px;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 14px;
        }
        .qr-btn { background: #607d8b; color: white; }
        .ai-gen-btn { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; }

        .track-name { font-size: 22px; font-weight: 800; margin: 20px 0; color: white; text-align: center; }
        .game-options { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .game-option {
            background: rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            cursor: pointer;
            margin: 8px 0;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #9b59b6;
            animation: spin 1s ease infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .random-artist-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .random-artist-name { font-size: 16px; font-weight: 600; color: white; }
        .random-artist-link {
            background: #ffcc00;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }

        .user-info { font-size: 11px; text-align: center; margin-top: 12px; color: rgba(255,255,255,0.4); }
        .hidden { display: none; }

        @media (max-width: 480px) {
            .menu-screen { gap: 12px; }
            .menu-btn { padding: 16px 8px; }
            .menu-icon { font-size: 30px; }
            .page-title { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="menu-container" id="menuContainer">
        <div class="menu-screen">
            <div class="menu-btn" id="goToMusicBtn"><div class="menu-icon">🎵</div><div class="menu-title">Музыка</div><div class="menu-desc">Поиск исполнителей</div></div>
            <div class="menu-btn" id="goToGameBtn"><div class="menu-icon">🎮</div><div class="menu-title">Игра</div><div class="menu-desc">Угадай трек</div></div>
            <div class="menu-btn" id="goToRandomizerBtn"><div class="menu-icon">🎲</div><div class="menu-title">Рандомайзер</div><div class="menu-desc">Случайный выбор</div></div>
            <div class="menu-btn" id="goToMoodBtn"><div class="menu-icon">😊</div><div class="menu-title">Настроение</div><div class="menu-desc">Подбор музыки</div></div>
        </div>
    </div>

    <!-- Страница Музыка -->
    <div class="fullscreen-page" id="musicPage">
        <div class="page-header"><button class="back-btn" id="backFromMusic">← Назад</button><div class="page-title">Музыка</div></div>
        <div class="glass-card">
            <div class="search-box"><input type="text" id="searchInput" class="search-input" placeholder="Асия, Imagine Dragons, Rammstein..."><button id="doSearchBtn" class="search-btn">Найти</button></div>
            <div class="section-title">Популярные</div>
            <div class="popular-grid" id="popularGrid"></div>
            <div id="musicResult"></div>
        </div>
        <div class="user-info">🤖 ИИ-факты для всех исполнителей как в Яндекс.Музыке</div>
    </div>

    <!-- Страница Игра -->
    <div class="fullscreen-page" id="gamePage">
        <div class="page-header"><button class="back-btn" id="backFromGame">← Назад</button><div class="page-title">Игра</div></div>
        <div class="glass-card"><button id="startGameBtn" style="background:linear-gradient(135deg,#9b59b6,#8e44ad); border:none; padding:14px; border-radius:60px; color:white; font-weight:700; width:100%; margin-bottom:16px;">▶ Начать игру</button><div id="gameContent"><div style="text-align:center; padding:30px; color:rgba(255,255,255,0.5);">Нажми «Начать игру»</div></div></div>
    </div>

    <!-- Страница Рандомайзер -->
    <div class="fullscreen-page" id="randomizerPage">
        <div class="page-header"><button class="back-btn" id="backFromRandomizer">← Назад</button><div class="page-title">Рандомайзер</div></div>
        <div class="glass-card">
            <textarea id="artistListInput" class="search-input" rows="4" placeholder="Асия&#10;Imagine Dragons&#10;Кино, Земфира" style="margin-bottom:12px;"></textarea>
            <div class="popular-grid" id="quickArtistsGrid" style="margin-bottom:16px;"></div>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;"><input type="number" id="randomCountInput" value="1" min="1" max="20" style="width:70px; padding:10px; border-radius:40px; border:none; text-align:center;"><span style="color:white;">из <span id="totalArtistsCount">0</span> исполнителей</span></div>
            <button id="doRandomizeBtn" class="search-btn" style="background:linear-gradient(135deg,#9b59b6,#8e44ad); width:100%; padding:14px;">🎲 Выбрать</button>
            <div id="randomizerResult" style="margin-top:16px;"></div>
        </div>
    </div>

    <!-- Страница Настроение -->
    <div class="fullscreen-page" id="moodPage">
        <div class="page-header"><button class="back-btn" id="backFromMood">← Назад</button><div class="page-title">Настроение</div></div>
        <div class="glass-card">
            <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:20px;">
                <button class="mood-btn" data-mood="happy" style="background:#f1c40f; border:none; padding:14px; border-radius:60px; font-weight:700;">😊 Счастлив</button>
                <button class="mood-btn" data-mood="sad" style="background:#3498db; border:none; padding:14px; border-radius:60px; font-weight:700; color:white;">😢 Грустный</button>
                <button class="mood-btn" data-mood="energetic" style="background:#e74c3c; border:none; padding:14px; border-radius:60px; font-weight:700; color:white;">⚡ Энергичный</button>
                <button class="mood-btn" data-mood="relax" style="background:#2ecc71; border:none; padding:14px; border-radius:60px; font-weight:700; color:white;">😌 Расслабленный</button>
                <button class="mood-btn" data-mood="romantic" style="background:#e84393; border:none; padding:14px; border-radius:60px; font-weight:700; color:white;">💖 Романтичный</button>
                <button class="mood-btn" data-mood="focus" style="background:#1abc9c; border:none; padding:14px; border-radius:60px; font-weight:700; color:white;">📚 Фокус</button>
            </div>
            <div id="moodResult"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // === ДАННЫЕ ===
        const tracksDatabase = [
            { track: "Останься", artist: "Асия" }, { track: "Твой поцелуй", artist: "Асия" },
            { track: "Believer", artist: "Imagine Dragons" }, { track: "Группа крови", artist: "Кино" },
            { track: "Cadillac", artist: "Моргенштерн" }, { track: "Искала", artist: "Земфира" }
        ];
        
        // === БАЗА ИИ-ФАКТОВ ДЛЯ ОСНОВНЫХ ИСПОЛНИТЕЛЕЙ ===
        const aiFactsDatabase = {
            "асия": [
                "🎤 Настоящее имя Асии — Анастасия Алентьева",
                "📍 Родилась 1 сентября 1997 года в городе Белово",
                "💔 Самый популярный трек — «Останься» с 100+ млн прослушиваний"
            ],
            "кино": [
                "🎸 Группа «Кино» основана в 1981 году в Ленинграде",
                "👤 Виктор Цой — легендарный лидер группы",
                "🎵 «Группа крови» — гимн поколения 90-х"
            ],
            "imagine dragons": [
                "🏆 3 премии Grammy и 10 Billboard Music Awards",
                "🎮 Трек «Believer» использован в рекламе FIFA",
                "🌍 Группа основана в Лас-Вегасе в 2008 году"
            ],
            "моргенштерн": [
                "🎤 Алишер Моргенштерн родился в Уфе 17 февраля 1998 года",
                "💰 Самый молодой миллионер в российском шоу-бизнесе",
                "📀 «Cadillac» — первый трек с 100 млн просмотров"
            ],
            "земфира": [
                "🎤 Земфира Рамазанова родилась в Уфе 26 августа 1976 года",
                "🏆 Первая женщина, собравшая сольный концерт в «Олимпийском»",
                "📀 Дебютный альбом разошёлся тиражом 700 000 копий"
            ]
        };

        const popularArtistsList = ["Асия", "Imagine Dragons", "Кино", "Моргенштерн", "Земфира"];

        // === РАСШИРЕННАЯ ФУНКЦИЯ ИИ-ФАКТА (ДЛЯ ЛЮБОГО ИСПОЛНИТЕЛЯ) ===
        function getAIFact(artistName, trackName = null) {
            const artistLower = artistName.toLowerCase();
            
            // Проверяем локальную базу
            for (const [key, facts] of Object.entries(aiFactsDatabase)) {
                if (artistLower.includes(key) || key.includes(artistLower)) {
                    return facts[Math.floor(Math.random() * facts.length)];
                }
            }
            
            // Если исполнителя нет в базе — генерируем динамический ИИ-факт
            const dynamicFacts = [
                `🎤 ${artistName} — один из самых ярких исполнителей года!`,
                `🔥 Треки ${artistName} набирают миллионы прослушиваний по всему миру`,
                `⭐ Подпишись на ${artistName}, чтобы не пропустить новые релизы!`,
                `🎵 ${artistName} — открытие года по версии слушателей`,
                `📀 ${artistName} ворвался в чарты в этом месяце`,
                `🎸 У ${artistName} уникальный стиль, который покоряет сердца`,
                `💿 Дискография ${artistName} пополняется новыми хитами`,
                `🎧 ${artistName} — в топе рекомендаций этой недели`,
                `🌟 ${artistName} набирает популярность с каждым днём`,
                `🎤 Голос ${artistName} узнают с первых нот`
            ];
            
            if (trackName) {
                dynamicFacts.push(`🎧 «${trackName}» — в топе этой недели!`);
                dynamicFacts.push(`⭐ «${trackName}» добавляют в плейлисты каждый день`);
                dynamicFacts.push(`🔥 «${trackName}» — настоящий хит от ${artistName}`);
            }
            
            return dynamicFacts[Math.floor(Math.random() * dynamicFacts.length)];
        }

        function renderAIFact(fact, artistName, trackName = null) {
            return `
                <div class="ai-fact-card">
                    <div class="ai-fact-header">
                        <div class="ai-fact-icon">🤖</div>
                        <div>
                            <div class="ai-fact-label">ИИ ФАКТ • КАК В ЯНДЕКС МУЗЫКЕ</div>
                            <div class="ai-fact-text">${escapeHtml(fact)}</div>
                            <button class="ai-fact-refresh" onclick="refreshFact('${escapeHtml(artistName)}', '${escapeHtml(trackName || '')}')">🔄 Новый факт</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function refreshFact(artistName, trackName) {
            const newFact = getAIFact(artistName, trackName);
            const factCard = document.querySelector('.ai-fact-card');
            if (factCard) {
                const factTextDiv = factCard.querySelector('.ai-fact-text');
                if (factTextDiv) factTextDiv.innerHTML = escapeHtml(newFact);
            }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function escapeHtml(s) { 
            if (!s) return ''; 
            return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); 
        }

        function showNote(msg) { 
            const t = document.createElement('div'); 
            t.className = 'notification-toast'; 
            t.textContent = msg; 
            document.body.appendChild(t); 
            setTimeout(() => t.remove(), 2000); 
        }

        // === НАВИГАЦИЯ ===
        const menu = document.getElementById('menuContainer');
        const pages = {
            music: document.getElementById('musicPage'), game: document.getElementById('gamePage'),
            randomizer: document.getElementById('randomizerPage'), mood: document.getElementById('moodPage')
        };
        
        function showMenu() { menu.classList.remove('hidden-menu'); Object.values(pages).forEach(p => p.classList.remove('active')); }
        function showPage(page) { menu.classList.add('hidden-menu'); Object.values(pages).forEach(p => p.classList.remove('active')); page.classList.add('active'); }
        
        document.getElementById('goToMusicBtn').onclick = () => { showPage(pages.music); loadPopular(); };
        document.getElementById('goToGameBtn').onclick = () => showPage(pages.game);
        document.getElementById('goToRandomizerBtn').onclick = () => { showPage(pages.randomizer); updateTotal(); loadQuick(); };
        document.getElementById('goToMoodBtn').onclick = () => showPage(pages.mood);
        ['Music', 'Game', 'Randomizer', 'Mood'].forEach(p => document.getElementById(`backFrom${p}`).onclick = showMenu);

        // === МУЗЫКА ===
        function loadPopular() { 
            document.getElementById('popularGrid').innerHTML = popularArtistsList.map(a => `<span class="popular-tag" onclick="searchArtist('${a.replace(/'/g, "\\'")}')">🎤 ${a}</span>`).join(''); 
        }
        
        window.searchArtist = function(a) { 
            document.getElementById('searchInput').value = a; 
            search(); 
        };
        
        async function search() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;

            const resultDiv = document.getElementById('musicResult');
            resultDiv.innerHTML = '<div class="loading-spinner"></div><div style="text-align:center;">🔍 Поиск...</div>';

            const links = {
                yandex: `https://music.yandex.ru/search?text=${encodeURIComponent(q)}`,
                youtube: `https://music.youtube.com/search?q=${encodeURIComponent(q)}`,
                vk: `https://vk.com/search?c%5Bq%5D=${encodeURIComponent(q)}&c%5Bsection%5D=audio`,
                spotify: `https://open.spotify.com/search/${encodeURIComponent(q)}`
            };

            const bioData = await getWikipediaFullBio(q);
            const bioHtml = displayBio(bioData, q);
            const artistTracks = tracksDatabase.filter(t => t.artist.toLowerCase().includes(q.toLowerCase()));
            const tracksList = artistTracks.map(t => t.track).join(', ');
            
            // Генерируем ИИ-факт для ЛЮБОГО исполнителя
            const aiFact = getAIFact(q);

            resultDiv.innerHTML = `
                <div class="result-card">
                    <div class="artist-name">🎤 ${escapeHtml(q)}</div>
                    ${artistTracks.length > 0 ? `<div style="font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 10px;">🎵 Популярные треки: ${tracksList}</div>` : '<div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 10px;">📀 Треки не найдены в базе</div>'}
                    ${renderAIFact(aiFact, q)}
                    <div class="section-title">🎧 Слушать на платформах</div>
                    <div class="platform-buttons">
                        <button onclick="tg.openLink('${links.yandex}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                        <button onclick="tg.openLink('${links.youtube}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                        <button onclick="tg.openLink('${links.vk}')" class="platform-btn vk-btn">📱 VK Музыка</button>
                        <button onclick="tg.openLink('${links.spotify}')" class="platform-btn spotify-btn">🎧 Spotify</button>
                    </div>
                    ${bioHtml}
                    <div class="section-title">🔗 Поделиться</div>
                    <button class="qr-btn" onclick="showQR('${links.yandex}', '${escapeHtml(q)}')">📱 QR-код для поиска</button>
                    <button class="ai-gen-btn" onclick="generateAICover('${escapeHtml(q)} music cover')">✨ AI обложку</button>
                </div>
            `;
        }
        
        async function getWikipediaFullBio(artistName) {
            try {
                const exactMatches = { "асия":"Асия (певица)", "big baby tape":"Big Baby Tape", "instasamka":"Instasamka", "моргенштерн":"Моргенштерн", "земфира":"Земфира", "кино":"Кино (группа)", "imagine dragons":"Imagine Dragons" };
                let searchQuery = artistName.toLowerCase().trim();
                let pageTitle = exactMatches[searchQuery];
                if (!pageTitle) {
                    const searchUrl = `https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(artistName)}&format=json&origin=*`;
                    const searchResponse = await fetch(searchUrl);
                    const searchData = await searchResponse.json();
                    if (!searchData.query || !searchData.query.search || searchData.query.search.length === 0) return null;
                    pageTitle = searchData.query.search[0].title;
                }
                const contentUrl = `https://ru.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(pageTitle)}&prop=extracts&exintro=0&explaintext=1&format=json&origin=*`;
                const contentResponse = await fetch(contentUrl);
                const contentData = await contentResponse.json();
                const pages = contentData.query.pages;
                const pageId = Object.keys(pages)[0];
                let cleanText = pages[pageId].extract || "";
                if (!cleanText) return null;
                cleanText = cleanText.replace(/\[править\]/g, '').replace(/\[\d+\]/g, '').replace(/\s+/g, ' ').trim();
                if (cleanText.length > 3000) cleanText = cleanText.substring(0, 3000) + '...';
                return { title: pageTitle, fullText: cleanText, pageUrl: `https://ru.wikipedia.org/wiki/${encodeURIComponent(pageTitle)}` };
            } catch (error) { return null; }
        }
        
        function displayBio(bioData, artistName) {
            if (!bioData) return `<div class="bio-section"><div class="bio-title">📖 Биография</div><div class="bio-text">❌ Не удалось найти биографию для "${escapeHtml(artistName)}"</div></div>`;
            return `<div class="bio-section"><div class="bio-title">📖 ${escapeHtml(bioData.title)}</div><div class="bio-text">${escapeHtml(bioData.fullText)}</div><a href="${bioData.pageUrl}" target="_blank" class="bio-wiki-link">🔗 Читать полную статью на Википедии →</a></div>`;
        }

        async function generateAICover(prompt) {
            const resultDiv = document.getElementById('aiResult') || document.createElement('div');
            resultDiv.innerHTML = `<div class="loading-spinner"></div><div style="text-align:center;">🎨 AI создаёт обложку...</div>`;
            try {
                const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&nologo=true`;
                const img = new Image();
                img.onload = () => {
                    resultDiv.innerHTML = `<div style="text-align: center;"><img src="${imageUrl}" style="width:100%; max-width:200px; border-radius:24px; margin:12px auto; display:block;"><div style="margin:10px;">🎨 ${escapeHtml(prompt)}</div><button onclick="downloadImage('${imageUrl}')" class="ai-gen-btn">💾 Скачать</button></div>`;
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                };
                img.onerror = () => { resultDiv.innerHTML = `<div style="text-align:center; padding:20px;">❌ Не удалось создать обложку</div>`; };
                img.src = imageUrl;
            } catch (error) { resultDiv.innerHTML = `<div style="text-align:center; padding:20px;">❌ Ошибка: ${error.message}</div>`; }
        }
        
        window.downloadImage = (url) => { const a = document.createElement('a'); a.href = url; a.download = `cover_${Date.now()}.jpg`; a.click(); showNote('💾 Скачивание'); };
        
        function showQR(url, title) { 
            const qr = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url)}`; 
            const m = document.createElement('div'); 
            m.className = 'qr-modal'; 
            m.innerHTML = `<div style="background:white; border-radius:28px; padding:20px; text-align:center; max-width:260px; margin:auto; margin-top:30%;"><div style="font-size:16px; font-weight:bold;">📱 ${escapeHtml(title)}</div><img src="${qr}" style="width:160px; margin:12px;"><button onclick="this.parentElement.parentElement.remove()" style="background:#dc3545; border:none; padding:8px 20px; border-radius:40px; color:white;">✕ Закрыть</button></div>`; 
            document.body.appendChild(m); 
        }

        // === ИГРА ===
        const allArtistsForGame = [...new Set(tracksDatabase.map(t => t.artist))];
        let gameQuestions = [], currentQ = 0, gameScore = 0, gameActive = false, gameStatsData = { gamesPlayed: 0, bestScore: 0 };

        function loadGameStats() { const saved = localStorage.getItem('music_game_stats'); if(saved) gameStatsData = JSON.parse(saved); }
        function saveGameStats() { localStorage.setItem('music_game_stats', JSON.stringify(gameStatsData)); }
        
        function generateQuestion() {
            const randomTrack = tracksDatabase[Math.floor(Math.random() * tracksDatabase.length)];
            const correctArtist = randomTrack.artist;
            let otherArtists = [...allArtistsForGame];
            otherArtists = otherArtists.filter(a => a !== correctArtist);
            for (let i = otherArtists.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [otherArtists[i], otherArtists[j]] = [otherArtists[j], otherArtists[i]]; }
            let wrongOptions = otherArtists.slice(0, 3);
            while (wrongOptions.length < 3) { wrongOptions.push("Неизвестный исполнитель"); }
            let options = [correctArtist, ...wrongOptions];
            for (let i = options.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [options[i], options[j]] = [options[j], options[i]]; }
            return { track: randomTrack.track, correct: correctArtist, options: options };
        }
        
        function startGame() {
            gameQuestions = [];
            for (let i = 0; i < 8; i++) gameQuestions.push(generateQuestion());
            currentQ = 0; gameScore = 0; gameActive = true;
            document.getElementById('startGameBtn').textContent = '🎮 Игра идёт...';
            showGameQuestion();
        }
        
        function showGameQuestion() {
            const container = document.getElementById('gameContent');
            if (currentQ >= gameQuestions.length) { endGame(); return; }
            const q = gameQuestions[currentQ];
            const percent = Math.round((gameScore / gameQuestions.length) * 100);
            let optsHtml = '';
            q.options.forEach(opt => { const displayOpt = opt === "Неизвестный исполнитель" ? opt : `🎤 ${opt}`; optsHtml += `<div class="game-option" onclick="checkAnswer('${escapeHtml(opt)}', '${escapeHtml(q.correct)}')">${escapeHtml(displayOpt)}</div>`; });
            container.innerHTML = `<div class="game-question"><div style="font-size:11px; color:rgba(255,255,255,0.7);">🎵 Вопрос ${currentQ + 1}/${gameQuestions.length}</div><div class="track-name">"${escapeHtml(q.track)}"</div><div style="color:rgba(255,255,255,0.9);">Кто исполнитель?</div><div class="game-options" id="gameOptions">${optsHtml}</div><div style="margin-top:10px; color:rgba(255,255,255,0.7);">🎯 Счёт: ${gameScore} / ${gameQuestions.length} (${percent}%)</div></div>`;
        }
        
        window.checkAnswer = function(selected, correct) {
            if (!gameActive) return;
            const optsDiv = document.getElementById('gameOptions'); if (!optsDiv) return;
            const btns = optsDiv.querySelectorAll('.game-option');
            gameActive = false;
            btns.forEach(btn => { let btnText = btn.innerText.replace('🎤 ', ''); if (btnText === correct) btn.classList.add('correct'); if (btnText === selected && selected !== correct) btn.classList.add('wrong'); btn.style.pointerEvents = 'none'; });
            if (selected === correct) gameScore++;
            setTimeout(() => { currentQ++; gameActive = true; showGameQuestion(); }, 1000);
        };
        
        function endGame() {
            gameActive = false;
            const total = gameQuestions.length;
            const percent = Math.round((gameScore / total) * 100);
            gameStatsData.gamesPlayed++;
            if (gameScore > gameStatsData.bestScore) gameStatsData.bestScore = gameScore;
            saveGameStats();
            let msg = percent === 100 ? '🏆 ИДЕАЛЬНО!' : (percent >= 70 ? '🎵 Отлично!' : '🎧 Попробуй ещё!');
            const container = document.getElementById('gameContent');
            if (!container) return;
            container.innerHTML = `<div style="text-align:center; padding:16px;"><div style="font-size:40px; margin-bottom:6px;">🎉</div><div style="font-size:22px; font-weight:bold;">${gameScore}/${total}</div><div style="margin:8px 0; font-size:13px;">${msg}</div><div style="color:rgba(255,255,255,0.7); font-size:11px;">⭐ Лучший: ${gameStatsData.bestScore}/${total}</div><div style="color:rgba(255,255,255,0.7); font-size:11px;">🎮 Сыграно: ${gameStatsData.gamesPlayed}</div><button id="restartGameBtn" style="background: linear-gradient(135deg, #9b59b6, #8e44ad); margin-top:14px; border:none; padding:10px 20px; border-radius:40px; color:white; font-weight:bold; font-size:13px;">🔄 Сыграть снова</button></div>`;
            const restartBtn = document.getElementById('restartGameBtn');
            if (restartBtn) restartBtn.addEventListener('click', startGame);
            document.getElementById('startGameBtn').textContent = '▶ Начать игру';
        }
        document.getElementById('startGameBtn').onclick = startGame;
        loadGameStats();

        // === РАНДОМАЙЗЕР ===
        function parseArtists(t) { if (!t.trim()) return []; const lines = t.split(/\r?\n/); let a = []; for (let l of lines) { l = l.trim(); if (!l) continue; a.push(...l.split(',').map(p => p.trim())); } return [...new Map(a.map(v => [v.toLowerCase(), v])).values()]; }
        function updateTotal() { const a = parseArtists(document.getElementById('artistListInput').value); document.getElementById('totalArtistsCount').textContent = a.length; }
        document.getElementById('artistListInput').addEventListener('input', updateTotal);
        
        function doRandom() {
            const artists = parseArtists(document.getElementById('artistListInput').value);
            if (!artists.length) { document.getElementById('randomizerResult').innerHTML = '<div style="padding:20px; text-align:center;">❌ Введите исполнителей</div>'; return; }
            let cnt = parseInt(document.getElementById('randomCountInput').value) || 1;
            cnt = Math.min(cnt, artists.length);
            const shuffled = [...artists]; for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
            const selected = shuffled.slice(0, cnt);
            let html = '<div class="section-title">🎲 Вам повезло:</div>';
            selected.forEach((a, i) => { html += `<div class="random-artist-card"><span class="random-artist-name">${i+1}. ${escapeHtml(a)}</span><button onclick="tg.openLink('https://music.yandex.ru/search?text=${encodeURIComponent(a)}')" class="random-artist-link">🎵 Слушать</button></div>`; });
            document.getElementById('randomizerResult').innerHTML = html;
        }
        
        function loadQuick() { const q = ["Асия", "Imagine Dragons", "Кино", "Земфира"]; document.getElementById('quickArtistsGrid').innerHTML = q.map(a => `<span class="popular-tag" onclick="addArtist('${a}')">+ ${a}</span>`).join(''); }
        window.addArtist = function(a) { const inp = document.getElementById('artistListInput'); inp.value = inp.value + (inp.value ? "\n" : "") + a; updateTotal(); showNote(`➕ Добавлен: ${a}`); };
        document.getElementById('doRandomizeBtn').onclick = doRandom;

        // === НАСТРОЕНИЕ ===
        const moodTracks = { happy: ["Останься - Асия"], sad: ["Группа крови - Кино"], energetic: ["Believer - Imagine Dragons"], relax: ["Твой поцелуй - Асия"], romantic: ["Твой поцелуй - Асия"], focus: ["Инструментальная музыка"] };
        document.querySelectorAll('.mood-btn').forEach(btn => { btn.onclick = () => { const mood = btn.dataset.mood; const track = moodTracks[mood][0]; const yandex = `https://music.yandex.ru/search?text=${encodeURIComponent(track)}`; const youtube = `https://music.youtube.com/search?q=${encodeURIComponent(track)}`; document.getElementById('moodResult').innerHTML = `<div class="result-card"><div class="artist-name">🎵 ${escapeHtml(track)}</div><div class="platform-buttons"><button onclick="tg.openLink('${yandex}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button><button onclick="tg.openLink('${youtube}')" class="platform-btn youtube-btn">▶️ YouTube Music</button></div></div>`; }; });

        // === ЗАПУСК ===
        loadPopular();
        updateTotal();
    </script>
</body>
