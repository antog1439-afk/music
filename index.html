<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Game Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2481cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Главное меню (2 кнопки) */
        .menu-screen {
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: fadeIn 0.4s ease;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .menu-btn:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.25);
        }

        .menu-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 12px;
        }

        .menu-title {
            font-size: 32px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
        }

        .menu-desc {
            font-size: 15px;
            color: rgba(255,255,255,0.8);
            margin-top: 8px;
        }

        /* Экран музыки (полноценный плеер/поиск) */
        .music-screen, .game-screen {
            animation: fadeIn 0.3s ease;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
        }

        .back-btn {
            background: rgba(0,0,0,0.6);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            width: auto;
            margin-bottom: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }
        .search-input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 30px;
            border: 1px solid #ddd;
            font-size: 16px;
            background: white;
        }
        .search-btn {
            background: #2481cc;
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .result-card {
            background: #f0f2f5;
            border-radius: 24px;
            padding: 16px;
            margin-top: 16px;
        }
        .artist-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .platform-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        .platform-btn {
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            border: none;
            color: white;
        }
        .yandex-btn { background: #ffcc00; color:#000; }
        .youtube-btn { background: #ff0000; }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            margin: 12px 0 8px;
            color: #6c757d;
        }
        .popular-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }
        .popular-tag {
            background: #2481cc;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
        }
        .game-question {
            text-align: center;
        }
        .track-name {
            font-size: 26px;
            font-weight: 800;
            margin: 20px 0;
        }
        .game-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .game-option {
            background: #e9ecef;
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
        }
        .game-option.correct { background: #28a745; color: white; }
        .game-option.wrong { background: #dc3545; color: white; }
        .hidden { display: none; }
        .user-info {
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
            color: #6c757d;
        }
        button {
            cursor: pointer;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
<div class="container">
    <!-- ЭКРАН МЕНЮ (2 КНОПКИ) -->
    <div id="menuScreen" class="menu-screen">
        <div class="menu-btn" id="goToMusicBtn">
            <span class="menu-icon">🎵</span>
            <div class="menu-title">Музыка</div>
            <div class="menu-desc">Поиск треков, исполнители, хиты</div>
        </div>
        <div class="menu-btn" id="goToGameBtn">
            <span class="menu-icon">🎮</span>
            <div class="menu-title">Игра</div>
            <div class="menu-desc">Угадай исполнителя по треку</div>
        </div>
    </div>

    <!-- ЭКРАН МУЗЫКИ -->
    <div id="musicScreen" class="music-screen hidden">
        <button class="back-btn" id="backToMenuFromMusic">← Назад</button>
        <div class="card">
            <h1>🎵 Музыкальный поиск</h1>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Асия, Big Baby Tape, Imagine Dragons...">
                <button id="doSearchBtn" class="search-btn">Найти</button>
            </div>
            <div class="section-title">🔥 ПОПУЛЯРНЫЕ</div>
            <div class="popular-grid" id="popularGrid"></div>
            <div id="musicResult"></div>
        </div>
        <div class="user-info">👤 <span id="userName">Музыкальный бот</span></div>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="gameScreen" class="game-screen hidden">
        <button class="back-btn" id="backToMenuFromGame">← Назад</button>
        <div class="card">
            <div style="text-align: center;">
                <h1>🎮 Угадай трек</h1>
                <button id="startGameBtn" style="background:#9b59b6; border:none; padding:12px 28px; border-radius:40px; color:white; font-weight:bold; margin:12px 0;">▶ Начать игру</button>
            </div>
            <div id="gameContent">
                <div style="text-align:center; padding:20px; color:gray;">Нажми «Начать игру»</div>
            </div>
        </div>
        <div class="user-info">🎮 Игра «Угадай трек»</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ----- БАЗА ТРЕКОВ (реальные хиты) -----
    const tracksDatabase = [
        { track: "Останься", artist: "Асия" },
        { track: "Твой поцелуй", artist: "Асия" },
        { track: "Случилась осень", artist: "Мари Краймбрери" },
        { track: "За деньги да", artist: "INSTASAMKA" },
        { track: "Силиконовый гном", artist: "Мэйби Бэйби" },
        { track: "Втюрилась", artist: "Дора" },
        { track: "Дора дура", artist: "Дора" },
        { track: "Там, за облаками", artist: "NЮ" },
        { track: "Gimme The Loot", artist: "Big Baby Tape" },
        { track: "Cadillac", artist: "Моргенштерн" },
        { track: "Кукла колдуна", artist: "Король и Шут" },
        { track: "Believer", artist: "Imagine Dragons" },
        { track: "Bad Guy", artist: "Billie Eilish" },
        { track: "Blinding Lights", artist: "The Weeknd" },
        { track: "Группа крови", artist: "Кино" },
        { track: "Искала", artist: "Земфира" }
    ];

    const allArtists = [...new Set(tracksDatabase.map(t => t.artist))];
    const popularArtistsList = ["Асия","Big Baby Tape","Моргенштерн","INSTASAMKA","Дора","Imagine Dragons"];

    // ----- УПРАВЛЕНИЕ ЭКРАНАМИ -----
    const menuScreen = document.getElementById('menuScreen');
    const musicScreen = document.getElementById('musicScreen');
    const gameScreen = document.getElementById('gameScreen');

    document.getElementById('goToMusicBtn').onclick = () => {
        menuScreen.classList.add('hidden');
        musicScreen.classList.remove('hidden');
        loadPopularArtists();
    };
    document.getElementById('goToGameBtn').onclick = () => {
        menuScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
    };
    document.getElementById('backToMenuFromMusic').onclick = () => {
        musicScreen.classList.add('hidden');
        menuScreen.classList.remove('hidden');
    };
    document.getElementById('backToMenuFromGame').onclick = () => {
        gameScreen.classList.add('hidden');
        menuScreen.classList.remove('hidden');
    };

    // ----- МУЗЫКАЛЬНАЯ ЧАСТЬ -----
    function loadPopularArtists() {
        const container = document.getElementById('popularGrid');
        container.innerHTML = popularArtistsList.map(artist => 
            `<span class="popular-tag" onclick="searchArtist('${artist.replace(/'/g, "\\'")}')">🎤 ${artist}</span>`
        ).join('');
    }

    window.searchArtist = function(artistName) {
        document.getElementById('searchInput').value = artistName;
        performSearch();
    };

    function performSearch() {
        const query = document.getElementById('searchInput').value.trim();
        if(!query) return;
        const links = {
            yandex: `https://music.yandex.ru/search?text=${encodeURIComponent(query)}`,
            youtube: `https://music.youtube.com/search?q=${encodeURIComponent(query)}`,
            vk: `https://vk.com/search?c%5Bq%5D=${encodeURIComponent(query)}&c%5Bsection%5D=audio`
        };
        const resultDiv = document.getElementById('musicResult');
        resultDiv.innerHTML = `
            <div class="result-card">
                <div class="artist-name">🎤 ${escapeHtml(query)}</div>
                <div class="section-title">🎵 Слушать</div>
                <div class="platform-buttons">
                    <button onclick="tg.openLink('${links.yandex}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                    <button onclick="tg.openLink('${links.youtube}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                    <button onclick="tg.openLink('${links.vk}')" class="platform-btn" style="background:#0077ff;">📱 VK Музыка</button>
                </div>
            </div>
        `;
    }

    document.getElementById('doSearchBtn').onclick = performSearch;
    document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });

    // ----- ИГРА «УГАДАЙ ТРЕК» -----
    let gameQuestions = [];
    let currentQ = 0;
    let gameScore = 0;
    let gameActive = false;
    let gameStats = { gamesPlayed: 0, bestScore: 0 };

    function loadGameStats() {
        const saved = localStorage.getItem('music_game_stats');
        if(saved) gameStats = JSON.parse(saved);
    }
    function saveGameStats() {
        localStorage.setItem('music_game_stats', JSON.stringify(gameStats));
    }

    function generateQuestion() {
        const randomTrack = tracksDatabase[Math.floor(Math.random() * tracksDatabase.length)];
        const correct = randomTrack.artist;
        let other = allArtists.filter(a => a !== correct);
        for(let i=other.length-1; i>0; i--){
            const j=Math.floor(Math.random()*(i+1));
            [other[i], other[j]] = [other[j], other[i]];
        }
        let options = [correct, ...other.slice(0,3)];
        for(let i=options.length-1; i>0; i--){
            const j=Math.floor(Math.random()*(i+1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return { track: randomTrack.track, correct, options };
    }

    function startGame() {
        gameQuestions = [];
        for(let i=0; i<8; i++) gameQuestions.push(generateQuestion());
        currentQ = 0;
        gameScore = 0;
        gameActive = true;
        const startBtn = document.getElementById('startGameBtn');
        startBtn.textContent = '🎮 Игра идёт...';
        startBtn.style.background = '#28a745';
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        showGameQuestion();
    }

    function showGameQuestion() {
        const container = document.getElementById('gameContent');
        if(currentQ >= gameQuestions.length) {
            endGame();
            return;
        }
        const q = gameQuestions[currentQ];
        const percent = Math.round((gameScore/gameQuestions.length)*100);
        let optsHtml = '';
        q.options.forEach(opt => {
            optsHtml += `<div class="game-option" onclick="checkAnswer('${escapeHtml(opt)}', '${escapeHtml(q.correct)}')">🎤 ${escapeHtml(opt)}</div>`;
        });
        container.innerHTML = `
            <div class="game-question">
                <div style="font-size:14px;">🎵 Вопрос ${currentQ+1}/${gameQuestions.length}</div>
                <div class="track-name">"${escapeHtml(q.track)}"</div>
                <div>Кто исполнитель?</div>
                <div class="game-options" id="gameOptions">${optsHtml}</div>
                <div class="game-score">🎯 Счёт: ${gameScore} / ${gameQuestions.length} (${percent}%)</div>
            </div>
        `;
    }

    window.checkAnswer = function(selected, correct) {
        if(!gameActive) return;
        const optsDiv = document.getElementById('gameOptions');
        if(!optsDiv) return;
        const btns = optsDiv.querySelectorAll('.game-option');
        gameActive = false;
        btns.forEach(btn => {
            if(btn.innerText.includes(correct)) btn.classList.add('correct');
            if(btn.innerText.includes(selected) && selected !== correct) btn.classList.add('wrong');
            btn.style.pointerEvents = 'none';
        });
        if(selected === correct) {
            gameScore++;
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        } else {
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }
        setTimeout(() => {
            currentQ++;
            gameActive = true;
            showGameQuestion();
        }, 1000);
    };

    function endGame() {
        gameActive = false;
        const total = gameQuestions.length;
        const percent = Math.round((gameScore/total)*100);
        gameStats.gamesPlayed++;
        if(gameScore > gameStats.bestScore) gameStats.bestScore = gameScore;
        saveGameStats();
        let msg = percent === 100 ? '🏆 ИДЕАЛЬНО!' : (percent>=70 ? '🎵 Отлично!' : '🎧 Попробуй ещё!');
        const container = document.getElementById('gameContent');
        container.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <h3>🎉 Игра окончена</h3>
                <div style="font-size:32px; margin:16px;">${gameScore}/${total}</div>
                <div>${msg}</div>
                <div>⭐ Лучший результат: ${gameStats.bestScore}/${total}</div>
                <div>🎮 Сыграно: ${gameStats.gamesPlayed}</div>
                <button id="restartGameBtn" style="background:#9b59b6; margin-top:20px; border:none; padding:12px 24px; border-radius:40px;">🔄 Сыграть снова</button>
            </div>
        `;
        document.getElementById('restartGameBtn')?.addEventListener('click', startGame);
        const startBtn = document.getElementById('startGameBtn');
        startBtn.textContent = '▶ Начать игру';
        startBtn.style.background = '#9b59b6';
    }

    document.getElementById('startGameBtn').onclick = startGame;
    loadGameStats();

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // Telegram user
    const user = tg.initDataUnsafe?.user;
    if(user && user.first_name) document.getElementById('userName').innerText = user.first_name;
</script>
</body>
</html>
