<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Bot - Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f8f9fa);
            color: var(--tg-theme-text-color, #000);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 14px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        
        .search-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .artist-card {
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--tg-theme-hint-color, #e9ecef);
        }
        
        .artist-card:hover {
            transform: translateY(-2px);
        }
        
        .artist-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .artist-stats {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .album-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--tg-theme-hint-color, #e9ecef);
        }
        
        .album-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .album-year {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .info-item {
            background: var(--tg-theme-bg-color, #f8f9fa);
            padding: 12px;
            border-radius: 12px;
        }
        
        .info-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-bottom: 4px;
        }
        
        .info-value {
            font-size: 16px;
            font-weight: 600;
        }
        
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .back-btn {
            background: none;
            color: var(--tg-theme-button-color, #2481cc);
            margin-bottom: 16px;
            font-weight: 500;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border: 3px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
        
        .error {
            color: #dc3545;
            text-align: center;
            padding: 20px;
        }
        
        .user-card {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
        }
        
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .card {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="welcomeScreen">
            <div class="card user-card">
                <h1>🎵 Music Bot</h1>
                <p id="userGreeting">Загрузка...</p>
            </div>
            
            <div class="card">
                <h2>🔍 Поиск исполнителя</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Big Baby Tape, Imagine Dragons, Кино..." autocomplete="off">
                    <button onclick="searchArtist()" class="search-btn">Найти</button>
                </div>
            </div>
            
            <div id="searchResults"></div>
        </div>
        
        <div id="artistScreen" class="hidden">
            <button onclick="backToSearch()" class="back-btn">← Назад к поиску</button>
            <div id="artistContent"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userGreeting').innerHTML = `
                👋 Привет, <strong>${user.first_name || 'гость'}</strong>!<br>
                <span style="font-size: 14px; color: var(--tg-theme-hint-color);">
                    🆔 ID: ${user.id}
                </span>
            `;
        } else {
            document.getElementById('userGreeting').innerHTML = '👋 Добро пожаловать!';
        }
        
        // Функция поиска через Яндекс.Музыку с использованием CORS-прокси
        async function searchArtist() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                tg.showAlert('Введите имя исполнителя');
                return;
            }
            
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div>🔍 Ищем...</div>';
            
            try {
                // Используем corsproxy.io - более стабильный прокси
                const proxyUrl = 'https://corsproxy.io/?';
                const apiUrl = `https://music.yandex.ru/api/v2.1/handlers/music/search?text=${encodeURIComponent(query)}&type=artist&page=0`;
                
                const response = await fetch(proxyUrl + encodeURIComponent(apiUrl));
                const data = await response.json();
                
                if (data && data.artists && data.artists.items && data.artists.items.length > 0) {
                    displayArtists(data.artists.items);
                } else {
                    resultsDiv.innerHTML = '<div class="card error">❌ Исполнитель не найден</div>';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                resultsDiv.innerHTML = '<div class="card error">⚠️ Ошибка соединения. Попробуйте позже.</div>';
            }
        }
        
        function displayArtists(artists) {
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = artists.slice(0, 10).map(artist => `
                <div class="card artist-card" onclick="loadArtistInfo(${artist.id}, '${artist.name.replace(/'/g, "\\'")}')">
                    <div class="artist-name">🎤 ${artist.name}</div>
                    <div class="artist-stats">
                        <span>📀 Альбомов: ${artist.albums?.count || '?'}</span>
                        <span>👥 Слушателей: ${formatNumber(artist.listeners || 0)}</span>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadArtistInfo(artistId, artistName) {
            const artistScreen = document.getElementById('artistScreen');
            const welcomeScreen = document.getElementById('welcomeScreen');
            const artistContent = document.getElementById('artistContent');
            
            artistContent.innerHTML = '<div class="loading"><div class="spinner"></div>📖 Загружаем информацию...</div>';
            welcomeScreen.classList.add('hidden');
            artistScreen.classList.remove('hidden');
            
            try {
                const proxyUrl = 'https://corsproxy.io/?';
                
                const infoUrl = `https://music.yandex.ru/api/v2.1/artists/${artistId}`;
                const infoResponse = await fetch(proxyUrl + encodeURIComponent(infoUrl));
                const infoData = await infoResponse.json();
                const artist = infoData.artist || {};
                
                const albumsUrl = `https://music.yandex.ru/api/v2.1/artists/${artistId}/albums?page=0&pageSize=15&sort=year&sortOrder=desc`;
                const albumsResponse = await fetch(proxyUrl + encodeURIComponent(albumsUrl));
                const albumsData = await albumsResponse.json();
                const albums = albumsData.albums || [];
                
                let albumsHtml = '';
                if (albums.length > 0) {
                    albumsHtml = `
                        <div class="card">
                            <h2>📀 Альбомы</h2>
                            ${albums.map(album => `
                                <div class="album-item">
                                    <div class="album-title">${album.title || 'Без названия'}</div>
                                    <div class="album-year">${album.year || 'Год ?'} • ${album.trackCount || '?'} треков</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                
                artistContent.innerHTML = `
                    <div class="card">
                        <div style="font-size: 32px; margin-bottom: 8px;">🎤</div>
                        <h2>${artist.name || artistName}</h2>
                        <div class="artist-stats">👥 ${formatNumber(artist.listeners || 0)} слушателей</div>
                    </div>
                    <div class="card">
                        <h2>📊 Информация</h2>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">🎵 Жанры</div>
                                <div class="info-value">${(artist.genres || []).slice(0, 3).join(', ') || '—'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">🎭 Годы</div>
                                <div class="info-value">${artist.years || '—'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">💿 Альбомов</div>
                                <div class="info-value">${albums.length}</div>
                            </div>
                        </div>
                    </div>
                    ${albumsHtml}
                    <button onclick="tg.openLink('https://music.yandex.ru/artist/${artistId}')">🎵 Открыть в Яндекс.Музыке</button>
                    <button onclick="backToSearch()" style="background: var(--tg-theme-secondary-bg-color, #e9ecef); color: var(--tg-theme-text-color, #000);">← Назад</button>
                `;
            } catch (error) {
                console.error('Ошибка:', error);
                artistContent.innerHTML = '<div class="card error">❌ Ошибка загрузки данных</div>';
            }
        }
        
        function backToSearch() {
            document.getElementById('welcomeScreen').classList.remove('hidden');
            document.getElementById('artistScreen').classList.add('hidden');
        }
        
        function formatNumber(num) {
            if (!num) return '?';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(0) + 'K';
            return num.toString();
        }
    </script>
</body>
</html>
