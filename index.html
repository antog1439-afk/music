<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Bot - Поиск исполнителя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f8f9fa);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 14px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        
        .search-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .result-card {
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .artist-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .favorite-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            margin: 0;
            width: auto;
        }
        
        .platform-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        
        .platform-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 14px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            border: none;
            font-size: 16px;
            color: white;
        }
        
        .yandex-btn { background: #ffcc00; color: #000; }
        .youtube-btn { background: #ff0000; }
        .concert-btn { background: #28a745; }
        .afisha-btn { background: #ff6b6b; }
        
        .info-text {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #6c757d);
            margin-top: 12px;
            text-align: center;
        }
        
        .user-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--tg-theme-hint-color, #e9ecef);
            font-size: 13px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            border: 3px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-favorites {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .hidden {
            display: none;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            margin: 12px 0 8px 0;
            color: var(--tg-theme-hint-color, #6c757d);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .popular-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        
        .popular-tag {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .delete-history {
            background: none;
            border: none;
            color: #dc3545;
            font-size: 18px;
            cursor: pointer;
            width: auto;
            margin: 0;
            padding: 0 8px;
        }
        
        .state-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .state-idle { background: #6c757d; }
        .state-searching { background: #ffc107; animation: pulse 1s infinite; }
        .state-results { background: #28a745; }
        
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 8px 12px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 12px;
            font-size: 13px;
        }
        
        .current-state {
            display: flex;
            align-items: center;
        }
        
        /* Админ-панель */
        .admin-panel {
            margin-top: 20px;
            padding: 16px;
            background: var(--tg-theme-bg-color, #f0f2f5);
            border-radius: 16px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
        }
        
        .admin-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .admin-stat {
            background: var(--tg-theme-secondary-bg-color, #fff);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }
        
        .admin-stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .admin-stat-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #6c757d);
        }
        
        .admin-btn {
            background: #6c757d;
            margin-top: 8px;
        }
        
        .admin-btn.danger {
            background: #dc3545;
        }
        
        .admin-btn.warning {
            background: #ffc107;
            color: #000;
        }
        
        .password-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 16px;
        }
        
        @media (max-width: 480px) {
            body { padding: 12px; }
            .card { padding: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎵 Музыкальный бот</h1>
            
            <div class="status-bar">
                <div class="current-state">
                    <span class="state-indicator state-idle" id="stateIndicator"></span>
                    <span id="stateText">Готов к работе</span>
                </div>
                <span>🎤</span>
            </div>
            
            <div class="tabs">
                <div class="tab active" onclick="switchTab('search')">🔍 Поиск</div>
                <div class="tab" onclick="switchTab('favorites')">⭐ Избранное</div>
                <div class="tab" onclick="switchTab('history')">📜 История</div>
                <div class="tab" onclick="switchTab('admin')">👑 Админ</div>
            </div>
            
            <!-- Вкладка поиска -->
            <div id="searchTab">
                <div class="search-box">
                    <input type="text" id="artistInput" class="search-input" placeholder="Big Baby Tape, Imagine Dragons, Асия, Кино..." autocomplete="off">
                    <button onclick="searchArtist()" class="search-btn">Найти</button>
                </div>
                
                <div class="section-title" style="margin-top: 20px;">🔥 ПОПУЛЯРНЫЕ</div>
                <div class="popular-grid" id="popularArtists"></div>
                
                <div id="result"></div>
            </div>
            
            <!-- Вкладка избранного -->
            <div id="favoritesTab" class="hidden">
                <div id="favoritesList"></div>
            </div>
            
            <!-- Вкладка истории -->
            <div id="historyTab" class="hidden">
                <div id="historyList"></div>
                <button onclick="clearHistory()" style="background: #dc3545;">🗑️ Очистить историю</button>
            </div>
            
            <!-- Вкладка админки -->
            <div id="adminTab" class="hidden">
                <div id="adminContent"></div>
            </div>
            
            <div class="user-info">
                <span>👤 <span id="userName">Загрузка...</span></span>
                <span>🆔 <span id="userId">—</span></span>
            </div>
        </div>
        
        <button onclick="closeApp()">❌ Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // ========== ПАРОЛЬ АДМИНКИ ==========
        const ADMIN_PASSWORD = 'admin123';  // 🔑 Смени пароль!
        let isAdmin = false;
        
        // ========== ПОПУЛЯРНЫЕ ИСПОЛНИТЕЛИ ==========
        const popularArtistsList = [
            "Big Baby Tape", "Imagine Dragons", "Кино", "Земфира", 
            "Miyagi & Эндшпиль", "Моргенштерн", "Rauf & Faik", 
            "Асия", "Eminem", "Billie Eilish", "The Weeknd"
        ];
        
        // ========== ГЛОБАЛЬНАЯ СТАТИСТИКА ==========
        let globalStats = {
            totalSearches: 0,
            totalFavorites: 0,
            activeUsers: new Set(),
            popularSearches: {}
        };
        
        // Загрузка глобальной статистики
        function loadGlobalStats() {
            const saved = localStorage.getItem('music_bot_global_stats');
            if (saved) {
                const data = JSON.parse(saved);
                globalStats.totalSearches = data.totalSearches || 0;
                globalStats.totalFavorites = data.totalFavorites || 0;
                globalStats.popularSearches = data.popularSearches || {};
                if (data.activeUsers) globalStats.activeUsers = new Set(data.activeUsers);
            }
        }
        
        function saveGlobalStats() {
            const toSave = {
                totalSearches: globalStats.totalSearches,
                totalFavorites: globalStats.totalFavorites,
                popularSearches: globalStats.popularSearches,
                activeUsers: Array.from(globalStats.activeUsers)
            };
            localStorage.setItem('music_bot_global_stats', JSON.stringify(toSave));
        }
        
        // Регистрация активности пользователя
        function registerActivity() {
            const userId = user?.id || 'anonymous';
            if (!globalStats.activeUsers.has(userId)) {
                globalStats.activeUsers.add(userId);
                saveGlobalStats();
            }
        }
        
        // Регистрация поиска
        function registerSearch(query) {
            globalStats.totalSearches++;
            globalStats.popularSearches[query] = (globalStats.popularSearches[query] || 0) + 1;
            saveGlobalStats();
            registerActivity();
        }
        
        // Регистрация добавления в избранное
        function registerFavorite() {
            globalStats.totalFavorites++;
            saveGlobalStats();
        }
        
        // ========== СОСТОЯНИЯ ==========
        function setState(newState, message) {
            const indicator = document.getElementById('stateIndicator');
            const stateText = document.getElementById('stateText');
            indicator.className = 'state-indicator';
            if (newState === 'idle') indicator.classList.add('state-idle');
            else if (newState === 'searching') indicator.classList.add('state-searching');
            else if (newState === 'results') indicator.classList.add('state-results');
            stateText.textContent = message;
        }
        
        // ========== ИЗБРАННОЕ ==========
        let favorites = [];
        
        function loadFavorites() {
            const saved = localStorage.getItem('music_bot_favorites');
            if (saved) favorites = JSON.parse(saved);
            updateFavoritesList();
        }
        
        function saveFavorites() {
            localStorage.setItem('music_bot_favorites', JSON.stringify(favorites));
            updateFavoritesList();
        }
        
        function addToFavorites(artistName) {
            if (!favorites.includes(artistName)) {
                favorites.push(artistName);
                saveFavorites();
                registerFavorite();
                tg.showAlert(`⭐ ${artistName} добавлен в избранное`);
                updateSearchResultButtons(artistName);
            }
        }
        
        function removeFromFavorites(artistName) {
            favorites = favorites.filter(a => a !== artistName);
            saveFavorites();
            tg.showAlert(`❌ ${artistName} удалён из избранного`);
            updateSearchResultButtons(artistName);
        }
        
        function isFavorite(artistName) {
            return favorites.includes(artistName);
        }
        
        function updateFavoritesList() {
            const favoritesDiv = document.getElementById('favoritesList');
            if (favorites.length === 0) {
                favoritesDiv.innerHTML = `<div class="empty-favorites">⭐ Нет избранных исполнителей<br>Добавьте исполнителя через поиск</div>`;
                return;
            }
            favoritesDiv.innerHTML = favorites.map(artist => `
                <div class="history-item" onclick="searchArtistByName('${escapeHtml(artist).replace(/'/g, "\\'")}')">
                    <span>🎤 ${escapeHtml(artist)}</span>
                    <button class="delete-history" onclick="event.stopPropagation(); removeFromFavorites('${escapeHtml(artist).replace(/'/g, "\\'")}')">🗑️</button>
                </div>
            `).join('');
        }
        
        function updateSearchResultButtons(artistName) {
            const favButton = document.getElementById('favorite-btn-dynamic');
            if (favButton) {
                const isFav = isFavorite(artistName);
                if (isFav) {
                    favButton.innerHTML = '★ Удалить из избранного';
                    favButton.style.background = '#ffc107';
                    favButton.style.color = '#000';
                    favButton.onclick = () => removeFromFavorites(artistName);
                } else {
                    favButton.innerHTML = '☆ Добавить в избранное';
                    favButton.style.background = '#6c757d';
                    favButton.style.color = 'white';
                    favButton.onclick = () => addToFavorites(artistName);
                }
            }
        }
        
        // ========== ИСТОРИЯ ==========
        let searchHistory = [];
        
        function loadHistory() {
            const saved = localStorage.getItem('music_bot_history');
            if (saved) searchHistory = JSON.parse(saved);
            updateHistoryList();
        }
        
        function saveHistory() {
            localStorage.setItem('music_bot_history', JSON.stringify(searchHistory));
            updateHistoryList();
        }
        
        function addToHistory(artistName) {
            searchHistory = searchHistory.filter(a => a !== artistName);
            searchHistory.unshift(artistName);
            searchHistory = searchHistory.slice(0, 15);
            saveHistory();
        }
        
        function clearHistory() {
            searchHistory = [];
            saveHistory();
            tg.showAlert('История очищена');
        }
        
        function updateHistoryList() {
            const historyDiv = document.getElementById('historyList');
            if (searchHistory.length === 0) {
                historyDiv.innerHTML = `<div class="empty-favorites">📜 История пуста<br>Поищите исполнителей, они появятся здесь</div>`;
                return;
            }
            historyDiv.innerHTML = searchHistory.map(artist => `
                <div class="history-item" onclick="searchArtistByName('${escapeHtml(artist).replace(/'/g, "\\'")}')">
                    <span>🎤 ${escapeHtml(artist)}</span>
                    <button class="delete-history" onclick="event.stopPropagation(); removeFromHistory('${escapeHtml(artist).replace(/'/g, "\\'")}')">🗑️</button>
                </div>
            `).join('');
        }
        
        function removeFromHistory(artistName) {
            searchHistory = searchHistory.filter(a => a !== artistName);
            saveHistory();
        }
        
        // ========== ПОИСК ==========
        function searchArtistByName(artistName) {
            document.getElementById('artistInput').value = artistName;
            searchArtist();
        }
        
        function searchArtist() {
            const query = document.getElementById('artistInput').value.trim();
            if (!query) {
                tg.showAlert('Введите имя исполнителя');
                return;
            }
            
            registerSearch(query);
            addToHistory(query);
            setState('searching', `🔍 Ищем "${query}"...`);
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>🔍 Ищем...</div>';
            
            setTimeout(() => {
                const yandexUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(query)}`;
                const youtubeUrl = `https://music.youtube.com/search?q=${encodeURIComponent(query)}`;
                const concertsUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(query + ' концерт')}`;
                const afishaUrl = `https://www.afisha.ru/search/?q=${encodeURIComponent(query)}`;
                const topTracksUrl = `https://music.yandex.ru/search?text=${encodeURIComponent(query + ' популярные треки')}`;
                const isFav = isFavorite(query);
                
                resultDiv.innerHTML = `
                    <div class="result-card">
                        <div class="artist-name">🎤 ${escapeHtml(query)}</div>
                        <div class="platform-buttons">
                            <button id="favorite-btn-dynamic" class="platform-btn" style="${isFav ? 'background: #ffc107; color: #000;' : 'background: #6c757d;'}">
                                ${isFav ? '★ Удалить из избранного' : '☆ Добавить в избранное'}
                            </button>
                        </div>
                        <div class="section-title">🎵 МУЗЫКА</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${yandexUrl}')" class="platform-btn yandex-btn">🎵 Яндекс.Музыка</button>
                            <button onclick="openLink('${youtubeUrl}')" class="platform-btn youtube-btn">▶️ YouTube Music</button>
                        </div>
                        <div class="section-title">🎤 ПОПУЛЯРНЫЕ ТРЕКИ</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${topTracksUrl}')" class="platform-btn" style="background: #9b59b6;">🎵 Топ треки</button>
                        </div>
                        <div class="section-title">🎫 КОНЦЕРТЫ И БИЛЕТЫ</div>
                        <div class="platform-buttons">
                            <button onclick="openLink('${concertsUrl}')" class="platform-btn concert-btn">🎸 Концерты (Яндекс)</button>
                            <button onclick="openLink('${afishaUrl}')" class="platform-btn afisha-btn">🎫 Билеты (Афиша)</button>
                        </div>
                        <div class="info-text">💡 Нажми на любую кнопку — откроется поиск с уже введённым исполнителем</div>
                    </div>
                `;
                setState('results', `🎤 Найден: ${query}`);
                const favBtn = document.getElementById('favorite-btn-dynamic');
                if (favBtn) {
                    if (isFav) favBtn.onclick = () => removeFromFavorites(query);
                    else favBtn.onclick = () => addToFavorites(query);
                }
            }, 300);
        }
        
        // ========== АДМИНКА ==========
        function showAdminPanel() {
            const adminContent = document.getElementById('adminContent');
            
            if (!isAdmin) {
                adminContent.innerHTML = `
                    <div class="admin-panel">
                        <div class="admin-title">🔐 Вход в админ-панель</div>
                        <input type="password" id="adminPassword" class="password-input" placeholder="Введите пароль">
                        <button onclick="checkAdminPassword()" class="admin-btn">Войти</button>
                    </div>
                `;
                return;
            }
            
            // Сортируем популярные поиски
            const sortedSearches = Object.entries(globalStats.popularSearches)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
            
            adminContent.innerHTML = `
                <div class="admin-panel">
                    <div class="admin-title">📊 СТАТИСТИКА</div>
                    <div class="admin-stats">
                        <div class="admin-stat">
                            <div class="admin-stat-value">${globalStats.totalSearches}</div>
                            <div class="admin-stat-label">Всего поисков</div>
                        </div>
                        <div class="admin-stat">
                            <div class="admin-stat-value">${globalStats.totalFavorites}</div>
                            <div class="admin-stat-label">Добавлений в избранное</div>
                        </div>
                        <div class="admin-stat">
                            <div class="admin-stat-value">${globalStats.activeUsers.size}</div>
                            <div class="admin-stat-label">Активных пользователей</div>
                        </div>
                        <div class="admin-stat">
                            <div class="admin-stat-value">${favorites.length}</div>
                            <div class="admin-stat-label">Ваших избранных</div>
                        </div>
                    </div>
                    
                    <div class="admin-title">🔥 ПОПУЛЯРНЫЕ ЗАПРОСЫ</div>
                    ${sortedSearches.map(([query, count]) => `
                        <div class="history-item" style="justify-content: space-between;">
                            <span>🎤 ${escapeHtml(query)}</span>
                            <span style="color: var(--tg-theme-button-color);">${count} раз</span>
                        </div>
                    `).join('')}
                    
                    <div class="admin-title">⚙️ ДЕЙСТВИЯ</div>
                    <button onclick="clearAllStats()" class="admin-btn danger">🗑️ Сбросить всю статистику</button>
                    <button onclick="sendNotificationToAll()" class="admin-btn warning">📢 Отправить уведомление</button>
                </div>
            `;
        }
        
        function checkAdminPassword() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                tg.showAlert('✅ Добро пожаловать в админ-панель!');
                showAdminPanel();
            } else {
                tg.showAlert('❌ Неверный пароль!');
            }
        }
        
        function clearAllStats() {
            if (confirm('Вы уверены? Вся статистика будет удалена безвозвратно!')) {
                globalStats = {
                    totalSearches: 0,
                    totalFavorites: 0,
                    activeUsers: new Set(),
                    popularSearches: {}
                };
                saveGlobalStats();
                showAdminPanel();
                tg.showAlert('✅ Статистика сброшена');
            }
        }
        
        function sendNotificationToAll() {
            tg.showAlert('📢 Функция отправки уведомлений требует бэкенд-сервер.\nПока что это демо-режим.');
        }
        
        function loadPopularArtists() {
            const popularDiv = document.getElementById('popularArtists');
            popularDiv.innerHTML = popularArtistsList.map(artist => `
                <span class="popular-tag" onclick="searchArtistByName('${escapeHtml(artist).replace(/'/g, "\\'")}')">
                    🎤 ${artist}
                </span>
            `).join('');
        }
        
        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        function switchTab(tab) {
            const searchTab = document.getElementById('searchTab');
            const favoritesTab = document.getElementById('favoritesTab');
            const historyTab = document.getElementById('historyTab');
            const adminTab = document.getElementById('adminTab');
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'search') {
                searchTab.classList.remove('hidden');
                favoritesTab.classList.add('hidden');
                historyTab.classList.add('hidden');
                adminTab.classList.add('hidden');
                tabs[0].classList.add('active');
                loadPopularArtists();
                setState('idle', 'Готов к поиску');
            } else if (tab === 'favorites') {
                searchTab.classList.add('hidden');
                favoritesTab.classList.remove('hidden');
                historyTab.classList.add('hidden');
                adminTab.classList.add('hidden');
                tabs[1].classList.add('active');
                updateFavoritesList();
                setState('idle', 'Просмотр избранного');
            } else if (tab === 'history') {
                searchTab.classList.add('hidden');
                favoritesTab.classList.add('hidden');
                historyTab.classList.remove('hidden');
                adminTab.classList.add('hidden');
                tabs[2].classList.add('active');
                updateHistoryList();
                setState('idle', 'Просмотр истории');
            } else if (tab === 'admin') {
                searchTab.classList.add('hidden');
                favoritesTab.classList.add('hidden');
                historyTab.classList.add('hidden');
                adminTab.classList.remove('hidden');
                tabs[3].classList.add('active');
                showAdminPanel();
                setState('idle', 'Админ-панель');
            }
        }
        
        function openLink(url) { tg.openLink(url); }
        function closeApp() { tg.close(); }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = user.first_name || 'Гость';
            document.getElementById('userId').textContent = user.id || '—';
            registerActivity();
        }
        
        loadGlobalStats();
        loadFavorites();
        loadHistory();
        loadPopularArtists();
        setState('idle', 'Готов к работе');
        
        document.getElementById('artistInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchArtist();
        });
    </script>
</body>
</html>
